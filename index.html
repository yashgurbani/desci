<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeSci Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
:root {
  --bg:#020403;--surface:#060c0a;--card:#0b1411;--raised:#12201a;
  --border:rgba(118,234,176,.16);--border-h:rgba(118,234,176,.3);
  --text:#dafbe8;--text-2:#9ecdb4;--text-3:#5f8f78;
  --gold:#f0c36b;--gold-dim:#d7aa54;--gold-glow:rgba(240,195,107,.12);
  --sage:#76eab0;--rose:#ff9abb;--teal:#67d8f5;
  --red:#e05c5c;--blue:#5c9ee0;
  --mono:'Fira Code',monospace;--display:'Playfair Display',Georgia,serif;
  --body:'Nunito Sans',system-ui,sans-serif;
  --radius:8px;--radius-sm:5px;
  --graph-label:#d6d6d6;
  --link:#7ed9ff;--link-h:#bde9ff;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;color-scheme:dark;scrollbar-color:#2a2a2a #050505}
body{font-family:var(--body);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--link);text-decoration:none}
a:hover{color:var(--link-h)}
.sidebar,.detail,.node-list,.table-wrap,.people-grid,.lit-panel,.modal{scrollbar-width:thin;scrollbar-color:#2a2a2a #050505}
.sidebar::-webkit-scrollbar,.detail::-webkit-scrollbar,.node-list::-webkit-scrollbar,.table-wrap::-webkit-scrollbar,.people-grid::-webkit-scrollbar,.lit-panel::-webkit-scrollbar,.modal::-webkit-scrollbar{width:12px;height:12px}
.sidebar::-webkit-scrollbar-track,.detail::-webkit-scrollbar-track,.node-list::-webkit-scrollbar-track,.table-wrap::-webkit-scrollbar-track,.people-grid::-webkit-scrollbar-track,.lit-panel::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track{background:#050505}
.sidebar::-webkit-scrollbar-thumb,.detail::-webkit-scrollbar-thumb,.node-list::-webkit-scrollbar-thumb,.table-wrap::-webkit-scrollbar-thumb,.people-grid::-webkit-scrollbar-thumb,.lit-panel::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb{background:#2a2a2a;border:2px solid #050505;border-radius:999px}
.sidebar::-webkit-scrollbar-thumb:hover,.detail::-webkit-scrollbar-thumb:hover,.node-list::-webkit-scrollbar-thumb:hover,.table-wrap::-webkit-scrollbar-thumb:hover,.people-grid::-webkit-scrollbar-thumb:hover,.lit-panel::-webkit-scrollbar-thumb:hover,.modal::-webkit-scrollbar-thumb:hover{background:#3a3a3a}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr 360px;grid-template-rows:52px 1fr;height:100vh}
.app.hide-left{grid-template-columns:0px 1fr 360px}
.app.hide-right{grid-template-columns:240px 1fr 0px}
.app.hide-left.hide-right{grid-template-columns:0px 1fr 0px}

/* HEADER */
.header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 20px;gap:18px;z-index:10}
.logo{font-family:var(--mono);font-size:1.18rem;font-weight:600;color:var(--gold);letter-spacing:1.5px;white-space:nowrap;cursor:pointer;margin-right:6px}
.stats{font-size:.72rem;color:var(--text-3);font-family:var(--mono);white-space:nowrap}
.tabs{display:flex;gap:2px;justify-content:center;align-items:center}
.tab{font-size:.75rem;font-weight:600;padding:7px 14px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;color:var(--text-3);cursor:pointer;transition:all .15s;font-family:var(--body)}
.tab:hover{color:var(--text-2);border-color:var(--border)}
.tab.on{border-color:rgba(212,168,83,.3);color:var(--gold);background:var(--gold-glow)}
.actions{display:flex;gap:6px;align-items:center;justify-self:end}
.btn{font-size:.72rem;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--body);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-fill{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-fill:hover{background:var(--gold-dim)}
.btn-x{border-color:var(--red);color:var(--red)}
.sync-status{font-size:.65rem;color:var(--text-3);cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:14px;transition:all .15s}
.sync-status.synced{border-color:rgba(92,184,122,.3);color:var(--sage)}
.sync-status.error{border-color:rgba(224,92,92,.3);color:var(--red)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* SIDEBAR */
.sidebar{grid-column:1;grid-row:2;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 14px;min-width:0;min-height:0}
.app.hide-left .sidebar{display:none}
.sb-section{margin-bottom:18px}
.sb-label{font-family:var(--mono);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin-bottom:8px}
.sb-search{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;font-family:var(--body);transition:border-color .2s}
.sb-search:focus{outline:none;border-color:rgba(212,168,83,.4)}
.sb-search::placeholder{color:var(--text-3)}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:.72rem;font-weight:500;padding:5px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;font-family:var(--body)}
.pill:hover{color:var(--text-2);border-color:var(--border-h)}
.pill.on{border-color:rgba(212,168,83,.35);color:var(--gold);background:var(--gold-glow)}
.node-list{list-style:none;margin-top:4px;max-height:40vh;overflow-y:auto}
.nli{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:.88rem;transition:background .12s}
.nli:hover{background:var(--card)}
.nli.sel{background:var(--gold-glow)}
.nli-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nli-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SLIDER FILTER */
.slider-filter{margin-bottom:14px}
.sf-label{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-3);font-family:var(--mono);margin-bottom:3px}
.sf-range{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--raised);outline:none}
.sf-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}

/* MAIN */
.main{grid-column:2;grid-row:2;position:relative;overflow:hidden;background:var(--bg);min-width:0;min-height:0}
.main svg{width:100%;height:100%}

/* TOGGLE */
.toggle-left,.toggle-right{position:absolute;z-index:5;width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .15s}
.toggle-left{top:12px;left:12px}
.toggle-right{top:12px;right:12px}
.toggle-left:hover,.toggle-right:hover{border-color:var(--gold);color:var(--gold)}
.toggle-left.edge-toggle,.toggle-right.edge-toggle{top:50%;transform:translateY(-50%);background:rgba(7,12,10,.92);box-shadow:0 10px 30px rgba(0,0,0,.35)}
.toggle-left.edge-toggle{left:10px}
.toggle-right.edge-toggle{right:10px}

/* DETAIL */
.detail{grid-column:3;grid-row:2;background:var(--surface);border-left:1px solid var(--border);padding:24px 20px;overflow-y:auto;min-width:0;min-height:0}
.app.hide-right .detail{display:none}
.det-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.9rem;font-style:italic}
.det-name{font-family:var(--display);font-size:1.5rem;font-weight:600;line-height:1.2;margin-bottom:4px}
.det-sub{font-size:.88rem;color:var(--text-2);margin-bottom:20px}
.field{margin-bottom:16px}
.flabel{font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:5px}
.finput{width:100%;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.88rem;font-family:var(--body);transition:border-color .2s}
.finput:focus{outline:none;border-color:rgba(212,168,83,.4)}
textarea.finput{resize:vertical;min-height:80px;line-height:1.5}
select.finput{appearance:none;cursor:pointer}
.tag-row{display:flex;flex-wrap:wrap;gap:5px}
.tag-chip{font-size:.72rem;font-weight:500;padding:4px 10px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:var(--text-2);display:inline-flex;align-items:center;gap:5px}
.tag-chip .rm{cursor:pointer;opacity:.4}
.tag-chip .rm:hover{opacity:1;color:var(--red)}

.strata{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.stm{text-align:center;padding:8px 3px;border-radius:var(--radius-sm);font-family:var(--mono);font-size:.68rem;line-height:1.3;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.stm:hover{border-color:var(--gold)}
.stm[data-v="3"]{background:rgba(110,200,155,.15);border-color:rgba(110,200,155,.3);color:var(--sage)}
.stm[data-v="2"]{background:rgba(212,168,83,.1);border-color:rgba(212,168,83,.2);color:var(--gold)}
.stm[data-v="1"]{background:rgba(232,126,154,.1);border-color:rgba(232,126,154,.2);color:var(--rose)}
.rel-list{list-style:none}
.rel-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.rel-badge{font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.stack-chip{font-family:var(--mono);font-size:.6rem;font-weight:600;padding:3px 8px;border-radius:4px;display:inline-block}
/* Overlap box */
.overlap-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px}
.overlap-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.overlap-bar-bg{flex:1;height:8px;background:var(--raised);border-radius:4px;overflow:hidden}
.overlap-bar-fill{height:100%;border-radius:4px;transition:width .3s}

/* PEOPLE */
.people-grid{padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;overflow-y:auto;height:100%;align-content:start}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .2s}
.p-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.p-name{font-family:var(--display);font-size:1.05rem;font-weight:600;margin-bottom:3px}
.p-role{font-size:.8rem;color:var(--text-2);line-height:1.4;margin-bottom:8px}
.p-links{display:flex;gap:10px;font-size:.75rem}
.p-links a{color:var(--link);text-decoration:none}
.p-orgs{font-family:var(--mono);font-size:.65rem;color:var(--text-3);margin-top:8px}

/* TABLE */
.table-wrap{overflow:auto;height:100%;padding:12px}
table.dtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem}
.dtbl th{position:sticky;top:0;z-index:2;background:var(--surface);padding:10px 10px;text-align:left;font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--border-h)}
.dtbl th:hover{color:var(--gold)}
.dtbl td{padding:7px 10px;border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtbl tbody tr{transition:background .1s}
.dtbl tbody tr:hover{background:var(--card)}
.dtbl tbody tr.sel{background:var(--gold-glow)}
.ob{display:flex;align-items:center;gap:5px}
.ob-bar{width:40px;height:5px;background:var(--raised);border-radius:3px;overflow:hidden}
.ob-fill{height:100%;border-radius:3px}

/* LITERATURE */
.lit-panel{padding:24px;overflow-y:auto;height:100%}
.lit-title{font-family:var(--display);font-size:1.3rem;margin-bottom:18px}
.paper{padding:14px 0;border-bottom:1px solid var(--border)}
.paper-t{font-family:var(--display);font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.paper-a{font-size:.75rem;color:var(--text-2)}

/* GRAPH */
.legend{position:absolute;bottom:14px;left:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:.7rem;z-index:3;max-width:200px;transition:all .2s}
.legend.collapsed{padding:6px 12px}
.legend.collapsed .legend-body{display:none}
.legend-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.legend-title{font-family:var(--mono);font-weight:600;color:var(--text-2);font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.legend-toggle{font-size:.6rem;color:var(--text-3);cursor:pointer}
.legend-row{display:flex;align-items:center;gap:8px;margin-top:5px;color:var(--text-2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TOOLTIPS */
.tip{position:absolute;z-index:20;pointer-events:none;background:rgba(20,20,20,.94);border:1px solid var(--border-h);border-radius:var(--radius-sm);padding:10px 14px;max-width:380px;max-height:52vh;overflow:auto;font-size:.8rem;line-height:1.45;box-shadow:0 10px 38px rgba(0,0,0,.5);backdrop-filter:blur(4px);opacity:0;transition:opacity .12s}
.tip.interactive{pointer-events:auto}
.tip.vis{opacity:1}
.tip h4{font-family:var(--display);font-size:.96rem;margin-bottom:4px;line-height:1.2}
.tip .tm{font-size:.74rem;color:var(--text-2);line-height:1.45}
.tip-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tip-pin-btn{font-size:.62rem;font-family:var(--mono);padding:3px 7px;border-radius:999px;border:1px solid var(--border);background:var(--raised);color:var(--text-2);cursor:pointer}
.tip-pin-btn:hover{border-color:var(--gold);color:var(--gold)}
.tip-src-title{margin-top:8px;font-family:var(--mono);font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-3)}
.tip-src-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tip-src-link{font-size:.66rem;padding:3px 8px;border-radius:12px;background:var(--raised);border:1px solid var(--border);color:var(--link);display:inline-flex;align-items:center;gap:5px}
.tip-src-link:hover{border-color:var(--gold);color:var(--link-h)}
/* Glossary tooltip */
.gloss-tip{position:fixed;z-index:99;background:var(--card);border:1px solid var(--gold);border-radius:var(--radius-sm);padding:8px 12px;max-width:260px;font-size:.78rem;color:var(--text-2);box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .15s}
.gloss-tip.vis{opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px;width:min(520px,90vw);max-height:80vh;overflow-y:auto}
.modal h2{font-family:var(--display);font-size:1.2rem;margin-bottom:16px}
.modal-foot{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

/* EDGE COLORS */
:root {
  --edge-funder:#78dca2;--edge-ecosystem:#76cee0;--edge-partner:#b29aff;
  --edge-overlap:#f0cb5a;--edge-collaborator:#ff9abb;
}

/* CREDIBILITY BADGE */
.cred-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:10px}
.profit-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:10px}
.fin-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.fin-box.commons{border-color:rgba(110,200,155,.25)}
.fin-box.hybrid{border-color:rgba(212,168,83,.25)}
.fin-box.profit{border-color:rgba(224,92,92,.25)}
.fin-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.fin-bar-bg{flex:1;height:8px;background:var(--raised);border-radius:4px;overflow:hidden}
.fin-bar-fill{height:100%;border-radius:4px;transition:width .3s}


.prov-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.conf-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.68rem;padding:3px 8px;border-radius:10px;text-transform:uppercase}
.conf-high{background:rgba(110,200,155,.12);color:var(--sage)}
.conf-medium{background:rgba(212,168,83,.12);color:var(--gold)}
.conf-low{background:rgba(224,92,92,.12);color:var(--red)}
.src-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.src-chip{font-size:.68rem;padding:4px 9px;border-radius:14px;border:1px solid var(--border);background:var(--raised);color:var(--link);display:inline-flex;align-items:center;gap:5px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.score-cell{background:var(--raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 6px;text-align:center}
.score-cell .k{display:block;font-size:.58rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase}
.score-cell .v{display:block;font-size:.78rem;color:var(--text-2);font-weight:600}


/* BUSINESS MODEL VIEW */
.biz-wrap{height:100%;display:flex;flex-direction:column;padding:18px;gap:14px;overflow:auto}
.biz-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.biz-title{font-family:var(--display);font-size:1.2rem;color:var(--text)}
.biz-sub{font-size:.82rem;color:var(--text-2);max-width:860px;line-height:1.5}
.biz-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.biz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.biz-card .k{display:block;font-size:.62rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.biz-card .v{display:block;font-size:1rem;color:var(--text);font-weight:700}
.biz-card .s{display:block;font-size:.74rem;color:var(--text-2);margin-top:4px;line-height:1.4}
.biz-main{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:14px;min-height:0;flex:1}
.biz-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:0}
.biz-panel-chart{position:relative;overflow:hidden;min-height:clamp(560px,72vh,920px)}
.biz-panel-side{overflow-y:auto;padding-right:8px;max-height:clamp(560px,72vh,920px)}
.biz-svg{width:100%;height:100%;min-height:640px;display:block}
.biz-side-title{font-family:var(--mono);font-size:.66rem;color:var(--text-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:8px}
.biz-list{display:flex;flex-direction:column;gap:8px}
.biz-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:all .15s}
.biz-item:hover{border-color:var(--gold);transform:translateY(-1px)}
.biz-item-name{font-size:.84rem;font-weight:600;color:var(--text)}
.biz-item-meta{font-size:.72rem;color:var(--text-2);margin-top:3px;line-height:1.4}
.biz-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.biz-legend-chip{font-size:.68rem;padding:4px 9px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:var(--text-2)}
.axis-label{font-size:.72rem;fill:var(--text-2);font-family:var(--mono)}
.biz-note{font-size:.74rem;color:var(--text-3);line-height:1.45;margin-top:10px}
.biz-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-top:10px}
.biz-control-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.biz-control-label{font-size:.62rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-right:2px;padding-top:4px}
.biz-mini-btn{font-size:.68rem;padding:4px 9px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text-2);cursor:pointer;transition:all .15s}
.biz-mini-btn:hover{border-color:var(--gold);color:var(--gold)}

  ['â',"'"],['â','"'],['â','"'],['â','-'],['â','-'],['â€¦','...'],
  ['Â','']

function mojibakeScore(s){return (String(s).match(/[ÃÂâ]/g)||[]).length}
function cleanMojibakeString(v){
  let s=String(v??'');
  if(!s)return s;
  if(/[ÃÂâ]/.test(s)){
    try{
      const bytes=Uint8Array.from([...s].map(ch=>ch.charCodeAt(0)&0xff));
      const dec=new TextDecoder('utf-8').decode(bytes);
      if(mojibakeScore(dec)<mojibakeScore(s))s=dec;
    }catch(e){}
  }
  for(const [bad,good] of MOJIBAKE_FIXES)s=s.split(bad).join(good);
  return s.replace(/\s+\|\s+\|\s+/g,' | ');
}
function cleanMojibakeDeep(v,seen){
  if(typeof v==='string')return cleanMojibakeString(v);
  if(!v||typeof v!=='object')return v;
  const memo=seen||new WeakSet();
  if(memo.has(v))return v;
  memo.add(v);
  if(Array.isArray(v)){for(let i=0;i<v.length;i++)v[i]=cleanMojibakeDeep(v[i],memo);return v}
  Object.keys(v).forEach(k=>{v[k]=cleanMojibakeDeep(v[k],memo)});
  return v;
}
function sanitizeVisibleText(root){
  const host=root||document.body;
  if(!host)return;
  const w=document.createTreeWalker(host,NodeFilter.SHOW_TEXT);
  const list=[];
  while(w.nextNode()){
    const n=w.currentNode;
    const p=n.parentElement;
    if(p&&(p.tagName==='SCRIPT'||p.tagName==='STYLE'))continue;
    list.push(n);
  }
  list.forEach(n=>{
    const t=n.nodeValue||'';
    const f=cleanMojibakeString(t);
    if(f&&f!==t)n.nodeValue=f;
  });
}

function computeComponents(nodes, links){
  const ids = nodes.map(n => n.id);
  const adj = new Map(ids.map(id => [id, []]));
  links.forEach(e => {
    const a = typeof e.source === 'object' ? e.source.id : (e.source || e.s);
    const b = typeof e.target === 'object' ? e.target.id : (e.target || e.t);
    if (adj.has(a) && adj.has(b)) {
      adj.get(a).push(b);
      adj.get(b).push(a);
    }
  });
  const seen = new Set();
  const out = [];
  for (const id of ids) {
    if (seen.has(id)) continue;
    const stack = [id];
    seen.add(id);
    const comp = [];
    while (stack.length) {
      const cur = stack.pop();
      comp.push(cur);
      for (const nxt of adj.get(cur) || []) {
        if (!seen.has(nxt)) {
          seen.add(nxt);
          stack.push(nxt);
        }
      }
    }
    out.push(comp);
  }
  return out.sort((a,b) => b.length - a.length);
}

function estimateNodeRadius(d, mode='org'){
  if(mode==='people') return d._t==='person' ? 10 : 9;
  return Math.max(6,(d.decen||50)/8+3);
}

function estimateLabelPad(name, mode='org'){
  const mult = mode==='people' ? 1.9 : 2.1;
  return Math.max(10, Math.min(mode==='people' ? 32 : 36, (name || '').length * mult));
}

function componentRing(size, minDim, mode='org'){
  if (mode === 'people') {
    if (size >= 10) return minDim * 0.26;
    if (size >= 6) return minDim * 0.36;
    if (size >= 3) return minDim * 0.47;
    return minDim * 0.58;
  }
  if (size >= 12) return minDim * 0.24;
  if (size >= 7) return minDim * 0.35;
  if (size >= 4) return minDim * 0.47;
  return minDim * 0.60;
}

function componentRadius(compIds, byId, mode='org'){
  const size = compIds.length;
  const labelMass = compIds.reduce((sum, id) => sum + estimateLabelPad((byId.get(id) || {}).name || '', mode), 0);
  const base = mode==='people' ? 52 : 62;
  const sizeTerm = Math.sqrt(Math.max(1, size)) * (mode==='people' ? 24 : 28);
  const labelTerm = Math.min(mode==='people' ? 74 : 86, labelMass / Math.max(3, size));
  return base + sizeTerm + labelTerm;
}

function componentAnchors(w, h, comps, byId, mode='org'){
  const cx = w / 2, cy = h / 2;
  const minDim = Math.min(w, h);
  const compNodes = comps.map((ids, i) => {
    const ring = componentRing(ids.length, minDim, mode);
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / Math.max(1, comps.length));
    return {
      id: i,
      ids,
      r: componentRadius(ids, byId, mode),
      ring,
      x: cx + Math.cos(angle) * ring,
      y: cy + Math.sin(angle) * ring
    };
  });

  const cSim = d3.forceSimulation(compNodes)
    .force('radial', d3.forceRadial(d => d.ring, cx, cy).strength(0.95))
    .force('charge', d3.forceManyBody().strength(-2200))
    .force('collision', d3.forceCollide(d => d.r + 48))
    .force('x', d3.forceX(cx).strength(0.015))
    .force('y', d3.forceY(cy).strength(0.015))
    .stop();

  for (let i = 0; i < 320; i++) cSim.tick();

  const out = new Map();
  compNodes.forEach(c => {
    const pad = c.r + 24;
    c.x = Math.max(pad, Math.min(w - pad, c.x));
    c.y = Math.max(pad, Math.min(h - pad, c.y));
    c.ids.forEach(id => out.set(id, {x:c.x, y:c.y, r:c.r}));
  });
  return out;
}

function seedNodesByComponent(nodes, comps, anchorById){
  comps.forEach(ids => {
    const count = ids.length;
    const base = anchorById.get(ids[0]) || {x:0, y:0, r:100};
    ids.forEach((id, j) => {
      const d = nodes.find(n => n.id === id);
      if (!d) return;
      const angle = (j / Math.max(1, count)) * Math.PI * 2;
      const localR = Math.min(base.r * 0.42, 20 + Math.sqrt(count) * 9 + (j % 3) * 8);
      d.x = base.x + Math.cos(angle) * localR;
      d.y = base.y + Math.sin(angle) * localR;
    });
  });
}

function labelPlacement(d, anchorById, mode='org'){
  const a = anchorById.get(d.id) || {x:d.x || 0, y:d.y || 0};
  const dx = (d.x || 0) - a.x;
  const dy = (d.y || 0) - a.y;
  const r = estimateNodeRadius(d, mode);
  const sidePad = mode==='people' ? 8 : 9;
  const vertPad = mode==='people' ? 10 : 11;
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx >= 0) return {anchor:'start', x:(d.x || 0) + r + sidePad, y:(d.y || 0) + 3};
    return {anchor:'end', x:(d.x || 0) - r - sidePad, y:(d.y || 0) + 3};
  }
  if (dy >= 0) return {anchor:'middle', x:(d.x || 0), y:(d.y || 0) + r + vertPad + 8};
  return {anchor:'middle', x:(d.x || 0), y:(d.y || 0) - r - vertPad};
}

// ===== LITERATURE =====

function quadrantOf(n){
  const p=n.profitScore??50, o=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);
  if(p<50 && o>=50) return 'commons';
  if(p>=50 && o>=50) return 'hybrid-open';
  if(p<50 && o<50) return 'mission-fragile';
  return 'extractive-risk';
}
function escapeHtml(v){
  return String(v??'').replace(/[&<>"']/g,ch=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]));
}
function bizAuditRow(n){
  const k1=(n.id||'').toLowerCase();
  const k2=(n.name||'').toLowerCase();
  return auditRowsByKey.get(k1)||auditRowsByKey.get(k2)||null;
}
function bizSources(n,max=6){
  const seen=new Set(), out=[];
  const add=(src)=>{
    if(!src||!src.url)return;
    const u=String(src.url).trim();
    if(!u||seen.has(u))return;
    seen.add(u);
    let host=u;
    try{host=new URL(u).hostname.replace(/^www\./,'')}catch(e){}
    out.push({label:src.label||host,url:u,type:src.type||''});
  };
  const p=n.provenance||{};
  (p.sources||[]).forEach(add);
  Object.values(p.fieldSources||{}).forEach(arr=>(arr||[]).forEach(add));
  (p.materialClaims||[]).forEach(c=>(c.sources||[]).forEach(add));
  return out.slice(0,max);
}
function meanNum(arr){
  if(!arr.length)return 0;
  return arr.reduce((s,v)=>s+v,0)/arr.length;
}
function stdNum(arr){
  if(arr.length<2)return 0;
  const m=meanNum(arr);
  return Math.sqrt(arr.reduce((s,v)=>s+Math.pow(v-m,2),0)/(arr.length-1));
}
function computeLinearFit(nodes){
  if(nodes.length<2)return {slope:0,intercept:50,corr:0,r2:0,residuals:[]};
  const xs=nodes.map(n=>n.profitScore??50);
  const ys=nodes.map(n=>n.openScienceScore??50);
  const mx=meanNum(xs), my=meanNum(ys);
  let cov=0,varX=0,varY=0;
  for(let i=0;i<xs.length;i++){
    const dx=xs[i]-mx, dy=ys[i]-my;
    cov+=dx*dy;
    varX+=dx*dx;
    varY+=dy*dy;
  }
  const slope=varX?cov/varX:0;
  const intercept=my-slope*mx;
  const corr=(varX&&varY)?(cov/Math.sqrt(varX*varY)):0;
  const residuals=nodes.map(n=>{
    const pred=intercept+slope*(n.profitScore??50);
    const resid=(n.openScienceScore??50)-pred;
    return {node:n,pred,resid};
  });
  const sd=stdNum(residuals.map(r=>r.resid))||1;
  residuals.forEach(r=>{r.z=r.resid/sd;r.absZ=Math.abs(r.z)});
  return {slope,intercept,corr,r2:corr*corr,residuals};
}
function dominatesBiz(a,b){
  const aOv=a.overlapScore||0, bOv=b.overlapScore||0;
  const betterOrEqual=(a.openScienceScore>=b.openScienceScore)&&(aOv>=bOv)&&((a.profitScore??50)<=(b.profitScore??50));
  const strictlyBetter=(a.openScienceScore>b.openScienceScore)||(aOv>bOv)||((a.profitScore??50)<(b.profitScore??50));
  return betterOrEqual&&strictlyBetter;
}
function paretoFrontier(nodes){
  return nodes.filter(n=>!nodes.some(o=>o.id!==n.id&&dominatesBiz(o,n)));
}
function sweetSpotScore(n){
  const p=n.profitScore??50;
  const os=n.openScienceScore??50;
  const ov=n.overlapScore||0;
  const dc=n.decen||0;
  const conf=((n.provenance&&n.provenance.confidence)||'low');
  const confBonus=conf==='high'?8:conf==='medium'?4:0;
  const profitBalance=100-Math.min(100,Math.abs(p-42)*1.8);
  return (os*0.44)+(ov*0.28)+(profitBalance*0.2)+(dc*0.08)+confBonus;
}
function analyzeBizLandscape(nodes){
  const fit=computeLinearFit(nodes);
  const outliers=[...fit.residuals].sort((a,b)=>b.absZ-a.absZ);
  const frontier=paretoFrontier(nodes).sort((a,b)=>((b.openScienceScore||0)+(b.overlapScore||0))-((a.openScienceScore||0)+(a.overlapScore||0)));
  const sweet=[...nodes].map(n=>({node:n,score:sweetSpotScore(n)})).sort((a,b)=>b.score-a.score);
  const pressure=[...nodes].map(n=>({node:n,pressure:(n.profitScore??50)-(n.openScienceScore??50)})).sort((a,b)=>b.pressure-a.pressure);
  return {fit,outliers,frontier,sweet,pressure};
}

const UNESCO_OS_REFERENCE={
  label:'UNESCO Recommendation on Open Science',
  url:'https://www.unesco.org/en/natural-sciences/open-science'
};
const UNESCO_PRINCIPLES=[
  {id:'knowledge',label:'Open scientific knowledge'},
  {id:'infrastructure',label:'Open science infrastructures'},
  {id:'engagement',label:'Open engagement of societal actors'},
  {id:'equity',label:'Equity, fairness and inclusiveness'},
  {id:'transparency',label:'Transparency, reproducibility and scrutiny'},
  {id:'responsibility',label:'Responsibility and accountability'}
];
function inferUnescoPrinciples(n){
  const fin=n.financials||{};
  const text=[n.desc,n.finModel,n.finNote,n.techStack,n.type,n.legalStructure,fin.openScienceAlignment,fin.openScienceAlignmentNote,fin.financialSummary].join(' ').toLowerCase();
  const tags=(n.tags||[]).map(t=>String(t).toLowerCase());
  const overlap=(n.overlapTags||[]).map(t=>String(t).toLowerCase());
  const reasons=[];
  const push=(id,why)=>{
    if(reasons.some(r=>r.id===id))return;
    const meta=UNESCO_PRINCIPLES.find(p=>p.id===id);
    reasons.push({id,label:meta?meta.label:id,why});
  };

  if(fin.researcherPays==='no' || !n.apc || /open access|diamond|public good|commons/.test(text) || overlap.includes('publishing') || overlap.includes('peer-review')){
    push('knowledge','Signals of open dissemination or reduced paywalls for researchers.');
  }
  if(n.stack==='infrastructure' || /open source|repository|data|interoperab|ipfs|protocol|ledger/.test(text) || overlap.includes('data-sovereignty') || overlap.includes('compute')){
    push('infrastructure','Evidence of shared technical infrastructure or interoperable research tooling.');
  }
  if(n.legalStructure==='DAO' || /community|citizen|dao|governance|participatory/.test(text) || overlap.includes('dao-gov') || overlap.includes('citizen-sci')){
    push('engagement','Community governance or participatory science signals societal engagement.');
  }
  if(fin.researcherPays==='no' || /nonprofit|foundation|equity|inclusive|public interest/.test(text) || ['nonprofit','foundation','community','consortium'].includes((n.legalStructure||'').toLowerCase())){
    push('equity','Cost-sharing, nonprofit structures, or public-interest framing supports equitable access.');
  }
  if((n.credScore||0)>=50 || /peer review|reproduc|transparent|audit|proof|verification|citation/.test(text) || overlap.includes('peer-review') || overlap.includes('citation-graph') || overlap.includes('reputation')){
    push('transparency','Focus on verification, peer review, citations, or reproducibility improves scrutiny.');
  }
  if(((n.provenance&&n.provenance.sources)||[]).length>=2 || (n.provenance&&n.provenance.confidence==='high')){
    push('responsibility','Traceable provenance and stronger source confidence improve accountability.');
  }

  const os=n.openScienceScore??fin.openScienceCompatibilityScore??50;
  const riskNotes=[];
  if(n.apc || fin.researcherPays==='yes')riskNotes.push('researcher-facing fees can constrain openness');
  if((n.profitScore??50)>=70)riskNotes.push('high commercial pressure can reduce open-science alignment over time');
  if((n.provenance&&n.provenance.confidence)==='low')riskNotes.push('low evidence confidence weakens certainty of alignment claims');

  const summary=`Score ${os}/100 reflects ${reasons.length} UNESCO-aligned principle signal${reasons.length===1?'':'s'}${riskNotes.length?`; risk checks: ${riskNotes.join('; ')}`:''}.`;
  return {score:os,principles:reasons.slice(0,6),summary,risks:riskNotes,reference:UNESCO_OS_REFERENCE};
}
function renderUnescoProfileBox(n){
  const profile=inferUnescoPrinciples(n);
  const chips=profile.principles.length
    ? `<div class="unesco-list">${profile.principles.map(p=>`<div class="unesco-item"><div class="t">${escapeHtml(p.label)}</div><div class="d">${escapeHtml(p.why)}</div></div>`).join('')}</div>`
    : '<div style="font-size:.76rem;color:var(--text-3);margin-top:8px">No explicit UNESCO-aligned principle evidence detected from current node fields.</div>';
  return `<div class="prov-box"><div class="flabel">Open-science score justification</div><div style="font-size:.8rem;color:var(--text-2);line-height:1.45">${escapeHtml(profile.summary)}</div>${chips}<a class="unesco-ref" href="${profile.reference.url}" target="_blank" rel="noopener">${escapeHtml(profile.reference.label)} -></a></div>`;
}

function renderBiz(){

  const hiRisk=analytics.pressure.slice(0,8).map(x=>x.node).filter(n=>(n.profitScore??50)>=60);
  const bestAligned=[...nodes].filter(n=>n.openScienceScore>=70).sort((a,b)=>(b.openScienceScore-a.openScienceScore)||(a.profitScore-b.profitScore)).slice(0,8);

  const sweet=analytics.sweet.slice(0,8);

    const rev=((d.financials&&d.financials.revenueSources)||[]).slice(0,3).join(', ') || 'revenue model unclear';

    const principleHtml=`<div class="tm" style="margin-top:6px">UNESCO principles: ${pList||'none surfaced'} | <a href="${osProfile.reference.url}" target="_blank" rel="noopener">guideline</a></div>`;
    const pinnedNow=persist || (bizTipPinned && bizTipPinnedNodeId===d.id);

  const quads=[
    {key:'commons',x0:0,x1:50,y0:50,y1:100,fill:'rgba(110,200,155,.05)',label:'Commons-aligned',sub:`${counts['commons']} nodes`,desc:qDefs['commons'].desc},

  const gx=axisLayer.append('g').attr('transform',`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(10));

  gx.selectAll('text').attr('fill','var(--text-2)');
  gy.selectAll('text').attr('fill','var(--text-2)');

  axisLayer.append('text').attr('class','axis-label').attr('x',innerW/2).attr('y',innerH+42).attr('text-anchor','middle').text('Commerciality / Profit Score ->');
  axisLayer.append('text').attr('class','axis-label').attr('transform',`translate(${-50},${innerH/2}) rotate(-90)`).attr('text-anchor','middle').text('Open-science compatibility ->');
  plotLayer.append('line').attr('x1',x(50)).attr('x2',x(50)).attr('y1',0).attr('y2',innerH).attr('stroke','rgba(212,168,83,.35)').attr('stroke-dasharray','6,5');
  plotLayer.append('line').attr('x1',0).attr('x2',innerW).attr('y1',y(50)).attr('y2',y(50)).attr('stroke','rgba(212,168,83,.35)').attr('stroke-dasharray','6,5');

  if(nodes.length>=2){

  const labelSetFns={

  const labelFmt=(d)=>{

    if(currentLabelDetail==='overlap') return `${d.name} | Ov ${d.overlapScore||0}`;
    if(currentLabelDetail==='decen') return `${d.name} | Dc ${d.decen||0}`;

  const labelLinks=labelLayer.selectAll('line').data(labelNodes,d=>d.id).enter().append('line').attr('class','biz-label-link');

    .attr('stroke','rgba(0,0,0,.9)').attr('stroke-width',1.9).attr('paint-order','stroke');

  const placeLabels=()=>{
    const placed=[];
    labelNodes.sort((a,b)=>b.priority-a.priority);
    labelNodes.forEach(lbl=>{
      lbl.text=labelFmt(lbl.node);
      lbl.w=Math.min(260,Math.max(52,lbl.text.length*6+12));
      const r=radius(lbl.node);
      const choices=[
        {dx:r+8,dy:-8,anchor:'start'},
        {dx:-r-8,dy:-8,anchor:'end'},
        {dx:0,dy:r+14,anchor:'middle'},
        {dx:0,dy:-r-14,anchor:'middle'}
      ];
      let best=null,bestPenalty=Infinity;
      choices.forEach(c=>{
        const x1=lbl.node.x+c.dx, y1=lbl.node.y+c.dy;
        const x0=c.anchor==='start'?x1:(c.anchor==='end'?x1-lbl.w:x1-lbl.w/2);
        const xx1=x0+lbl.w, y0=y1-11, yy1=y1+2;
        let penalty=0;
        if(x0<2||xx1>innerW-2||y0<2||yy1>innerH-2)penalty+=560;
        for(const p of placed){if(!(xx1<p.x0||x0>p.x1||yy1<p.y0||y0>p.y1))penalty+=240;}
        penalty+=Math.abs(c.dx)*0.8+Math.abs(c.dy)*0.35;
        if(penalty<bestPenalty){bestPenalty=penalty;best={x:x1,y:y1,anchor:c.anchor,x0,x1:xx1,y0,y1:yy1};}
      });
      lbl.lx=best.x; lbl.ly=best.y; lbl.anchor=best.anchor;
      lbl.linkX=lbl.node.x + Math.sign((best.x-lbl.node.x)||1)*(r+1);
      lbl.linkY=lbl.node.y + (best.y>=lbl.node.y?2.8:-2.8);
      placed.push(best);
    });
    labelTexts.text(d=>d.text).attr('x',d=>d.lx).attr('y',d=>d.ly).attr('text-anchor',d=>d.anchor);

  let tickN=0;

    .force('x',d3.forceX(d=>d.tx).strength(.22))
    .force('y',d3.forceY(d=>d.ty).strength(.22))
    .force('collide',d3.forceCollide(d=>radius(d)+2.8).iterations(3))
    .alpha(1)
    .alphaDecay(.048)
    .velocityDecay(.35)
    .on('tick',()=>{plot.forEach(clampNode);draw()})
    .on('end',()=>{if(labelNodes.length)placeLabels();});

  const zoom=d3.zoom().scaleExtent([0.75,8]).translateExtent([[-innerW*.65,-innerH*.65],[innerW*1.65,innerH*1.65]]).on('zoom',evt=>plotLayer.attr('transform',evt.transform));
  svg.call(zoom).on('dblclick.zoom',null);
  floating.append('button').attr('class','biz-mini-btn').text('Reset zoom').on('click',()=>svg.transition().duration(260).call(zoom.transform,d3.zoomIdentity));
  floating.append('button').attr('class','biz-mini-btn').text('Fullscreen').on('click',()=>{

    else if(fsTarget.requestFullscreen)fsTarget.requestFullscreen().catch(()=>{});
  });
  svg.on('click',evt=>{

  });

function journalStreak(entries){
  if(!entries.length)return 0;
  const days=new Set(entries.map(e=>String(e.date||'').slice(0,10)));
  let n=0;
  let d=new Date();
  for(let i=0;i<400;i++){
    const key=d.toISOString().slice(0,10);
    if(days.has(key))n++;
    else if(i===0){d.setDate(d.getDate()-1);continue;}
    else break;
    d.setDate(d.getDate()-1);
  }
  return n;
}

async function ghPutFile(pathKey,text,shaStoreKey,message){
  if(!GH.ok)return false;
  let sha=localStorage.getItem(shaStoreKey)||'';
  if(!sha){
    try{
      const c=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${pathKey}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});
      if(c.ok){const j=await c.json();sha=j.sha;localStorage.setItem(shaStoreKey,sha)}
    }catch(e){}
  }
  const bytes=new TextEncoder().encode(text);
  let bin='';
  for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  const body={message:message||`Update ${pathKey}`,content:btoa(bin)};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${pathKey}`,{method:'PUT',headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)return false;
  const j=await r.json();
  if(j&&j.content&&j.content.sha)localStorage.setItem(shaStoreKey,j.content.sha);
  return true;
}

}

async function fetchTextWithTimeout(url,ms){
  const t=ms||4200;
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),t);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    if(!r.ok)throw new Error(String(r.status));
    return await r.text();
  }finally{clearTimeout(id)}
}
async function fetchJsonp(url,cbParam,ms){
  return new Promise((resolve,reject)=>{
    const cb='__jsonp_'+Math.random().toString(36).slice(2);
    const src=url+(url.includes('?')?'&':'?')+(cbParam||'callback')+'='+cb;
    const s=document.createElement('script');
    const done=(err,data)=>{
      try{delete window[cb]}catch(e){}
      if(s.parentNode)s.parentNode.removeChild(s);
      clearTimeout(timer);
      err?reject(err):resolve(data);
    };
    const timer=setTimeout(()=>done(new Error('timeout')),ms||6500);
    window[cb]=(data)=>done(null,data);
    s.onerror=()=>done(new Error('jsonp error'));
    s.src=src;
    document.head.appendChild(s);
  });
}
function unwrapRssProxyPayload(text){
  const raw=String(text||'').trim();
  if(!raw)return '';
  if(raw[0]==='{' && raw.includes('"contents"')){
    try{
      const j=JSON.parse(raw);
      if(j&&typeof j.contents==='string'&&j.contents.length>64)return j.contents;
    }catch(e){}
  }
  return raw;
}
function plainFeedText(raw,max){
  const txt=cleanMojibakeString(String(raw||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/gi,' ').replace(/\s+/g,' ').trim());
  if(!txt)return '';
  const cap=max||220;
  return txt.length>cap?txt.slice(0,cap-1).trim()+'...':txt;
}
async function fetchRssText(url){
  const clean=String(url||'').trim();
  if(!clean)return '';
  const refs=[
    'https://api.allorigins.win/get?url='+encodeURIComponent(clean),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(clean),
    'https://r.jina.ai/http://'+clean.replace(/^https?:\/\//,''),
    clean
  ];
  const attempts=refs.map(u=>fetchTextWithTimeout(u,3200).then(unwrapRssProxyPayload).then(t=>{
    if(!t||t.length<64)throw new Error('empty');
    return t;
  }));
  try{return await Promise.any(attempts)}catch(e){return ''}
}

function parseRssItems(xmlText,source,max){
  const cap=max||6;
  if(!xmlText)return [];
  try{
    const doc=new DOMParser().parseFromString(xmlText,'text/xml');
    const ns=[...doc.querySelectorAll('item,entry')].slice(0,cap);
    return ns.map(n=>{
      const title=cleanMojibakeString(n.querySelector('title')?.textContent||'').trim();
      const links=[...n.querySelectorAll('link')];
      const fromRel=links.find(x=>{
        const rel=(x.getAttribute('rel')||'').toLowerCase();
        return !rel || rel==='alternate';
      });
      const linkNode=fromRel||links[0]||null;
      const link=(linkNode?.getAttribute('href')||linkNode?.textContent||n.querySelector('id')?.textContent||'').trim();
      const pub=(n.querySelector('pubDate,updated,published')?.textContent||'').trim();
      const summaryNode=n.querySelector('description,summary,content,content\\:encoded');
      const summary=plainFeedText(summaryNode?.textContent||'',220);
      return {title,link,pubDate:pub,source:source||'rss',summary};
    }).filter(x=>x.title&&/^https?:\/\//i.test(x.link));
  }catch(e){return []}
}

function weightedDatasetTerms(limit){
  const ban=new Set(['infrastructure','application','governance','desci','science','protocol','project']);
  const map=new Map();
  (D.nodes||[]).forEach(n=>{
    const w=1+((n.overlapScore||0)/65)+((n.credScore||0)/95);
    const terms=[n.type,n.stack,...(n.tags||[]),...(n.overlapTags||[])];
    terms.forEach(t0=>{
      const t=String(t0||'').toLowerCase().replace(/[_-]/g,' ').replace(/\s+/g,' ').trim();
      if(!t||t.length<3||ban.has(t))return;
      map.set(t,(map.get(t)||0)+w);
    });
  });
  return [...map.entries()].sort((a,b)=>b[1]-a[1]).slice(0,limit||8).map(([k])=>k);
}

function normalizeHttpUrl(raw){

function normalizeTwitterHandle(raw){
  const s=String(raw||'').trim();
  if(!s)return '';
  if(/^https?:\/\//i.test(s)){
    try{
      const u=new URL(s);
      const p=u.pathname.replace(/^\/+/,'').split('/')[0]||'';
      return /^[A-Za-z0-9_]{1,15}$/.test(p)?p:'';
    }catch(e){return ''}
  }
  const h=s.replace(/^@/,'').trim();
  return /^[A-Za-z0-9_]{1,15}$/.test(h)?h:'';
}

function githubRepoFromRaw(raw){
  const s=String(raw||'').trim();
  if(!s)return '';
  if(/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(s))return s;
  const url=normalizeHttpUrl(s);
  if(!url)return '';
  try{
    const u=new URL(url);
    const host=u.hostname.replace(/^www\./,'').toLowerCase();
    if(host!=='github.com')return '';
    const parts=u.pathname.replace(/^\/+|\/+$/g,'').split('/');
    if(parts.length<2)return '';
    const owner=parts[0]||'';
    const repo=parts[1]||'';
    if(!/^[A-Za-z0-9_.-]+$/.test(owner) || !/^[A-Za-z0-9_.-]+$/.test(repo))return '';
    return `${owner}/${repo}`;
  }catch(e){return ''}
}

function nodeFeedSignals(node){
  const sites=[];
  const domains=[];
  const handles=[];
  const github=[];
  const seenSites=new Set();
  const seenDomains=new Set();
  const seenHandles=new Set();
  const seenRepos=new Set();
  const blockedBases=['x.com','twitter.com','github.com','reddit.com','youtube.com','youtu.be','doi.org','linkedin.com','discord.gg'];
  const addSite=(raw)=>{
    const url=normalizeHttpUrl(raw);
    if(!url)return;
    try{
      const u=new URL(url);
      const host=u.hostname.replace(/^www\./,'').toLowerCase();
      if(blockedBases.some(base=>hostMatchesBase(host,base)))return;
      if(/\.(pdf|png|jpe?g|gif|webp|zip)$/i.test(u.pathname))return;
      const clean=(u.origin+u.pathname).replace(/\/+$/,'') || u.origin;
      if(!seenSites.has(clean)){
        seenSites.add(clean);
        sites.push(clean);
      }
      if(!seenDomains.has(host)){
        seenDomains.add(host);
        domains.push(host);
      }
    }catch(e){}
  };
  const addHandle=(raw)=>{
    const h=normalizeTwitterHandle(raw);
    if(h && !seenHandles.has(h)){
      seenHandles.add(h);
      handles.push(h);
    }
  };
  const addRepo=(raw)=>{
    const r=githubRepoFromRaw(raw);
    if(r && !seenRepos.has(r)){
      seenRepos.add(r);
      github.push(r);
    }
  };
  collectNodeSourceEntries(node).forEach(entry=>{
    const kind=String(entry.kind||'').toLowerCase();
    addHandle(entry.raw);
    addRepo(entry.raw);
    if(!/news|secondary/.test(kind))addSite(entry.raw);
  });
  return {sites,domains,handles,github};
}

function siteFeedCandidates(raw){
  const src=normalizeHttpUrl(raw);
  if(!src)return [];
  try{
    const u=new URL(src);
    const path=u.pathname.replace(/\/+$/,'');
    const stems=[u.origin];
    if(path && !/\.[a-z0-9]{2,6}$/i.test(path))stems.unshift(u.origin+path);
    const suffixes=['/feed','/rss','/rss.xml','/feed.xml','/atom.xml','/blog/feed','/blog/rss.xml','/news/feed','/news/rss.xml','/updates/feed'];
    const out=[];
    stems.forEach(stem=>{
      suffixes.forEach(s=>{
        const url=(stem.replace(/\/+$/,'')+s).replace(/([^:]\/)\/+/g,'$1');
        if(!out.includes(url))out.push(url);
      });
    });
    return out;
  }catch(e){return []}
}

function normalizeYouTubeVideoUrl(raw){
  const s=String(raw||'').trim();
  if(!s)return '';
  const fallback=(id)=>id?`https://www.youtube.com/watch?v=${id}`:'';
  try{
    const u=new URL(s);
    if(u.hostname.includes('youtu.be')){
      const id=u.pathname.replace('/','').trim();
      return /^[A-Za-z0-9_-]{11}$/.test(id)?fallback(id):'';
    }
    if(u.hostname.includes('youtube.com')){
      const id=u.searchParams.get('v')||'';
      return /^[A-Za-z0-9_-]{11}$/.test(id)?fallback(id):'';
    }
  }catch(e){
    if(/^[A-Za-z0-9_-]{11}$/.test(s))return fallback(s);
  }
  return '';
}

}

function relevanceHits(item,intents){
  const toks=feedIntentTokens(intents);
  if(!toks.size)return 0;
  const title=String(item.title||'').toLowerCase();
  const topic=String(item.topic||'').toLowerCase();
  const summary=String(item.summary||'').toLowerCase();
  let hits=0;
  toks.forEach(t=>{
    if(title.includes(t) || topic.includes(t) || summary.includes(t))hits++;
  });
  return hits;
}
function scoreFeedItem(item,intents){
  let s=0;
  const title=String(item.title||'').toLowerCase();
  const topic=String(item.topic||'').toLowerCase();
  const summary=String(item.summary||'').toLowerCase();
  const url=String(item.link||'').toLowerCase();
  const hits=relevanceHits(item,intents);
  s+=hits*2.1;
  if(QUALITY_DOMAIN_RE.test(url))s+=6.2;
  if(/reddit\.com|openrss\.org/.test(url))s+=1.2;
  if(/youtube\.com|youtu\.be/.test(url))s+=1.4;
  if(/x\.com|twitter\.com|nitter\./.test(url))s+=1.2;
  relationWatchNames().slice(0,10).forEach(name=>{
    const low=String(name||'').toLowerCase();
    if(low && (title.includes(low) || topic.includes(low)))s+=2.4;
  });
  PURPOSE_TERMS.forEach(t=>{if(title.includes(t)||topic.includes(t)||summary.includes(t))s+=1.8});
  const ts=Date.parse(item.pubDate||'');
  if(!Number.isNaN(ts)){
    const ageDays=(Date.now()-ts)/86400000;
    s+=Math.max(0,3.2-(ageDays/18));
  }
  if(/opinion|sponsored|advertorial|press release/i.test(title))s-=1.6;
  return s;
}
function rankFeedItems(items,intents,limit,opt){
  const minHits=(opt&&Number.isFinite(opt.minHits))?opt.minHits:0;
  return uniqByLink(items).map(it=>{
    const hits=relevanceHits(it,intents);
    return {it,hits,score:scoreFeedItem(it,intents)};
  }).filter(x=>x.hits>=minHits).sort((a,b)=>b.score-a.score).slice(0,limit||12).map(x=>x.it);
}
function googleNewsQueryItem(query,prefix){
  const q=String(query||'').trim();
  if(!q)return null;
  return {
    title:`${prefix||'News query'}: ${q}`,
    link:'https://news.google.com/search?q='+encodeURIComponent(q)+'&hl=en-US&gl=US&ceid=US:en',
    source:'query',
    topic:q
  };
}
function feedSourceKind(item){
  const url=String(item&&item.link||'').toLowerCase();
  const source=String(item&&item.source||'').toLowerCase();
  if(/github\.com/.test(url) || source==='github')return 'github';
  if(/x\.com|twitter\.com|nitter\./.test(url) || /\bx\b|twitter/.test(source))return 'x';
  if(/reddit\.com|openrss\.org/.test(url) || source==='reddit')return 'reddit';
  if(/youtube\.com|youtu\.be/.test(url) || /youtube/.test(source))return 'video';
  if(/google news|news/.test(source) || /news/.test(url))return 'news';
  if(/blog|official/.test(source))return 'blog';
  return 'general';
}
function feedItemTimestampMs(item){
  const ts=Date.parse(item&&item.pubDate||'');
  return Number.isFinite(ts)?ts:null;
}
function isLowSignalFeedItem(item){
  const title=String(item&&item.title||'').trim().toLowerCase();
  const summary=String(item&&item.summary||'').trim().toLowerCase();
  const url=String(item&&item.link||'').trim().toLowerCase();
  if(!title || title.length<6)return true;
  if(/^(home|index|rss|feed)$/i.test(title))return true;
  if(/for all things .*science/.test(title) && /reddit|openrss/.test(url))return true;
  if(/reddit\.com\/r\/[^/]+\/?$/.test(url) || /reddit\.com\/r\/[^/]+\/new\/?$/.test(url))return true;
  if(summary && summary===title && /reddit|openrss/.test(url))return true;
  return false;
}
function isFreshFeedItem(item){
  const kind=feedSourceKind(item);
  const ts=feedItemTimestampMs(item);
  if(ts===null)return !['x','reddit'].includes(kind);
  const ageDays=(Date.now()-ts)/86400000;
  if(kind==='x')return ageDays<=30;
  if(kind==='reddit')return ageDays<=45;
  if(kind==='github')return ageDays<=180;
  if(kind==='video')return ageDays<=120;
  if(kind==='news')return ageDays<=240;
  if(kind==='blog')return ageDays<=365;
  return ageDays<=300;
}
function curateLiveFeedPool(items){
  return (items||[]).filter(it=>!isLowSignalFeedItem(it) && isFreshFeedItem(it));
}

function zoteroPaperSuggestions(limit){
  if(!zoteroItems||!zoteroItems.length)return [];
  const out=[];
  zoteroItems.forEach(it=>{
    const d=it&&it.data;
    if(!d||!d.title)return;
    const key=(it.key||d.key||d.title);
    const prog=litProgressFor(String(key));
    const unread=!(prog&&prog.yash&&(prog.yash.read||prog.yash.reviewed));

function loadHomeFeedCache(){
  try{
    localStorage.removeItem('home-feed-cache-v2');
    localStorage.removeItem('home-feed-cache-v3');
    localStorage.removeItem('home-feed-cache-v6');
    const raw=localStorage.getItem(HOME_FEED_CACHE_KEY);
    if(!raw)return;
    const j=JSON.parse(raw);
    if(!j||typeof j!=='object')return;
    if(Number(j.version||0)!==HOME_FEED_CACHE_VERSION)return;
    const fetchedAt=Number(j.fetchedAt||0)||0;
    if(!fetchedAt || (Date.now()-fetchedAt)>HOME_FEED_STALE_MS)return;
    const allItems=(j.sections&&Array.isArray(j.sections.all))?j.sections.all:(Array.isArray(j.items)?j.items:[]);
    homeFeedState={
      items:Array.isArray(j.items)?j.items:allItems,
      sections:{all:Array.isArray(allItems)?allItems:[]},
      lastUpdated:j.lastUpdated||''
    };
    homeFeedLastFetchMs=fetchedAt;
  }catch(e){}
}
function saveHomeFeedCache(){
  try{
    localStorage.setItem(HOME_FEED_CACHE_KEY,JSON.stringify({
      version:HOME_FEED_CACHE_VERSION,
      items:homeFeedState.items||[],
      sections:{all:(homeFeedState.sections&&homeFeedState.sections.all)||homeFeedState.items||[]},
      lastUpdated:homeFeedState.lastUpdated||'',
      fetchedAt:homeFeedLastFetchMs||Date.now()

function asciiSignalBackdrop(cols,rows,phase){
  const w=Math.max(120,cols||120);
  const h=Math.max(34,rows||34);
  const p=Number(phase||0);
  const g=Array.from({length:h},()=>Array.from({length:w},()=> ' '));
  const put=(x,y,ch)=>{
    if(x>=0 && x<w && y>=0 && y<h)g[y][x]=ch;
  };
  const place=(x,y,text)=>{
    if(y<0||y>=h)return;
    [...String(text||'')].forEach((ch,i)=>put(x+i,y,ch));
  };
  const skyLimit=Math.max(9,Math.floor(h*0.46));
  const starCount=Math.max(42,Math.floor(w*0.55));
  for(let i=0;i<starCount;i++){
    const x=2+((i*17)+(p*5))%(w-4);
    const y=1+((i*7)+(i%11))%Math.max(6,skyLimit-1);
    const glyph=((i+p)%19===0)?'*':(((i+p)%7===0)?'o':'.');
    put(x,y,glyph);
  }
  const moonX=Math.max(8,Math.floor(w*0.11));
  const moonY=Math.max(3,Math.floor(h*0.1));
  [
    "      _..._      ",
    "   .::     ::.   ",
    "  .:   .-.   :.  ",
    "  :   (   )   :  ",
    "  :    `-`   .:  ",
    "   :.       .:   ",
    "     `-...-'     "
  ].forEach((line,i)=>place(moonX,moonY+i,line));
  const cloud=["    .--.      .--.    "," .-(    ).--.(    )-. ","(___.__)    (___.__)  "];
  cloud.forEach((line,i)=>place(Math.max(24,Math.floor(w*0.34)+(p%2)),Math.max(4,Math.floor(h*0.14))+i,line));
  cloud.forEach((line,i)=>place(Math.max(18,Math.floor(w*0.64)-(p%2)),Math.max(7,Math.floor(h*0.21))+i,line));
  const ridge=(x,base,a,b,c)=>Math.round(base+Math.sin(x*a+0.8)*b+Math.sin(x*c+1.7));
  for(let x=0;x<w;x++){
    const far=ridge(x,h*0.55,0.045,2.2,0.11);
    const mid=ridge(x,h*0.66,0.038,2.8,0.09);
    const near=ridge(x,h*0.77,0.03,1.9,0.08);
    put(x,Math.min(h-3,far),x%5===0?'^':'.');
    put(x,Math.min(h-2,mid),'_');
    put(x,Math.min(h-1,near),x%3===0?'~':'_');
    if(x%8===0 && far>2){put(x,far-1,'/');put(x+1,far-1,'\\');}
  }
  const waterY=Math.min(h-4,Math.floor(h*0.82));
  for(let x=0;x<w;x++){
    const wave=((x+p)%9===0)?'~':(((x+p)%5===0)?'.':' ');
    if(wave!==' ')put(x,waterY+(x%17===0?1:0),wave);
  }
  const cabinX=Math.max(8,Math.floor(w*0.14));
  const cabinY=Math.max(11,Math.floor(h*0.61));
  [
    "       (  )      ",
    "        )(       ",
    "       (  )      ",
    "      /\\         ",
    "     /  \\___     ",
    "    /______/\\    ",
    "    | []  | |    ",
    "    |  _  | |    ",
    "    |_____|_/    "
  ].forEach((line,i)=>place(cabinX,cabinY+i,line));
  const treeA=["   /\\   ","  /**\\  "," /****\\ ","   ||   "];
  const treeB=["   /\\   ","  /++\\  "," /++++\\ ","   ||   "];
  treeA.forEach((line,i)=>place(Math.max(4,cabinX-10),cabinY+3+i,line));
  treeB.forEach((line,i)=>place(Math.min(w-12,cabinX+22),cabinY+4+i,line));
  const catX=Math.max(18,Math.floor(w*0.57));
  const catY=Math.max(12,Math.floor(h*0.76));
  [" /\\_/\\\\ ","( =.= )"," /   \\\\ "].forEach((line,i)=>place(catX,catY+i,line));
  const lanternX=Math.max(22,Math.floor(w*0.8));
  const lanternY=Math.max(10,Math.floor(h*0.58));
  ["   .-.   ","  ( * )  ","   \\|/   ","    |    ","   / \\   "].forEach((line,i)=>place(lanternX,lanternY+i,line));
  for(let i=0;i<10;i++){
    const x=Math.max(4,Math.floor(w*0.18)+((i*11+p*2)%(Math.max(18,Math.floor(w*0.56)))));
    const y=Math.max(8,Math.floor(h*0.52)+((i*5+p)%7));
    put(x,y,(i+p)%4===0?'*':'o');
  }
  return g.map(row=>row.join('')).join('\n');
}

function opportunityDateValue(op){
  const raw=String((op&&op.deadline)||'').trim();
  if(!raw)return null;
  const ms=Date.parse(raw);
  return Number.isFinite(ms)?ms:null;
}
function opportunityIsUpcoming(op){
  const ms=opportunityDateValue(op);
  if(ms===null)return false;
  return ms>=Date.now();
}

  return cleanMojibakeString(op&&op.deadlineLabel||'Rolling');

function opportunityMatch(op){
  const q=String(grantState.query||'').trim().toLowerCase();
  if(q){
    const hay=[op.name,op.track,op.niche,op.eligibility,op.why,op.mapContext,(op.tags||[]).join(' '),(op.region||[]).join(' ')]
      .filter(Boolean).join(' ').toLowerCase();
    if(!hay.includes(q))return false;
  }
  if(grantState.track!=='all' && op.track!==grantState.track)return false;
  if(grantState.region!=='all' && !(op.region||[]).includes(grantState.region))return false;
  if(grantState.status!=='all' && op.status!==grantState.status)return false;
  if(grantState.tag!=='all' && !(op.tags||[]).includes(grantState.tag))return false;
  return true;
}
function opportunitySortValue(op,key){
  if(key==='name')return String(op.name||'').toLowerCase();
  if(key==='track')return String(op.track||'').toLowerCase();
  if(key==='region')return String((op.region&&op.region[0])||'').toLowerCase();
  if(key==='amount'){
    const v=op.amountSort;
    return v===null||v===undefined?-1:Number(v);
  }
  if(key==='scale'){
    const v=op.scaleSort;
    return v===null||v===undefined?-1:Number(v);
  }
  const ms=opportunityDateValue(op);
  return ms===null?Number.POSITIVE_INFINITY:ms;
}
function compareOpportunities(a,b){
  const key=grantState.sortKey||'deadline';
  const dir=(grantState.sortDir==='desc'?-1:1);
  const av=opportunitySortValue(a,key);
  const bv=opportunitySortValue(b,key);
  if(av===bv)return String(a.name||'').localeCompare(String(b.name||''));
  if(typeof av==='string' || typeof bv==='string')return String(av).localeCompare(String(bv))*dir;
  return ((av>bv)?1:-1)*dir;
}
function visibleOpportunities(){
  return OPPORTUNITIES.filter(opportunityMatch).sort(compareOpportunities);
}
function ensureGrantSelection(rows){
  const selected=rows.find(op=>op.id===grantState.selected);
  if(selected)return selected;
  const fallback=rows.find(op=>opportunityIsUpcoming(op))||rows[0]||null;
  grantState.selected=fallback?fallback.id:'';
  return fallback;
}

function litProgressFor(key){
  D.litProgress=D.litProgress||{};
  if(!D.litProgress[key])D.litProgress[key]={yash:{read:false,reviewed:false},ruhi:{read:false,reviewed:false}};
  return D.litProgress[key];
}
function toggleLitStatus(keyEnc,person,field,val){
  const key=decodeURIComponent(keyEnc);
  const p=litProgressFor(key);
  if(!p[person])p[person]={read:false,reviewed:false};
  p[person][field]=!!val;
  save();
}
function renderLitTable(){
  const c=el('zotC');

  if(!zoteroItems||!zoteroItems.length){c.innerHTML='<div class="lite-note">No Zotero items loaded.</div>';return;}
  const q=(litQuery||'').toLowerCase();
  const rows=zoteroItems.filter(i=>i&&i.data&&i.data.title).filter(i=>{
    if(!q)return true;
    const d=i.data;
    const txt=[d.title,d.abstractNote,(d.creators||[]).map(x=>x.lastName).join(' '),d.publicationTitle].join(' ').toLowerCase();
    return txt.includes(q);
  });
  c.innerHTML=`<div class="lit-table-wrap"><table class="lit-table"><thead><tr><th style="min-width:280px">Title</th><th>Authors</th><th>Year</th><th>Source</th><th>Yash</th><th>Ruhi</th></tr></thead><tbody>${rows.map(it=>{
    const d=it.data;
    const key=encodeURIComponent(it.key||d.key||d.title);
    const prog=litProgressFor(decodeURIComponent(key));
    const authors=(d.creators||[]).map(a=>a.lastName||a.name).filter(Boolean).slice(0,4).join(', ');
    const year=(String(d.date||'').match(/\d{4}/)||[''])[0];
    const link=d.url|| (d.DOI?`https://doi.org/${d.DOI}`:'');
    return `<tr><td><div style="font-weight:600;line-height:1.35">${escapeHtml(cleanMojibakeString(d.title||''))}</div>${link?`<div class="status-inline"><a href="${escapeHtml(link)}" target="_blank" rel="noopener">Open</a></div>`:''}</td><td>${escapeHtml(authors||'')}</td><td>${escapeHtml(year||'')}</td><td><span class="lit-pill">${escapeHtml(d.publicationTitle||d.itemType||'')}</span></td><td><div class="lit-person"><label><input type="checkbox" ${prog.yash.read?'checked':''} onchange="toggleLitStatus('${key}','yash','read',this.checked)">Read</label><label><input type="checkbox" ${prog.yash.reviewed?'checked':''} onchange="toggleLitStatus('${key}','yash','reviewed',this.checked)">Reviewed</label></div></td><td><div class="lit-person"><label><input type="checkbox" ${prog.ruhi.read?'checked':''} onchange="toggleLitStatus('${key}','ruhi','read',this.checked)">Read</label><label><input type="checkbox" ${prog.ruhi.reviewed?'checked':''} onchange="toggleLitStatus('${key}','ruhi','reviewed',this.checked)">Reviewed</label></div></td></tr>`;
  }).join('')}</tbody></table></div>`;
}

async function fetchZotero(force){
  try{
    if(force)zoteroItems=null;
    const r=await fetch('https://api.zotero.org/groups/6075364/items?format=json&limit=120&sort=dateModified&direction=desc');
    if(!r.ok)throw new Error('zotero fetch failed');
    zoteroItems=cleanMojibakeDeep(await r.json());
    renderLitTable();
  }catch(e){
    const c=el('zotC');
    if(c)c.innerHTML='<div class="lite-note">Could not load Zotero right now. Check network/group visibility and try refresh.</div>';
  }
}

    ${fin.openScienceAlignment&&fin.openScienceAlignment!=='unknown'?`<div style="font-size:.8rem;color:var(--text-2);line-height:1.45;margin-top:6px">Open-science alignment: <strong style="color:${osC(osScore)};text-transform:capitalize">${fin.openScienceAlignment}</strong></div>`:''}
    ${fin.openScienceCompatibilityReasons&&fin.openScienceCompatibilityReasons.length?`<div style="font-size:.78rem;color:var(--text-3);line-height:1.5;margin-top:6px">Compatibility drivers: ${fin.openScienceCompatibilityReasons.join('; ')}.</div>`:''}
    ${fin.openScienceAlignmentNote?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:6px">${fin.openScienceAlignmentNote}</div>`:''}
    ${prov.notes?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:8px">${prov.notes}</div>`:''}
    ${srcHtml?`<div class="src-list">${srcHtml}</div>`:'<div style="font-size:.78rem;color:var(--text-3);margin-top:8px">No external source links attached yet.</div>'}
  </div>
  ${renderUnescoProfileBox(n)}
  <div class="field"><div class="flabel">Type</div><input class="finput" value="${n.type||''}" onchange="upd('${id}','type',this.value)"></div>
  <div class="field"><div class="flabel">Stage</div><input class="finput" value="${n.stage||''}" onchange="upd('${id}','stage',this.value)"></div>
  <div class="field"><div class="flabel">Website</div><input class="finput" value="${n.web||''}" onchange="upd('${id}','web',this.value)"></div>
  <div class="field"><div class="flabel">Tech Stack</div><textarea class="finput" onchange="upd('${id}','techStack',this.value)">${n.techStack||''}</textarea></div>
  <div class="field"><div class="flabel">Notes</div><textarea class="finput" onchange="upd('${id}','notes',this.value)">${n.notes||''}</textarea></div>
  ${ppl.length?`<div class="field"><div class="flabel">People</div><ul class="rel-list">${ppl.map(pp=>`<li class="rel-item"><span>${pp.name}</span></li>`).join('')}</ul></div>`:''}
  ${rels.length?`<div class="field"><div class="flabel">Relations</div><ul class="rel-list">${rels.map(r=>{const other=r.s===id?r.t:r.s;const on=D.nodes.find(x=>x.id===other)?.name||other;const c=RB[r.type]||{b:'var(--raised)',c:'var(--text-3)'};return`<li class="rel-item"><span class="rel-badge" style="background:${c.b};color:${c.c}">${r.type}</span><span>${on}</span>${r.l?`<span style="color:var(--text-3);font-size:.72rem">| ${r.l}</span>`:''}</li>`}).join('')}</ul></div>`:''}`;
  sanitizeVisibleText(p);
  el('app').classList.remove('hide-right');
}

// ===== EXPORT / IMPORT =====
function expJSON(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='desci-landscape.json';a.click()}
function impFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    try{
      if(f.name.endsWith('.json')){D=cleanMojibakeDeep(JSON.parse(e.target.result));D.nodes.forEach(n=>{n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.finModel=n.finModel||'';n.legalStructure=n.legalStructure||'unknown';n.apc=n.apc||false;n.profitScore=n.profitScore??50;n.openScienceScore=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);n.finNote=n.finNote||'';n.fundingRaised=n.fundingRaised||'';n.provenance=n.provenance||{confidence:'low',hasUnverifiedClaims:true,sources:[],lastVerified:'',notes:''};n.financials=n.financials||{revenueSources:[],researcherPays:'unknown',institutionPays:'unknown',openScienceAlignment:'unknown',openScienceAlignmentNote:'',scoreBreakdown:{},openScienceCompatibilityScore:50,openScienceCompatibilityBand:'moderate',scoreAudit:{}};if(n.financials&&n.financials.openScienceCompatibilityScore==null)n.financials.openScienceCompatibilityScore=n.openScienceScore??50;n.sourceAsterisk=!!n.sourceAsterisk})}
      else if(f.name.endsWith('.csv')){const p=Papa.parse(e.target.result,{header:true});p.data.forEach(row=>{row=cleanMojibakeDeep(row);if(!row.id)return;const ex=D.nodes.find(n=>n.id===row.id);if(ex)Object.assign(ex,row);else D.nodes.push({...row,tags:(row.tags||'').split(','),s1:+row.s1||0,s2:+row.s2||0,s3:+row.s3||0,s4:+row.s4||0,s5:+row.s5||0,decen:+row.decen||50,cf:{},overlapTags:[],credScore:0,profitScore:50})})}
      D=cleanMojibakeDeep(D);
      save();render();updateSB();updateStats();buildPills();
    }catch(err){alert('Import error: '+err.message)}
  };r.readAsText(f);inp.value='';
}

// ===== GITHUB SYNC =====
const GH={get owner(){return localStorage.getItem('gh-owner')||''},get repo(){return localStorage.getItem('gh-repo')||''},get token(){return localStorage.getItem('gh-token')||''},get path(){return localStorage.getItem('gh-path')||'data.json'},get ok(){return!!(this.owner&&this.repo&&this.token)}};
function detectGHPages(){const h=location.hostname;if(h.endsWith('.github.io')){const o=h.replace('.github.io','');const r=location.pathname.split('/').filter(Boolean)[0]||o+'.github.io';if(!localStorage.getItem('gh-owner'))localStorage.setItem('gh-owner',o);if(!localStorage.getItem('gh-repo'))localStorage.setItem('gh-repo',r);if(!localStorage.getItem('gh-path'))localStorage.setItem('gh-path','data.json')}}
function promptToken(){if(GH.token)return true;const t=prompt('GitHub PAT (fine-grained, Contents read+write):');if(!t)return false;localStorage.setItem('gh-token',t.trim());return true}
function setSyncUI(state,msg){const s=el('syncStatus'),t=el('syncText');s.className='sync-status'+(state==='ok'?' synced':state==='err'?' error':'');t.textContent=msg}
let pushTimer=null;
function debouncedPush(){if(!GH.ok)return;clearTimeout(pushTimer);setSyncUI('','saving...');pushTimer=setTimeout(()=>ghPush(),2000)}
async function ghPull(){
  if(!GH.ok){detectGHPages();if(!promptToken())return}
  if(!GH.ok)return;
  setSyncUI('','pulling...');
  try{
    const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===404){setSyncUI('ok','no remote');return}
    if(r.status===401||r.status===403){localStorage.removeItem('gh-token');setSyncUI('err','bad token');return}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const raw=atob(j.content.replace(/\n/g,''));
    D=cleanMojibakeDeep(JSON.parse(raw));
    localStorage.setItem('gh-sha',j.sha);
    D.nodes.forEach(n=>{n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.notes=n.notes||''});
    D.journal=D.journal||[];
    D.litProgress=D.litProgress||{};
    D.homeWatch=D.homeWatch||{videos:[],playlists:[]};
    if(!Array.isArray(D.homeWatch.videos))D.homeWatch.videos=[];
    if(!Array.isArray(D.homeWatch.playlists))D.homeWatch.playlists=[];
    D.kanban=D.kanban||seedKanbanFromData();
    save(true);
    render();updateSB();updateStats();buildPills();
    setSyncUI('ok','synced');
  }catch(e){setSyncUI('err',e.message)}
}
async function ghPush(){if(!GH.ok)return;setSyncUI('','pushing...');try{let sha=localStorage.getItem('gh-sha')||'';if(!sha){try{const c=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});if(c.ok){const j=await c.json();sha=j.sha}}catch(e){}}const text=JSON.stringify(D,null,2);const bytes=new TextEncoder().encode(text);let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);const body={message:'Update '+new Date().toISOString().slice(0,16),content:btoa(bin)};if(sha)body.sha=sha;const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{method:'PUT',headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(r.status===409){setSyncUI('','conflict...');await ghPull();await ghPush();return}if(!r.ok){const e=await r.json();throw new Error(e.message||'HTTP '+r.status)}const result=await r.json();localStorage.setItem('gh-sha',result.content.sha);setSyncUI('ok','saved')}catch(e){setSyncUI('err',e.message)}}
function autoSync(){detectGHPages();if(GH.ok)ghPull()}
function onSyncClick(){if(!GH.ok){detectGHPages();if(promptToken())ghPull()}else ghPush()}

init();
window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(()=>{render()},300)});
</script>
