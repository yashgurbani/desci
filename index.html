<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeSci Landscape</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
:root {
  --bg:#000;--surface:#0a0a0a;--card:#141414;--raised:#1e1e1e;
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.14);
  --text:#eaeaea;--text-2:#a0a0a0;--text-3:#606060;
  --gold:#d4a853;--gold-dim:#b8923e;--gold-glow:rgba(212,168,83,.08);
  --sage:#8ae8ba;--rose:#ff9abb;--teal:#74ddd7;
  --red:#e05c5c;--blue:#5c9ee0;
  --mono:'Fira Code',monospace;--display:'Playfair Display',Georgia,serif;
  --body:'Nunito Sans',system-ui,sans-serif;
  --radius:8px;--radius-sm:5px;
  --graph-label:#d6d6d6;
  --link:#7fcfff;--link-h:#b7e6ff;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;color-scheme:dark;scrollbar-color:#2a2a2a #050505}
body{font-family:var(--body);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--link);text-decoration:none}
a:hover{color:var(--link-h)}
.sidebar,.detail,.node-list,.table-wrap,.people-grid,.lit-panel,.modal{scrollbar-width:thin;scrollbar-color:#2a2a2a #050505}
.sidebar::-webkit-scrollbar,.detail::-webkit-scrollbar,.node-list::-webkit-scrollbar,.table-wrap::-webkit-scrollbar,.people-grid::-webkit-scrollbar,.lit-panel::-webkit-scrollbar,.modal::-webkit-scrollbar{width:12px;height:12px}
.sidebar::-webkit-scrollbar-track,.detail::-webkit-scrollbar-track,.node-list::-webkit-scrollbar-track,.table-wrap::-webkit-scrollbar-track,.people-grid::-webkit-scrollbar-track,.lit-panel::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track{background:#050505}
.sidebar::-webkit-scrollbar-thumb,.detail::-webkit-scrollbar-thumb,.node-list::-webkit-scrollbar-thumb,.table-wrap::-webkit-scrollbar-thumb,.people-grid::-webkit-scrollbar-thumb,.lit-panel::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb{background:#2a2a2a;border:2px solid #050505;border-radius:999px}
.sidebar::-webkit-scrollbar-thumb:hover,.detail::-webkit-scrollbar-thumb:hover,.node-list::-webkit-scrollbar-thumb:hover,.table-wrap::-webkit-scrollbar-thumb:hover,.people-grid::-webkit-scrollbar-thumb:hover,.lit-panel::-webkit-scrollbar-thumb:hover,.modal::-webkit-scrollbar-thumb:hover{background:#3a3a3a}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr 360px;grid-template-rows:52px 1fr;height:100vh}
.app.hide-left{grid-template-columns:0px 1fr 360px}
.app.hide-right{grid-template-columns:240px 1fr 0px}
.app.hide-left.hide-right{grid-template-columns:0px 1fr 0px}

/* HEADER */
.header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:14px;z-index:10}
.logo{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.stats{font-size:.72rem;color:var(--text-3);font-family:var(--mono);white-space:nowrap}
.tabs{display:flex;gap:2px;margin-left:12px}
.tab{font-size:.75rem;font-weight:600;padding:7px 14px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;color:var(--text-3);cursor:pointer;transition:all .15s;font-family:var(--body)}
.tab:hover{color:var(--text-2);border-color:var(--border)}
.tab.on{border-color:rgba(212,168,83,.3);color:var(--gold);background:var(--gold-glow)}
.actions{margin-left:auto;display:flex;gap:6px;align-items:center}
.btn{font-size:.72rem;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--body);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-fill{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-fill:hover{background:var(--gold-dim)}
.btn-x{border-color:var(--red);color:var(--red)}
.sync-status{font-size:.65rem;color:var(--text-3);cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:14px;transition:all .15s}
.sync-status.synced{border-color:rgba(92,184,122,.3);color:var(--sage)}
.sync-status.error{border-color:rgba(224,92,92,.3);color:var(--red)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* SIDEBAR */
.sidebar{grid-column:1;grid-row:2;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 14px;min-width:0;min-height:0}
.app.hide-left .sidebar{display:none}
.sb-section{margin-bottom:18px}
.sb-label{font-family:var(--mono);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin-bottom:8px}
.sb-search{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;font-family:var(--body);transition:border-color .2s}
.sb-search:focus{outline:none;border-color:rgba(212,168,83,.4)}
.sb-search::placeholder{color:var(--text-3)}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:.72rem;font-weight:500;padding:5px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;font-family:var(--body)}
.pill:hover{color:var(--text-2);border-color:var(--border-h)}
.pill.on{border-color:rgba(212,168,83,.35);color:var(--gold);background:var(--gold-glow)}
.node-list{list-style:none;margin-top:4px;max-height:40vh;overflow-y:auto}
.nli{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:.88rem;transition:background .12s}
.nli:hover{background:var(--card)}
.nli.sel{background:var(--gold-glow)}
.nli-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nli-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SLIDER FILTER */
.slider-filter{margin-bottom:14px}
.sf-label{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-3);font-family:var(--mono);margin-bottom:3px}
.sf-range{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--raised);outline:none}
.sf-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}

/* MAIN */
.main{grid-column:2;grid-row:2;position:relative;overflow:hidden;background:var(--bg);min-width:0;min-height:0}
.main svg{width:100%;height:100%}

/* TOGGLE */
.toggle-left,.toggle-right{position:absolute;z-index:5;width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .15s}
.toggle-left{top:12px;left:12px}
.toggle-right{top:12px;right:12px}
.toggle-left:hover,.toggle-right:hover{border-color:var(--gold);color:var(--gold)}

/* DETAIL */
.detail{grid-column:3;grid-row:2;background:var(--surface);border-left:1px solid var(--border);padding:24px 20px;overflow-y:auto;min-width:0;min-height:0}
.app.hide-right .detail{display:none}
.det-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.9rem;font-style:italic}
.det-name{font-family:var(--display);font-size:1.5rem;font-weight:600;line-height:1.2;margin-bottom:4px}
.det-sub{font-size:.88rem;color:var(--text-2);margin-bottom:20px}
.field{margin-bottom:16px}
.flabel{font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:5px}
.finput{width:100%;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.88rem;font-family:var(--body);transition:border-color .2s}
.finput:focus{outline:none;border-color:rgba(212,168,83,.4)}
textarea.finput{resize:vertical;min-height:80px;line-height:1.5}
select.finput{appearance:none;cursor:pointer}
.tag-row{display:flex;flex-wrap:wrap;gap:5px}
.tag-chip{font-size:.72rem;font-weight:500;padding:4px 10px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:var(--text-2);display:inline-flex;align-items:center;gap:5px}
.tag-chip .rm{cursor:pointer;opacity:.4}
.tag-chip .rm:hover{opacity:1;color:var(--red)}

.strata{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.stm{text-align:center;padding:8px 3px;border-radius:var(--radius-sm);font-family:var(--mono);font-size:.68rem;line-height:1.3;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.stm:hover{border-color:var(--gold)}
.stm[data-v="3"]{background:rgba(110,200,155,.15);border-color:rgba(110,200,155,.3);color:var(--sage)}
.stm[data-v="2"]{background:rgba(212,168,83,.1);border-color:rgba(212,168,83,.2);color:var(--gold)}
.stm[data-v="1"]{background:rgba(232,126,154,.1);border-color:rgba(232,126,154,.2);color:var(--rose)}
.rel-list{list-style:none}
.rel-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.rel-badge{font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.stack-chip{font-family:var(--mono);font-size:.6rem;font-weight:600;padding:3px 8px;border-radius:4px;display:inline-block}
/* Overlap box */
.overlap-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px}
.overlap-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.overlap-bar-bg{flex:1;height:8px;background:var(--raised);border-radius:4px;overflow:hidden}
.overlap-bar-fill{height:100%;border-radius:4px;transition:width .3s}

/* PEOPLE */
.people-grid{padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;overflow-y:auto;height:100%;align-content:start}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .2s}
.p-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.p-name{font-family:var(--display);font-size:1.05rem;font-weight:600;margin-bottom:3px}
.p-role{font-size:.8rem;color:var(--text-2);line-height:1.4;margin-bottom:8px}
.p-links{display:flex;gap:10px;font-size:.75rem}
.p-links a{color:var(--link);text-decoration:none}
.p-orgs{font-family:var(--mono);font-size:.65rem;color:var(--text-3);margin-top:8px}

/* TABLE */
.table-wrap{overflow:auto;height:100%;padding:12px}
table.dtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem}
.dtbl th{position:sticky;top:0;z-index:2;background:var(--surface);padding:10px 10px;text-align:left;font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--border-h)}
.dtbl th:hover{color:var(--gold)}
.dtbl td{padding:7px 10px;border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtbl tbody tr{transition:background .1s}
.dtbl tbody tr:hover{background:var(--card)}
.dtbl tbody tr.sel{background:var(--gold-glow)}
.ob{display:flex;align-items:center;gap:5px}
.ob-bar{width:40px;height:5px;background:var(--raised);border-radius:3px;overflow:hidden}
.ob-fill{height:100%;border-radius:3px}

/* LITERATURE */
.lit-panel{padding:24px;overflow-y:auto;height:100%}
.lit-title{font-family:var(--display);font-size:1.3rem;margin-bottom:18px}
.paper{padding:14px 0;border-bottom:1px solid var(--border)}
.paper-t{font-family:var(--display);font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.paper-a{font-size:.75rem;color:var(--text-2)}

/* GRAPH */
.legend{position:absolute;bottom:14px;left:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:.7rem;z-index:3;max-width:200px;transition:all .2s}
.legend.collapsed{padding:6px 12px}
.legend.collapsed .legend-body{display:none}
.legend-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.legend-title{font-family:var(--mono);font-weight:600;color:var(--text-2);font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.legend-toggle{font-size:.6rem;color:var(--text-3);cursor:pointer}
.legend-row{display:flex;align-items:center;gap:8px;margin-top:5px;color:var(--text-2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TOOLTIPS */
.tip{position:absolute;z-index:20;pointer-events:none;background:var(--card);border:1px solid var(--border-h);border-radius:var(--radius-sm);padding:10px 14px;max-width:280px;font-size:.8rem;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:opacity .12s}
.tip.vis{opacity:1}
.tip h4{font-family:var(--display);font-size:.9rem;margin-bottom:3px}
.tip .tm{font-size:.72rem;color:var(--text-2);line-height:1.4}
/* Glossary tooltip */
.gloss-tip{position:fixed;z-index:99;background:var(--card);border:1px solid var(--gold);border-radius:var(--radius-sm);padding:8px 12px;max-width:260px;font-size:.78rem;color:var(--text-2);box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .15s}
.gloss-tip.vis{opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px;width:min(520px,90vw);max-height:80vh;overflow-y:auto}
.modal h2{font-family:var(--display);font-size:1.2rem;margin-bottom:16px}
.modal-foot{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

/* EDGE COLORS */
:root {
  --edge-funder:#78dca2;--edge-ecosystem:#76cee0;--edge-partner:#b29aff;
  --edge-overlap:#f0cb5a;--edge-collaborator:#ff9abb;
}

/* CREDIBILITY BADGE */
.cred-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:10px}
.profit-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:10px}
.fin-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.fin-box.commons{border-color:rgba(110,200,155,.25)}
.fin-box.hybrid{border-color:rgba(212,168,83,.25)}
.fin-box.profit{border-color:rgba(224,92,92,.25)}
.fin-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.fin-bar-bg{flex:1;height:8px;background:var(--raised);border-radius:4px;overflow:hidden}
.fin-bar-fill{height:100%;border-radius:4px;transition:width .3s}


.prov-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.conf-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.68rem;padding:3px 8px;border-radius:10px;text-transform:uppercase}
.conf-high{background:rgba(110,200,155,.12);color:var(--sage)}
.conf-medium{background:rgba(212,168,83,.12);color:var(--gold)}
.conf-low{background:rgba(224,92,92,.12);color:var(--red)}
.src-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.src-chip{font-size:.68rem;padding:4px 9px;border-radius:14px;border:1px solid var(--border);background:var(--raised);color:var(--link);display:inline-flex;align-items:center;gap:5px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.score-cell{background:var(--raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 6px;text-align:center}
.score-cell .k{display:block;font-size:.58rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase}
.score-cell .v{display:block;font-size:.78rem;color:var(--text-2);font-weight:600}


/* BUSINESS MODEL VIEW */
.biz-wrap{height:100%;display:flex;flex-direction:column;padding:18px;gap:14px;overflow:auto}
.biz-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.biz-title{font-family:var(--display);font-size:1.2rem;color:var(--text)}
.biz-sub{font-size:.82rem;color:var(--text-2);max-width:860px;line-height:1.5}
.biz-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.biz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.biz-card .k{display:block;font-size:.62rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.biz-card .v{display:block;font-size:1rem;color:var(--text);font-weight:700}
.biz-card .s{display:block;font-size:.74rem;color:var(--text-2);margin-top:4px;line-height:1.4}
.biz-main{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:14px;min-height:0;flex:1}
.biz-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:0}
.biz-svg{width:100%;height:100%;min-height:560px;display:block}
.biz-side-title{font-family:var(--mono);font-size:.66rem;color:var(--text-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:8px}
.biz-list{display:flex;flex-direction:column;gap:8px}
.biz-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:all .15s}
.biz-item:hover{border-color:var(--gold);transform:translateY(-1px)}
.biz-item-name{font-size:.84rem;font-weight:600;color:var(--text)}
.biz-item-meta{font-size:.72rem;color:var(--text-2);margin-top:3px;line-height:1.4}
.biz-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.biz-legend-chip{font-size:.68rem;padding:4px 9px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:var(--text-2)}
.axis-label{font-size:.72rem;fill:var(--text-2);font-family:var(--mono)}
.biz-note{font-size:.74rem;color:var(--text-3);line-height:1.45;margin-top:10px}
.biz-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-top:10px}
.biz-control-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.biz-control-label{font-size:.62rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-right:2px;padding-top:4px}
.biz-mini-btn{font-size:.68rem;padding:4px 9px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text-2);cursor:pointer;transition:all .15s}
.biz-mini-btn:hover{border-color:var(--gold);color:var(--gold)}
.biz-mini-btn.on{border-color:rgba(212,168,83,.35);color:var(--gold);background:var(--gold-glow)}
@media(max-width:1050px){.biz-main{grid-template-columns:1fr}.biz-cards{grid-template-columns:repeat(2,minmax(0,1fr))}}


/* HOME / PURPOSE FEEDS */
.home-wrap{height:100%;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:radial-gradient(circle at top,rgba(116,221,215,.08),rgba(0,0,0,0) 32%),linear-gradient(180deg,#050505,#000)}
.home-hero{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr);gap:14px;align-items:stretch}
.home-card{background:linear-gradient(180deg,rgba(16,16,16,.96),rgba(10,10,10,.98));border:1px solid var(--border);border-radius:14px;padding:16px 17px;box-shadow:0 10px 28px rgba(0,0,0,.26)}
.home-card h1{font-family:var(--display);font-size:1.5rem;line-height:1.15;color:var(--gold);margin-bottom:6px}
.home-card p{font-size:.84rem;color:var(--text-2);line-height:1.55}
.home-mini-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:12px}
.home-stat{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 11px}
.home-stat .k{display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}

<script>
// ===== GLOSSARY =====
const GLOSS={
  'DePIN':'Decentralized Physical Infrastructure Network. Token incentives for real-world hardware/data.',
  'ZK-proofs':'Zero-Knowledge Proofs. Cryptographic method proving something is true without revealing the data.',
  'ZK-SNARKs':'Zero-Knowledge Succinct Non-Interactive Arguments of Knowledge. Compact ZK proofs.',
  'SBT':'Soulbound Token. Non-transferable NFT for identity/credentials.',
  'IP-NFT':'Intellectual Property NFT. Tokenized research IP for on-chain governance.',
  'DAO':'Decentralized Autonomous Organization. Smart contract-governed entity.',
  'PRC':'Publish-Review-Curate. Emerging model decoupling publication from gatekeeping.',
  'BioDAO':'Decentralized organization funding biomedical/biotech research.',
  'EigenTrust':'Graph-based trust propagation algorithm for distributed reputation.',
  'IPFS':'InterPlanetary File System. Decentralized content-addressed storage.',
  'PoW':'Proof of Work. Consensus mechanism using computational work.',
  'PoA':'Proof of Authority. Consensus using approved validator nodes.',
  'POCW':'Proof of Cognitive Work. Consensus using verified cognitive/AI computation.',
  'PoUW':'Proof of Useful Work. Mining that produces scientifically useful computation.',
  'DKG':'Decentralized Knowledge Graph. Distributed semantic data structure.',
  'FHIR':'Fast Healthcare Interoperability Resources. Standard for health data exchange.',
  'TEE':'Trusted Execution Environment. Secure hardware enclave for computation.',
  'Retro-PGF':'Retroactive Public Goods Funding. Rewarding past contributions to public goods.',
  'QF':'Quadratic Funding. Democratic funding mechanism amplifying small donations.',
  'CC0':'Creative Commons Zero. Public domain dedication. No rights reserved.',
  'diamond OA':'Diamond Open Access. No fees for authors or readers. Community-funded.',
  'APC':'Article Processing Charge. Fee charged to authors for open access publishing.',
  'RWA':'Real World Asset. Tokenized representation of physical/legal assets.',
  'LLM':'Large Language Model. AI trained on text for generation/analysis.',
  'ORCID':'Open Researcher and Contributor ID. Persistent researcher identifier.',
  'ICO':'Initial Coin Offering. Token sale to raise capital, often unregulated.',
  'SAFT':'Simple Agreement for Future Tokens. Legal framework for compliant token sales.',
  '501(c)(3)':'US tax-exempt nonprofit organization status.',
  'GmbH':'German limited liability company (Gesellschaft mit beschränkter Haftung).',
  'SAS':'French simplified joint-stock company (Société par Actions Simplifiée).',
  'Verein':'Swiss nonprofit association structure.',
  'Series A':'First major VC funding round after seed, typically $5-15M.',
  'AUM':'Assets Under Management. Total value managed by investment fund.',
  'LP fees':'Liquidity Provider fees. Revenue from automated market maker pools.',
  'veToken':'Vote-escrowed token. Locked governance token that earns protocol fees.',
};

// ===== GLOBALS =====
const el=id=>document.getElementById(id);
let D={nodes:[],edges:[],people:[]};
let view='home',selId=null,sim=null,zoomBehavior=null,svgG=null;
let homeRecoState={items:[],channels:{featured:[],metascience:[],review:[],aiScience:[],scienceProblems:[]},lastUpdated:'',status:'idle'};
let homeRecoFetchMs=0;
let homeMapTimer=null;
let flt={stack:[],type:[],overlap:[],legal:[],conf:[]};
let sortC='overlapScore',sortA=false;
let zoteroItems=null;
let bizLabelSet='notable';
let bizLabelDetail='metrics';

const SC={infrastructure:'var(--sage)',application:'var(--rose)',governance:'var(--teal)'};
const SBG={infrastructure:'rgba(110,200,155,.12)',application:'rgba(232,126,154,.12)',governance:'rgba(90,184,179,.12)'};
const SS={0:'·',1:'○',2:'◐',3:'●'};
const SL=['S1\nData','S2\nLedger','S3\nAI','S4\nProof','S5\nGov'];
const EC={'funder':'var(--edge-funder)','ecosystem':'var(--edge-ecosystem)','partner':'var(--edge-partner)','overlap':'var(--edge-overlap)'};
const RB={funder:{b:'rgba(92,184,122,.2)',c:'var(--sage)'},ecosystem:{b:'rgba(92,170,184,.2)',c:'var(--teal)'},partner:{b:'rgba(155,126,212,.2)',c:'#9b7ed4'},overlap:{b:'rgba(227,190,77,.22)',c:'var(--gold)'}};
const OV_LABELS={"publishing":"Publishing","peer-review":"Peer Review","reputation":"Reputation","dao-gov":"DAO Gov","compute":"Compute","ai-ml":"AI/ML","citation-graph":"Citations","scicomm":"SciComm","citizen-sci":"Citizen Sci","smart-contracts":"Contracts/NFT","data-sovereignty":"Data Sov","ip-nft":"IP-NFT"};

// Profit score color helpers (0=commons/green, 100=profit/red)
function profitC(s){return s<=20?'var(--sage)':s<=40?'var(--teal)':s<=60?'var(--gold)':s<=80?'#e8a87c':'var(--red)'}
function profitBg(s){return s<=20?'rgba(110,200,155,.1)':s<=40?'rgba(116,221,215,.1)':s<=60?'rgba(212,168,83,.1)':s<=80?'rgba(232,168,124,.1)':'rgba(224,92,92,.1)'}
function profitBarC(s){return s<=20?'var(--sage)':s<=40?'var(--teal)':s<=60?'var(--gold)':s<=80?'#e8a87c':'var(--red)'}
function finBoxClass(s){return s<=30?'commons':s<=60?'hybrid':'profit'}
function osC(s){return s>=85?'var(--sage)':s>=70?'var(--teal)':s>=50?'var(--gold)':s>=35?'#e8a87c':'var(--red)'}
function osBg(s){return s>=85?'rgba(110,200,155,.12)':s>=70?'rgba(116,221,215,.12)':s>=50?'rgba(212,168,83,.10)':s>=35?'rgba(232,168,124,.10)':'rgba(224,92,92,.10)'}
function osBand(s){return s>=85?'very strong':s>=70?'strong':s>=50?'moderate':s>=35?'mixed':'weak'}


function confClass(c){return c==='high'?'conf-high':c==='medium'?'conf-medium':'conf-low'}
function confColor(c){return c==='high'?'var(--sage)':c==='medium'?'var(--gold)':'var(--red)'}
function setBizLabelSet(v){bizLabelSet=v;if(view==='biz')render()}
function setBizLabelDetail(v){bizLabelDetail=v;if(view==='biz')render()}

// ===== INIT =====
async function init(){
  // Try loading data.json, fall back to localStorage
  let loaded=false;
  try{
    const r=await fetch('data_codex_home_feeds_improved.json');
    if(r.ok){D=await r.json();loaded=true}
  }catch(e){}
  if(!loaded){
    let s=localStorage.getItem('desci6');
    if(s)try{D=JSON.parse(s)}catch(e){}
  }
  if(!D.nodes||!D.nodes.length){D={nodes:[],edges:[],people:[]}; return}
  D.nodes.forEach(n=>{n.wp=n.wp||'';n.git=n.git||'';n.twitter=n.twitter||'';n.cf=n.cf||{};n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.overlapScore=n.overlapScore||0;n.decentNote=n.decentNote||'';n.techStack=n.techStack||'';n.compNote=n.compNote||'';n.notes=n.notes||'';n.finModel=n.finModel||'';n.legalStructure=n.legalStructure||'unknown';n.apc=n.apc||false;n.profitScore=n.profitScore??50;n.openScienceScore=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);n.finNote=n.finNote||'';n.fundingRaised=n.fundingRaised||'';n.provenance=n.provenance||{confidence:'low',hasUnverifiedClaims:true,sources:[],lastVerified:'',notes:''};n.financials=n.financials||{revenueSources:[],researcherPays:'unknown',institutionPays:'unknown',openScienceAlignment:'unknown',openScienceAlignmentNote:'',scoreBreakdown:{},openScienceCompatibilityScore:50,openScienceCompatibilityBand:'moderate',scoreAudit:{}};if(n.financials&&n.financials.openScienceCompatibilityScore==null)n.financials.openScienceCompatibilityScore=n.openScienceScore??50;n.sourceAsterisk=!!n.sourceAsterisk});
  D.edges=(D.edges||[]).map(e=>e.type==='collaborator'?({...e,type:'partner'}):e);
  if(!D.people)D.people=[];
  loadHomeRecoCache();
  buildPills();render();updateSB();updateStats();
  setTimeout(autoSync,500);
  initGlossary();
}
function save(skipPush){localStorage.setItem('desci6',JSON.stringify(D));if(!skipPush)debouncedPush()}

// ===== GLOSSARY TOOLTIPS =====
function initGlossary(){
  document.addEventListener('mouseover',e=>{
    const t=e.target;
    if(!t.classList||!t.classList.contains('pill')&&!t.classList.contains('tag-chip')&&!t.classList.contains('stack-chip'))return;
    const txt=t.textContent.trim().replace('×','').trim();
    const def=GLOSS[txt];
    if(!def)return;
    const gt=el('glossTip');
    gt.innerHTML=`<strong>${txt}</strong>: ${def}`;
    gt.classList.add('vis');
    const r=t.getBoundingClientRect();
    gt.style.left=r.left+'px';
    gt.style.top=(r.bottom+6)+'px';
  });
  document.addEventListener('mouseout',e=>{
    if(e.target.classList&&(e.target.classList.contains('pill')||e.target.classList.contains('tag-chip')||e.target.classList.contains('stack-chip'))){
      el('glossTip').classList.remove('vis');
    }
  });
}

// ===== FILTERS =====
function buildPills(){
  el('pStack').innerHTML=['infrastructure','application','governance'].map(s=>`<button class="pill" onclick="togF('stack','${s}',this)">${s}</button>`).join('');
  el('pOverlap').innerHTML=Object.entries(OV_LABELS).map(([k,v])=>`<button class="pill" onclick="togF('overlap','${k}',this)">${v}</button>`).join('');
  el('pType').innerHTML=[...new Set(D.nodes.map(n=>n.type))].sort().map(t=>`<button class="pill" onclick="togF('type','${t}',this)">${t}</button>`).join('');
  const legalOrder=['nonprofit','foundation','DAO','hybrid','for-profit','protocol','consortium','community','event','unknown'];
  const legalVals=[...new Set(D.nodes.map(n=>n.legalStructure||'unknown'))].sort((a,b)=>{
    const ia=legalOrder.indexOf(a), ib=legalOrder.indexOf(b);
    if(ia===-1&&ib===-1)return a.localeCompare(b);
    if(ia===-1)return 1;
    if(ib===-1)return -1;
    return ia-ib;
  });
  el('pLegal').innerHTML=legalVals.map(s=>`<button class="pill" onclick="togF('legal','${s}',this)">${s}</button>`).join('');
  el('pConf').innerHTML=['high','medium','low'].map(s=>`<button class="pill" onclick="togF('conf','${s}',this)">${s}</button>`).join('');
}
function togF(c,v,b){const i=flt[c].indexOf(v);if(i>=0){flt[c].splice(i,1);b.classList.remove('on')}else{flt[c].push(v);b.classList.add('on')}af()}
function vis(n){
  const q=el('search').value.toLowerCase();
  if(q&&!n.name.toLowerCase().includes(q)&&!(n.type||'').toLowerCase().includes(q)&&!(n.desc||'').toLowerCase().includes(q)&&!(n.tags||[]).join(' ').toLowerCase().includes(q))return false;
  if(flt.stack.length&&!flt.stack.includes(n.stack))return false;
  if(flt.type.length&&!flt.type.includes(n.type))return false;
  if(flt.overlap.length&&!flt.overlap.some(t=>(n.overlapTags||[]).includes(t)))return false;
  if(flt.legal.length&&!flt.legal.includes(n.legalStructure))return false;
  const conf=(n.provenance&&n.provenance.confidence)||'low'; if(flt.conf.length&&!flt.conf.includes(conf))return false;
  const sOv=+el('slOv').value; if(sOv>0&&(n.overlapScore||0)<sOv)return false;
  const sDc=+el('slDc').value; if(sDc>0&&(n.decen||0)<sDc)return false;
  const sCr=+el('slCr').value; if(sCr>0&&(n.credScore||0)<sCr)return false;
  const sOs=+el('slOs').value; if(sOs>0&&(n.openScienceScore ?? ((n.financials&&n.financials.openScienceCompatibilityScore) || 0))<sOs)return false;
  const sPr=+el('slPr').value; if(sPr<100&&(n.profitScore||50)>sPr)return false;
  return true;
}
function af(){updateSB();updateStats();if(view==='graph')render();else render()}
function updateSB(){
  const v=D.nodes.filter(vis);el('nc').textContent=v.length;
  el('nlist').innerHTML=v.sort((a,b)=>(b.overlapScore||0)-(a.overlapScore||0)).map(n=>`<li class="nli ${n.id===selId?'sel':''}" title="confidence: ${(n.provenance&&n.provenance.confidence)||'low'}" onclick="selNode('${n.id}')"><span class="nli-dot" style="background:${SC[n.stack]||'var(--text-3)'}"></span><span class="nli-name">${n.name}${n.sourceAsterisk?' *':''}</span></li>`).join('');
}
function updateStats(){const v=D.nodes.filter(vis);el('stats').innerHTML=`<b>${v.length}</b>/${D.nodes.length} orgs · <b>${D.edges.length}</b> edges · <b>${D.people.length}</b> people`}

// ===== PANELS =====
function togglePanel(p){
  const a=el('app');
  a.classList.toggle(p==='left'?'hide-left':'hide-right');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(view==='graph') resizeGraphViewport();
    else if(view==='pgraph') render();
  }));
}
function setView(v,b){
  view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const btn=b||document.querySelector(`.tab[data-view="${v}"]`);
  if(btn)btn.classList.add('on');
  render();
}


function computeComponents(nodes, links){
  const ids = nodes.map(n => n.id);
  const adj = new Map(ids.map(id => [id, []]));
  links.forEach(e => {
    const a = typeof e.source === 'object' ? e.source.id : (e.source || e.s);
    const b = typeof e.target === 'object' ? e.target.id : (e.target || e.t);
    if (adj.has(a) && adj.has(b)) {
      adj.get(a).push(b);
      adj.get(b).push(a);
    }
  });
  const seen = new Set();
  const out = [];
  for (const id of ids) {
    if (seen.has(id)) continue;
    const stack = [id];
    seen.add(id);
    const comp = [];
    while (stack.length) {
      const cur = stack.pop();
      comp.push(cur);
      for (const nxt of adj.get(cur) || []) {
        if (!seen.has(nxt)) {
          seen.add(nxt);
          stack.push(nxt);
        }
      }
    }
    out.push(comp);
  }
  return out.sort((a,b) => b.length - a.length);
}

function estimateNodeRadius(d, mode='org'){
  if(mode==='people') return d._t==='person' ? 10 : 9;
  return Math.max(6,(d.decen||50)/8+3);
}

function estimateLabelPad(name, mode='org'){
  const mult = mode==='people' ? 1.9 : 2.1;
  return Math.max(10, Math.min(mode==='people' ? 32 : 36, (name || '').length * mult));
}

function componentRing(size, minDim, mode='org'){
  if (mode === 'people') {
    if (size >= 10) return minDim * 0.26;
    if (size >= 6) return minDim * 0.36;
    if (size >= 3) return minDim * 0.47;
    return minDim * 0.58;
  }
  if (size >= 12) return minDim * 0.24;
  if (size >= 7) return minDim * 0.35;
  if (size >= 4) return minDim * 0.47;
  return minDim * 0.60;
}

function componentRadius(compIds, byId, mode='org'){
  const size = compIds.length;
  const labelMass = compIds.reduce((sum, id) => sum + estimateLabelPad((byId.get(id) || {}).name || '', mode), 0);
  const base = mode==='people' ? 52 : 62;
  const sizeTerm = Math.sqrt(Math.max(1, size)) * (mode==='people' ? 24 : 28);
  const labelTerm = Math.min(mode==='people' ? 74 : 86, labelMass / Math.max(3, size));
  return base + sizeTerm + labelTerm;
}

function componentAnchors(w, h, comps, byId, mode='org'){
  const cx = w / 2, cy = h / 2;
  const minDim = Math.min(w, h);
  const compNodes = comps.map((ids, i) => {
    const ring = componentRing(ids.length, minDim, mode);
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / Math.max(1, comps.length));
    return {
      id: i,
      ids,
      r: componentRadius(ids, byId, mode),
      ring,
      x: cx + Math.cos(angle) * ring,
      y: cy + Math.sin(angle) * ring
    };
  });

  const cSim = d3.forceSimulation(compNodes)
    .force('radial', d3.forceRadial(d => d.ring, cx, cy).strength(0.95))
    .force('charge', d3.forceManyBody().strength(-2200))
    .force('collision', d3.forceCollide(d => d.r + 48))
    .force('x', d3.forceX(cx).strength(0.015))
    .force('y', d3.forceY(cy).strength(0.015))
    .stop();

  for (let i = 0; i < 320; i++) cSim.tick();

  const out = new Map();
  compNodes.forEach(c => {
    const pad = c.r + 24;
    c.x = Math.max(pad, Math.min(w - pad, c.x));
    c.y = Math.max(pad, Math.min(h - pad, c.y));
    c.ids.forEach(id => out.set(id, {x:c.x, y:c.y, r:c.r}));
  });
  return out;
}

function seedNodesByComponent(nodes, comps, anchorById){
  comps.forEach(ids => {
    const count = ids.length;
    const base = anchorById.get(ids[0]) || {x:0, y:0, r:100};
    ids.forEach((id, j) => {
      const d = nodes.find(n => n.id === id);
      if (!d) return;
      const angle = (j / Math.max(1, count)) * Math.PI * 2;
      const localR = Math.min(base.r * 0.42, 20 + Math.sqrt(count) * 9 + (j % 3) * 8);
      d.x = base.x + Math.cos(angle) * localR;
      d.y = base.y + Math.sin(angle) * localR;
    });
  });
}

function labelPlacement(d, anchorById, mode='org'){
  const a = anchorById.get(d.id) || {x:d.x || 0, y:d.y || 0};
  const dx = (d.x || 0) - a.x;
  const dy = (d.y || 0) - a.y;
  const r = estimateNodeRadius(d, mode);
  const sidePad = mode==='people' ? 8 : 9;
  const vertPad = mode==='people' ? 10 : 11;
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx >= 0) return {anchor:'start', x:(d.x || 0) + r + sidePad, y:(d.y || 0) + 3};
    return {anchor:'end', x:(d.x || 0) - r - sidePad, y:(d.y || 0) + 3};
  }
  if (dy >= 0) return {anchor:'middle', x:(d.x || 0), y:(d.y || 0) + r + vertPad + 8};
  return {anchor:'middle', x:(d.x || 0), y:(d.y || 0) - r - vertPad};
}

  const sn=D.nodes.filter(vis).map(n=>({...n}));

    .filter(e=>si.has(e.s)&&si.has(e.t))

  s.on('tick',()=>{
    lines.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);

  <div class="legend-row"><div class="legend-line" style="background:${EC.funder};width:18px;height:2px"></div>Funder</div></div>`;
  m.appendChild(lg);

// ===== LITERATURE =====

function quadrantOf(n){
  const p=n.profitScore??50, o=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);
  if(p<50 && o>=50) return 'commons';
  if(p>=50 && o>=50) return 'hybrid-open';
  if(p<50 && o<50) return 'mission-fragile';
  return 'extractive-risk';
}
function renderBiz(){
  const m=el('main');
  const nodes=D.nodes.filter(vis).map(n=>({...n,profitScore:n.profitScore??50,openScienceScore:n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50)}));
  const avg=(arr,fn)=>arr.length?Math.round(arr.reduce((s,x)=>s+fn(x),0)/arr.length):0;
  const qDefs={
    'commons':{label:'Commons-aligned',desc:'Lower commercial pressure, stronger open-science fit.'},
    'hybrid-open':{label:'Open-core hybrid',desc:'Commercial or tokenized, but still relatively compatible with open science.'},
    'mission-fragile':{label:'Low-profit / low-fit',desc:'Weak monetization and weak open-science fit, often unclear or immature models.'},
    'extractive-risk':{label:'Commercial pressure',desc:'Higher commerciality with weaker open-science compatibility.'}
  };
  const counts=Object.fromEntries(Object.keys(qDefs).map(k=>[k,0]));
  nodes.forEach(n=>counts[quadrantOf(n)]++);
  const hiRisk=[...nodes].filter(n=>n.profitScore>=65&&n.openScienceScore<50).sort((a,b)=>(b.profitScore-b.openScienceScore)-(a.profitScore-a.openScienceScore)).slice(0,6);
  const bestAligned=[...nodes].filter(n=>n.openScienceScore>=70).sort((a,b)=>(b.openScienceScore-a.openScienceScore)||(a.profitScore-b.profitScore)).slice(0,6);
  const interesting=[...nodes].filter(n=>n.profitScore>=50&&n.openScienceScore>=50).sort((a,b)=>(b.openScienceScore+b.profitScore)-(a.openScienceScore+a.profitScore)).slice(0,6);
  const topOverlap=[...nodes].sort((a,b)=>(b.overlapScore||0)-(a.overlapScore||0)).slice(0,6);
  const mostDec=[...nodes].sort((a,b)=>(b.decen||0)-(a.decen||0)).slice(0,6);

  const wrap=d3.select(m).append('div').attr('class','biz-wrap');
  const head=wrap.append('div').attr('class','biz-head');
  const headLeft=head.append('div');
  headLeft.html(`
    <div class="biz-title">Business models map</div>
    <div class="biz-sub">Each point is an organization. The x-axis is <b>commerciality / profit score</b> and the y-axis is <b>open-science compatibility</b>. Point <b>size scales with overlap with us</b>, while <b>outline thickness scales with decentralization</b>. Use the label controls to surface overlap and decentralization directly on the plot.</div>
    <div class="biz-legend">
      <span class="biz-legend-chip">Color = stack layer</span>
      <span class="biz-legend-chip">Ring color = evidence confidence</span>
      <span class="biz-legend-chip">Point size = overlap with us</span>
      <span class="biz-legend-chip">Outline thickness = decentralization</span>
    </div>
  `);
  const controls=head.append('div').attr('class','biz-controls');
  const addControl=(label,vals,current,fn)=>{
    const g=controls.append('div').attr('class','biz-control-group');
    g.append('span').attr('class','biz-control-label').text(label);
    vals.forEach(v=>g.append('button').attr('class','biz-mini-btn'+(current===v.value?' on':''))
      .text(v.label).on('click',()=>fn(v.value)));
  };
  addControl('Label set',[
    {value:'notable',label:'Notable'},
    {value:'overlap',label:'High overlap'},
    {value:'decent',label:'High decentralization'},
    {value:'competitors',label:'Competitors'},
    {value:'all',label:'All filtered'}
  ],bizLabelSet,setBizLabelSet);
  addControl('Label detail',[
    {value:'name',label:'Name'},
    {value:'overlap',label:'+ Overlap'},
    {value:'decent',label:'+ Decent'},
    {value:'metrics',label:'Full metrics'}
  ],bizLabelDetail,setBizLabelDetail);

  const cards=wrap.append('div').attr('class','biz-cards');
  const cardData=[
    {k:'Visible nodes',v:nodes.length,s:`${counts['commons']} commons-aligned · ${counts['hybrid-open']} open-core hybrid`},
    {k:'Avg commerciality',v:avg(nodes,n=>n.profitScore),s:'Lower = more commons-oriented, higher = more commercial pressure'},
    {k:'Avg OS fit',v:avg(nodes,n=>n.openScienceScore),s:'Higher = stronger compatibility with open-science-style business models'},
    {k:'Avg overlap',v:avg(nodes,n=>n.overlapScore||0),s:'Higher = closer overlap with your platform thesis'},
    {k:'Avg decentralization',v:avg(nodes,n=>n.decen||0),s:'Higher = more decentralized architecture/governance'},
    {k:'High-risk count',v:hiRisk.length,s:'Nodes currently landing in high-profit / lower-fit territory'}
  ];
  const c=cards.selectAll('div').data(cardData).enter().append('div').attr('class','biz-card');
  c.append('span').attr('class','k').text(d=>d.k);
  c.append('span').attr('class','v').text(d=>d.v);
  c.append('span').attr('class','s').text(d=>d.s);

  const main=wrap.append('div').attr('class','biz-main');
  const chartPanel=main.append('div').attr('class','biz-panel');
  const side=main.append('div').attr('class','biz-panel');

  const sideSection=(title,arr,fmt)=>{
    side.append('div').attr('class','biz-side-title').text(title);
    const list=side.append('div').attr('class','biz-list');
    if(!arr.length){list.append('div').attr('class','biz-note').text('No nodes in this bucket under the current filters.');return}
    arr.forEach(n=>{
      const item=list.append('div').attr('class','biz-item').on('click',()=>{selNode(n.id);el('app').classList.remove('hide-right')});
      item.append('div').attr('class','biz-item-name').text(n.name+(n.sourceAsterisk?' *':''));
      item.append('div').attr('class','biz-item-meta').html(fmt(n));
    });
  };
  sideSection('Likely pressure points', hiRisk, n=>`Profit ${n.profitScore} · OS fit ${n.openScienceScore} · Overlap ${n.overlapScore||0} · Decent ${n.decen||0}`);
  sideSection('Best aligned models', bestAligned, n=>`OS fit ${n.openScienceScore} · Profit ${n.profitScore} · ${(n.financials&&n.financials.openScienceCompatibilityBand)||osBand(n.openScienceScore)}`);
  sideSection('Highest overlap with us', topOverlap, n=>`Overlap ${n.overlapScore||0} · Profit ${n.profitScore} · OS fit ${n.openScienceScore} · Decent ${n.decen||0}`);
  sideSection('Most decentralized', mostDec, n=>`Decent ${n.decen||0} · Profit ${n.profitScore} · OS fit ${n.openScienceScore} · Overlap ${n.overlapScore||0}`);
  sideSection('Hybrid but still open', interesting, n=>`Profit ${n.profitScore} · OS fit ${n.openScienceScore} · ${(n.financials&&n.financials.openScienceAlignment)||'mixed'}`);
  side.append('div').attr('class','biz-note').html('Suggested reading of the quadrants:<br>• <b>Top-left</b>: commons/public-good infrastructure<br>• <b>Top-right</b>: hybrid or open-core commercialization<br>• <b>Bottom-right</b>: stronger extraction / enclosure risk<br>• <b>Bottom-left</b>: unclear, weak, or immature business-model fit');

  const bounds=chartPanel.node().getBoundingClientRect();
  const w=Math.max(760,bounds.width-28), h=Math.max(560,Math.min(860,(m.clientHeight||720)-120));
  const margin={top:28,right:36,bottom:58,left:64};
  const innerW=w-margin.left-margin.right, innerH=h-margin.top-margin.bottom;
  const svg=chartPanel.append('svg').attr('class','biz-svg').attr('viewBox',`0 0 ${w} ${h}`);
  const g=svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
  const x=d3.scaleLinear().domain([0,100]).range([0,innerW]);
  const y=d3.scaleLinear().domain([0,100]).range([innerH,0]);

  const quads=[
    {x0:0,x1:50,y0:50,y1:100,fill:'rgba(110,200,155,.06)',label:'Commons-aligned',sub:`${counts['commons']} nodes`},
    {x0:50,x1:100,y0:50,y1:100,fill:'rgba(116,221,215,.06)',label:'Open-core hybrid',sub:`${counts['hybrid-open']} nodes`},
    {x0:0,x1:50,y0:0,y1:50,fill:'rgba(212,168,83,.05)',label:'Low-profit / low-fit',sub:`${counts['mission-fragile']} nodes`},
    {x0:50,x1:100,y0:0,y1:50,fill:'rgba(224,92,92,.06)',label:'Commercial pressure',sub:`${counts['extractive-risk']} nodes`}
  ];
  g.selectAll('.quad').data(quads).enter().append('rect')
    .attr('x',d=>x(d.x0)).attr('y',d=>y(d.y1)).attr('width',d=>x(d.x1)-x(d.x0)).attr('height',d=>y(d.y0)-y(d.y1))
    .attr('fill',d=>d.fill).attr('stroke','rgba(255,255,255,.04)');
  g.selectAll('.quad-label').data(quads).enter().append('text')
    .attr('x',d=>x((d.x0+d.x1)/2)).attr('y',d=>y(d.y1)-8)
    .attr('text-anchor','middle').attr('font-size',11).attr('font-family','Nunito Sans,sans-serif').attr('fill','var(--text-2)').text(d=>d.label);
  g.selectAll('.quad-sub').data(quads).enter().append('text')
    .attr('x',d=>x((d.x0+d.x1)/2)).attr('y',d=>y(d.y1)+8)
    .attr('text-anchor','middle').attr('font-size',10).attr('font-family','Fira Code,monospace').attr('fill','var(--text-3)').text(d=>d.sub);

  g.append('g').attr('transform',`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(10)).call(g=>g.selectAll('text').attr('fill','var(--text-2)')).call(g=>g.selectAll('line,path').attr('stroke','var(--border-h)'));
  g.append('g').call(d3.axisLeft(y).ticks(10)).call(g=>g.selectAll('text').attr('fill','var(--text-2)')).call(g=>g.selectAll('line,path').attr('stroke','var(--border-h)'));
  g.append('line').attr('x1',x(50)).attr('x2',x(50)).attr('y1',0).attr('y2',innerH).attr('stroke','rgba(212,168,83,.35)').attr('stroke-dasharray','6,5');
  g.append('line').attr('x1',0).attr('x2',innerW).attr('y1',y(50)).attr('y2',y(50)).attr('stroke','rgba(212,168,83,.35)').attr('stroke-dasharray','6,5');
  g.append('text').attr('class','axis-label').attr('x',innerW/2).attr('y',innerH+42).attr('text-anchor','middle').text('Commerciality / Profit Score →');
  g.append('text').attr('class','axis-label').attr('transform',`translate(${-46},${innerH/2}) rotate(-90)`).attr('text-anchor','middle').text('Open-science compatibility →');

  const plot=nodes.map(n=>({...n,tx:x(n.profitScore),ty:y(n.openScienceScore)}));
  const radius=n=>5 + Math.min(7,(n.overlapScore||0)/14);
  const decStroke=n=>1 + Math.min(3.5,(n.decen||0)/32);
  const sim=d3.forceSimulation(plot)
    .force('x',d3.forceX(d=>d.tx).strength(1))
    .force('y',d3.forceY(d=>d.ty).strength(1))
    .force('collide',d3.forceCollide(d=>radius(d)+2.2))
    .stop();
  for(let i=0;i<140;i++) sim.tick();

  const tip=el('tip');
  const points=g.selectAll('.biz-point').data(plot).enter().append('g').style('cursor','pointer')
    .on('click',(e,d)=>{selNode(d.id);el('app').classList.remove('hide-right')})
    .on('mouseenter',(e,d)=>{
      const rev=((d.financials&&d.financials.revenueSources)||[]).slice(0,3).join(', ') || 'revenue model unclear';
      tip.innerHTML=`<h4>${d.name}${d.sourceAsterisk?' *':''}</h4><div class="tm">Profit ${d.profitScore} · OS fit ${d.openScienceScore} · Overlap ${d.overlapScore||0} · Decent ${d.decen||0} · ${d.legalStructure||'unknown'} · ${rev}</div>`;
      tip.classList.add('vis');
    })
    .on('mousemove',e=>{
      const r=m.getBoundingClientRect();
      tip.style.left=(e.clientX-r.left+12)+'px';
      tip.style.top=(e.clientY-r.top-8)+'px';
    })
    .on('mouseleave',()=>tip.classList.remove('vis'));

  points.append('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>radius(d)+1.6)
    .attr('fill','none')
    .attr('stroke',d=>confColor((d.provenance&&d.provenance.confidence)||'low'))
    .attr('stroke-width',1.2)
    .attr('stroke-opacity',.95);

  points.append('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>radius(d))
    .attr('fill',d=>SC[d.stack]||'var(--text-3)')
    .attr('fill-opacity',.22)
    .attr('stroke',d=>SC[d.stack]||'var(--text-3)')
    .attr('stroke-width',d=>decStroke(d))
    .attr('stroke-opacity',.9);

  points.append('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',2.5)
    .attr('fill',d=>SC[d.stack]||'var(--text-3)')
    .attr('fill-opacity',.95);

  const labelSetFns={
    notable:d=>d.id===selId || (d.overlapScore||0)>=55 || (d.decen||0)>=75 || Math.abs((d.profitScore||50)-(d.openScienceScore||50))>=38,
    overlap:d=>(d.overlapScore||0)>=45,
    decent:d=>(d.decen||0)>=70,
    competitors:d=>(d.overlapScore||0)>=55 || ((d.overlapTags||[]).includes('publishing') && (d.overlapTags||[]).includes('peer-review')),
    all:d=>true
  };
  const labelFmt=(d)=>{
    if(bizLabelDetail==='name') return d.name;
    if(bizLabelDetail==='overlap') return `${d.name} · Ov ${d.overlapScore||0}`;
    if(bizLabelDetail==='decent') return `${d.name} · Dc ${d.decen||0}`;
    return `${d.name} · Ov ${d.overlapScore||0} · Dc ${d.decen||0}`;
  };
  let labels=plot.filter(labelSetFns[bizLabelSet]||labelSetFns.notable);
  if(bizLabelSet!=='all') labels=labels.slice(0,22);
  else labels=labels.sort((a,b)=>((b.overlapScore||0)+(b.decen||0))-((a.overlapScore||0)+(a.decen||0))).slice(0,30);
  g.selectAll('.biz-label').data(labels).enter().append('text')
    .attr('x',d=>d.x+radius(d)+5).attr('y',d=>d.y-6)
    .attr('font-size',10).attr('font-family','Nunito Sans,sans-serif').attr('fill','var(--graph-label)')
    .attr('stroke','rgba(0,0,0,.82)').attr('stroke-width',1.5).attr('paint-order','stroke')
    .text(d=>labelFmt(d));
}

function renderLit(){
  const m=el('main'),p=document.createElement('div');p.className='lit-panel';
  p.innerHTML=`<div class="lit-title">Literature & References</div><div id="zotC"><p style="color:var(--text-3)">Loading from Zotero...</p></div><p style="margin-top:16px"><a href="https://www.zotero.org/groups/6075364/descai/library" target="_blank" style="color:var(--link)">View full Zotero library ↗</a></p>`;
  m.appendChild(p);
  if(zoteroItems)displayZ();else fetchZotero();
}
async function fetchZotero(){
  try{const r=await fetch('https://api.zotero.org/groups/6075364/items?format=json&limit=50&sort=dateModified&direction=desc');if(!r.ok)throw new Error();zoteroItems=await r.json();displayZ()}catch(e){const c=document.getElementById('zotC');if(c)c.innerHTML='<p style="color:var(--text-3)">Could not load from Zotero. Check group visibility.</p>'}
}
function displayZ(){const c=document.getElementById('zotC');if(!c||!zoteroItems)return;c.innerHTML=zoteroItems.filter(i=>i.data.title).map(i=>{const d=i.data;return`<div class="paper"><div class="paper-t">${d.title}</div><div class="paper-a">${(d.creators||[]).map(c=>c.lastName).join(', ')} ${d.date||''} ${d.DOI?`<a href="https://doi.org/${d.DOI}" target="_blank" style="color:var(--link)">DOI↗</a>`:''}</div></div>`}).join('')}

// ===== DETAIL PANEL =====
function selNode(id){
  selId=id;const n=D.nodes.find(x=>x.id===id);if(!n)return;
  const prov=n.provenance||{}, fin=n.financials||{}, bdg=(fin.scoreBreakdown||{});
  const conf=prov.confidence||'low';
  const confCls=confClass(conf);
  el('detE').style.display='none';
  const p=el('detC'),rels=D.edges.filter(e=>e.s===id||e.t===id);
  const ppl=D.people.filter(pp=>pp.orgs.includes(id));
  const credC=n.credScore>=60?'var(--sage)':n.credScore>=30?'var(--gold)':'var(--text-3)';
  const ovC=(n.overlapScore||0)>=60?'var(--gold)':(n.overlapScore||0)>=30?'var(--text-2)':'var(--text-3)';
  const srcHtml=(prov.sources||[]).map(s=>`<a class="src-chip" href="${s.url}" target="_blank" rel="noopener">${s.label}${s.type?` · ${s.type}`:''}</a>`).join('');
  const osScore=n.openScienceScore??fin.openScienceCompatibilityScore??50;
  const audit=fin.scoreAudit||{};
  p.innerHTML=`<div class="det-name">${n.name}${n.sourceAsterisk?' *':''}</div><div class="det-sub">${n.type} · ${n.stage} · <span class="cred-badge" style="background:rgba(110,200,155,.08);color:${credC}">Cred ${n.credScore||0}</span> · <span class="profit-badge" style="background:${profitBg(n.profitScore)};color:${profitC(n.profitScore)}">Profit ${n.profitScore??50}</span> · <span class="profit-badge" style="background:${osBg(osScore)};color:${osC(osScore)}">OS Fit ${osScore}</span> · <span class="conf-badge ${confCls}">${conf}</span>${n.twitter?` · <a href="https://x.com/${n.twitter.replace('@','')}" target="_blank" style="color:var(--link)">${n.twitter}</a>`:''}</div>
  <div class="field"><div class="flabel">Description</div><textarea class="finput" onchange="upd('${id}','desc',this.value)">${n.desc||''}</textarea></div>
  ${(n.overlapScore||n.compNote)?`<div class="overlap-box" style="border:1px solid ${(n.overlapScore||0)>=50?'rgba(212,168,83,.25)':'var(--border)'}">
    <div class="flabel" style="color:var(--gold)">Overlap with our platform <span style="font-weight:700">${n.overlapScore||0}%</span></div>
    <div class="overlap-bar-wrap"><div class="overlap-bar-bg"><div class="overlap-bar-fill" style="width:${n.overlapScore||0}%;background:${ovC}"></div></div></div>
    <div style="font-size:.82rem;color:var(--text-2);line-height:1.5">${n.compNote||''}</div>
  </div>`:''}
  ${(n.finModel||n.finNote)?`<div class="fin-box ${finBoxClass(n.profitScore)}">
    <div class="flabel" style="color:${profitC(n.profitScore)}">Commerciality score <span style="font-weight:700">${n.profitScore??50}/100</span> ${n.legalStructure!=='unknown'?`· <span style="text-transform:capitalize">${n.legalStructure}</span>`:''} ${n.apc?'· <span style="color:var(--red)">Has fee/APC</span>':''}</div>
    <div class="fin-bar-wrap"><div class="fin-bar-bg"><div class="fin-bar-fill" style="width:${n.profitScore??50}%;background:${profitBarC(n.profitScore)}"></div></div></div>
    <div class="flabel" style="margin-top:10px;color:${osC(osScore)}">Open-science compatibility <span style="font-weight:700">${osScore}/100</span> ${fin.openScienceCompatibilityBand?`· <span style="text-transform:capitalize">${fin.openScienceCompatibilityBand}</span>`:''}</div>
    <div class="fin-bar-wrap"><div class="fin-bar-bg"><div class="fin-bar-fill" style="width:${osScore}%;background:${osC(osScore)}"></div></div></div>
    ${n.fundingRaised?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Funding / scale: ${n.fundingRaised}</div>`:''}
    ${fin.revenueSources&&fin.revenueSources.length?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Revenue sources: ${fin.revenueSources.join(', ')}</div>`:''}
    ${fin.researcherPays&&fin.researcherPays!=='unknown'?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Researcher pays: ${fin.researcherPays}</div>`:''}
    ${fin.institutionPays&&fin.institutionPays!=='unknown'?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Institution pays: ${fin.institutionPays}</div>`:''}
    ${fin.apcAmountText?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Fee detail: ${fin.apcAmountText}</div>`:''}
    ${fin.financialSummary?`<div style="font-size:.8rem;color:var(--text-2);line-height:1.45">${fin.financialSummary}</div>`:''}
    <div style="font-size:.82rem;color:var(--text-2);line-height:1.5">${n.finModel||''}</div>
    ${n.finNote?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:8px">${n.finNote}</div>`:''}
    ${(bdg&&Object.keys(bdg).length)?`<div class="score-grid">
      <div class="score-cell"><span class="k">Structure</span><span class="v">${bdg.structure??'—'}</span></div>
      <div class="score-cell"><span class="k">Revenue</span><span class="v">${bdg.revenue??'—'}</span></div>
      <div class="score-cell"><span class="k">Capital</span><span class="v">${bdg.capital??'—'}</span></div>
      <div class="score-cell"><span class="k">Total</span><span class="v">${bdg.total??(n.profitScore??'—')}</span></div>
    </div>`:''}
    ${audit&&audit.previousProfitScore!=null?`<div style="font-size:.76rem;color:var(--text-3);line-height:1.5;margin-top:8px">Score audit: was ${audit.previousProfitScore}, now ${audit.auditedProfitScore} (${audit.delta>=0?'+':''}${audit.delta}). ${audit.reasons&&audit.reasons.length?`Main drivers: ${audit.reasons.join('; ')}.`:''}</div>`:''}
  </div>`:''}
  <div class="prov-box">
    <div class="flabel">Provenance ${prov.hasUnverifiedClaims?'<span style="color:var(--red)">· * inferred / unresolved fields remain</span>':''}</div>
    <div style="font-size:.8rem;color:var(--text-2);line-height:1.45">Confidence: <span class="conf-badge ${confCls}">${conf}</span>${prov.lastVerified?` · Last verified: ${prov.lastVerified}`:''}</div>
    ${fin.openScienceAlignment&&fin.openScienceAlignment!=='unknown'?`<div style="font-size:.8rem;color:var(--text-2);line-height:1.45;margin-top:6px">Open-science alignment: <strong style="color:${osC(osScore)};text-transform:capitalize">${fin.openScienceAlignment}</strong></div>`:''}
    ${fin.openScienceCompatibilityReasons&&fin.openScienceCompatibilityReasons.length?`<div style="font-size:.78rem;color:var(--text-3);line-height:1.5;margin-top:6px">Compatibility drivers: ${fin.openScienceCompatibilityReasons.join('; ')}.</div>`:''}
    ${fin.openScienceAlignmentNote?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:6px">${fin.openScienceAlignmentNote}</div>`:''}
    ${prov.notes?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:8px">${prov.notes}</div>`:''}
    ${srcHtml?`<div class="src-list">${srcHtml}</div>`:'<div style="font-size:.78rem;color:var(--text-3);margin-top:8px">No external source links attached yet.</div>'}
  </div>
  <div class="field"><div class="flabel">Type</div><input class="finput" value="${n.type||''}" onchange="upd('${id}','type',this.value)"></div>
  <div class="field"><div class="flabel">Stage</div><input class="finput" value="${n.stage||''}" onchange="upd('${id}','stage',this.value)"></div>
  <div class="field"><div class="flabel">Website</div><input class="finput" value="${n.web||''}" onchange="upd('${id}','web',this.value)"></div>
  <div class="field"><div class="flabel">Tech Stack</div><textarea class="finput" onchange="upd('${id}','techStack',this.value)">${n.techStack||''}</textarea></div>

function weightedDatasetTerms(limit){
  const ban=new Set(['infrastructure','application','governance','desci','science','protocol','project','dao','foundation','community','publishing']);
  const map=new Map();
  (D.nodes||[]).forEach(n=>{
    const w=1+((n.overlapScore||0)/55)+((n.credScore||0)/80)+((n.openScienceScore||0)/130);
    const terms=[n.type,n.stack,n.legalStructure,...(n.tags||[]),...(n.overlapTags||[])];
    terms.forEach(t0=>{
      const t=cleanText(String(t0||'').toLowerCase());
      if(!t||t.length<3||ban.has(t))return;
      map.set(t,(map.get(t)||0)+w);
    });
  });
  return [...map.entries()].sort((a,b)=>b[1]-a[1]).slice(0,limit||10).map(([k])=>k);
}
function relationWatchNames(){

}

async function fetchOpenAlexWorks(query, perPage){
  const recentYear=new Date().getFullYear()-3;
  const url='https://api.openalex.org/works?search='+encodeURIComponent(query)+'&per-page='+(perPage||10)+'&filter=from_publication_date:'+recentYear+'-01-01,is_retracted:false&sort=relevance_score:desc&select='+encodeURIComponent(openAlexSelect());
  const r=await fetch(url,{mode:'cors'});
  if(!r.ok)throw new Error('OpenAlex '+r.status);
  const j=await r.json();
  return (j.results||[]).map(w=>({
    id:w.id||'',
    title:w.display_name||'Untitled',
    link:w.id||w.doi||'',
    source:(((w.primary_location||{}).source||{}).display_name)||(((w.host_venue||{})||{}).display_name)||'OpenAlex',
    topic:query,
    year:w.publication_year||'',
    pubDate:w.publication_date||'',
    citedBy:w.cited_by_count||0,
    type:w.type||'',
    isOA:!!(w.open_access&&w.open_access.is_oa),
    authors:(w.authorships||[]).slice(0,3).map(a=>((a.author||{}).display_name||'')).filter(Boolean),
    concepts:(w.concepts||[]).slice(0,6).map(c=>c.display_name||'').filter(Boolean)
  })).filter(x=>x.title&&x.link);
}
function normalizeVenueBoost(source){
  const s=String(source||'').toLowerCase();
  if(/nature|science|cell|pnas|nejm|lancet/.test(s))return .22;
  if(/arxiv|biorxiv|medrxiv|crossref|openalex|elif|plos|peerj|frontiers/.test(s))return .16;
  return .08;
}
function rankHomeItem(item, channelKey, datasetTerms){
  const title=(item.title||'').toLowerCase();
  const topic=(item.topic||'').toLowerCase();
  const source=(item.source||'').toLowerCase();
  const concepts=(item.concepts||[]).map(c=>String(c).toLowerCase());
  const authors=(item.authors||[]).join(', ');
  const text=[title,topic,source,concepts.join(' ')].join(' ');
  const termHits=datasetTerms.reduce((s,t)=>s+(text.includes(String(t).toLowerCase())?1:0),0);
  const purposeHits=PURPOSE_TERMS.reduce((s,t)=>s+(text.includes(t)?1:0),0);
  const citedScore=clamp01(Math.log10(1+(item.citedBy||0))/2.8);
  const year=(item.year||0);
  const recency=year?clamp01(1-((new Date().getFullYear()-year)/6)):.35;
  const oaBonus=item.isOA?.08:0;
  const venueBonus=normalizeVenueBoost(source);
  const channelBonus=(channelKey==='aiScience'&&/ai|machine learning|foundation model|language model/.test(text))?0.18:
    (channelKey==='review'&&/peer review|integrity|retraction|reproducibility|paper mill/.test(text))?0.18:
    (channelKey==='scienceProblems'&&/bias|crisis|retraction|fraud|integrity|publication/.test(text))?0.18:
    (channelKey==='metascience'&&/metascience|science of science|evaluation|publishing|open science/.test(text))?0.18:0.08;
  const score=(termHits*0.13)+(purposeHits*0.17)+(citedScore*0.2)+(recency*0.14)+venueBonus+oaBonus+channelBonus;
  item.rankScore=score;
  item.metaLine=[item.source, authors?authors:'', item.year?String(item.year):'', item.citedBy?`${item.citedBy} cites`:item.isOA?'open access':''].filter(Boolean).slice(0,3).join(' · ');
  item.note=[
    termHits?`${termHits} dataset-term match${termHits>1?'es':''}`:'',
    purposeHits?`${purposeHits} purpose-term match${purposeHits>1?'es':''}`:'',
    item.isOA?'open access':''
  ].filter(Boolean).join(' | ');
  return item;
}
function dedupeItems(items){
  const seen=new Set();
  const out=[];
  items.forEach(it=>{
    const key=((it.link||'')+'|'+(it.title||'')).toLowerCase();
    if(!key||seen.has(key))return;
    seen.add(key); out.push(it);
  });
  return out;
}

const HOME_LAND_POLYS=[
  [[-170,10],[-150,20],[-130,52],[-110,70],[-85,72],[-55,54],[-52,25],[-80,10],[-100,6],[-125,12]],
  [[-82,10],[-70,4],[-62,-8],[-56,-18],[-60,-36],[-68,-52],[-78,-45],[-82,-20]],

  [[112,-12],[132,-18],[150,-28],[146,-42],[126,-44],[112,-30]],

];
function pointInPoly(x,y,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0], yi=poly[i][1], xj=poly[j][0], yj=poly[j][1];
    const intersect=((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/((yj-yi)||1e-9)+xi);
    if(intersect)inside=!inside;
  }
  return inside;
}
function plotAsciiWorld(nodes,cols,rows,tick){
  const w=Math.max(118,cols||132), h=Math.max(34,rows||40);
  const grid=Array.from({length:h},()=>Array.from({length:w},()=> ' '));
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(y===0||y===h-1||x===0||x===w-1) grid[y][x]=' ';
      else if(y%6===0 || x%18===0) grid[y][x]='·';
    }
  }
  const toLon=(x)=> (x/(w-1))*360-180;
  const toLat=(y)=> 90-(y/(h-1))*180;
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const lon=toLon(x), lat=toLat(y);
      let inside=false;
      for(const poly of HOME_LAND_POLYS){ if(pointInPoly(lon,lat,poly)){ inside=true; break; } }
      if(inside) grid[y][x] = ((x+y+tick)%3===0)?'▓':'▒';
    }
  }
  const pulse=['*','✦','+','•'][tick%4];
  const seen=new Set();
  nodes.forEach((n,idx)=>{
    const j=(n.financials&&n.financials.jurisdiction)||n.legalStructure||'';
    const coords=jurisdictionCoords(j);
    if(!coords)return;
    let [lon,lat]=coords;
    lon += ((idx%5)-2)*2.5;
    lat += ((idx%4)-1.5)*1.4;
    const x=Math.round(((lon+180)/360)*(w-1));
    const y=Math.round(((90-lat)/180)*(h-1));
    const key=`${x},${y}`;
    if(x<1||x>=w-1||y<1||y>=h-1||seen.has(key))return;
    seen.add(key);
    grid[y][x]=pulse;
  });
  return grid.map(r=>r.join('')).join('\n');
}

async function refreshHomePurposeFeeds(force){
  const now=Date.now();

  if(view==='home'){

  }

    const channelPromises=HOME_CHANNELS.map(async ch=>{
      const queries=(q[ch.key]||[]).slice(0,3);
      const batches=await Promise.allSettled(queries.map(query=>fetchOpenAlexWorks(query,10)));
      const merged=[];
      batches.forEach((res,idx)=>{
        if(res.status!=='fulfilled')return;
        (res.value||[]).forEach(item=>merged.push(rankHomeItem(item,ch.key,datasetTerms)));
      });
      const picked=dedupeItems(merged).sort((a,b)=>(b.rankScore||0)-(a.rankScore||0)).slice(0,8);
      return [ch.key, picked.length?picked:(fallback[ch.key]||[])];
    });
    const entries=await Promise.all(channelPromises);
    homeRecoState.channels=Object.fromEntries(entries);
    homeRecoState.channels.featured=(homeRecoState.channels.featured||[]).slice(0,8);
    homeRecoState.items=HOME_CHANNELS.flatMap(ch=>homeRecoState.channels[ch.key]||[]).sort((a,b)=>(b.rankScore||0)-(a.rankScore||0));
    homeRecoState.lastUpdated=new Date().toLocaleString();
    homeRecoState.status='Updated from structured scholarly sources.';
    saveHomeRecoCache();
  }catch(e){
    homeRecoState.channels=fallback;
    homeRecoState.items=Object.values(fallback).flat();
    homeRecoState.lastUpdated=new Date().toLocaleString();
    homeRecoState.status='Remote feeds blocked; showing resilient fallback links.';
    saveHomeRecoCache();
  }
  if(view==='home')render();
}

  el('mo').style.display='flex';
  el('mc').innerHTML=`<h2>Add Organization</h2>
  <div class="field"><div class="flabel">ID (slug)</div><input class="finput" id="nId" placeholder="e.g. my-project"></div>
  <div class="field"><div class="flabel">Name</div><input class="finput" id="nName"></div>

  <div class="field"><div class="flabel">Stack</div><select class="finput" id="nStack"><option value="infrastructure">Infrastructure</option><option value="application">Application</option><option value="governance">Governance</option></select></div>
  <div class="modal-foot"><button class="btn" onclick="clM()">Cancel</button><button class="btn btn-fill" onclick="doAddOrg()">Add</button></div>`;
}
function doAddOrg(){
  const id=el('nId').value.trim(),name=el('nName').value.trim();if(!id||!name)return;
  D.nodes.push({id,name,desc:'',type:el('nType').value.trim()||'Unknown',stack:el('nStack').value,stage:'Early',tags:[],s1:0,s2:0,s3:0,s4:0,s5:0,decen:50,chain:'',web:'',funding:'',source:'Manual',cf:{},wp:'',git:'',twitter:'',people:'',techStack:'',decentNote:'',overlapScore:0,compNote:'',notes:'',overlapTags:[],credScore:0,finModel:'',legalStructure:'unknown',apc:false,profitScore:50,finNote:'',fundingRaised:'',provenance:{confidence:'low',hasUnverifiedClaims:true,sources:[],lastVerified:'',notes:'Manual entry'},financials:{revenueSources:[],researcherPays:'unknown',institutionPays:'unknown',openScienceAlignment:'unknown',openScienceAlignmentNote:'',openScienceCompatibilityScore:50,openScienceCompatibilityBand:'moderate',scoreBreakdown:{},scoreAudit:{}},openScienceScore:50,sourceAsterisk:true});
  save();render();updateSB();updateStats();buildPills();clM();
}
function addEdgeM(){
  el('mo').style.display='flex';
  const opts=D.nodes.map(n=>`<option value="${n.id}">${n.name}</option>`).join('');
  el('mc').innerHTML=`<h2>Add Relationship</h2>
  <div class="field"><div class="flabel">Source</div><select class="finput" id="eS">${opts}</select></div>

function doAddEdge(){D.edges.push({s:el('eS').value,t:el('eT').value,type:el('eType').value,l:el('eL').value});save();render();clM()}

// ===== EXPORT / IMPORT =====
function expJSON(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='desci-landscape.json';a.click()}
function impFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    try{
      if(f.name.endsWith('.json')){D=JSON.parse(e.target.result);D.nodes.forEach(n=>{n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.finModel=n.finModel||'';n.legalStructure=n.legalStructure||'unknown';n.apc=n.apc||false;n.profitScore=n.profitScore??50;n.openScienceScore=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);n.finNote=n.finNote||'';n.fundingRaised=n.fundingRaised||'';n.provenance=n.provenance||{confidence:'low',hasUnverifiedClaims:true,sources:[],lastVerified:'',notes:''};n.financials=n.financials||{revenueSources:[],researcherPays:'unknown',institutionPays:'unknown',openScienceAlignment:'unknown',openScienceAlignmentNote:'',scoreBreakdown:{},openScienceCompatibilityScore:50,openScienceCompatibilityBand:'moderate',scoreAudit:{}};if(n.financials&&n.financials.openScienceCompatibilityScore==null)n.financials.openScienceCompatibilityScore=n.openScienceScore??50;n.sourceAsterisk=!!n.sourceAsterisk})}
      else if(f.name.endsWith('.csv')){const p=Papa.parse(e.target.result,{header:true});p.data.forEach(row=>{if(!row.id)return;const ex=D.nodes.find(n=>n.id===row.id);if(ex)Object.assign(ex,row);else D.nodes.push({...row,tags:(row.tags||'').split(','),s1:+row.s1||0,s2:+row.s2||0,s3:+row.s3||0,s4:+row.s4||0,s5:+row.s5||0,decen:+row.decen||50,cf:{},overlapTags:[],credScore:0,profitScore:50})})}
      save();render();updateSB();updateStats();buildPills();
    }catch(err){alert('Import error: '+err.message)}
  };r.readAsText(f);inp.value='';
}

// ===== GITHUB SYNC =====
const GH={get owner(){return localStorage.getItem('gh-owner')||''},get repo(){return localStorage.getItem('gh-repo')||''},get token(){return localStorage.getItem('gh-token')||''},get path(){return localStorage.getItem('gh-path')||'data.json'},get ok(){return!!(this.owner&&this.repo&&this.token)}};
function detectGHPages(){const h=location.hostname;if(h.endsWith('.github.io')){const o=h.replace('.github.io','');const r=location.pathname.split('/').filter(Boolean)[0]||o+'.github.io';if(!localStorage.getItem('gh-owner'))localStorage.setItem('gh-owner',o);if(!localStorage.getItem('gh-repo'))localStorage.setItem('gh-repo',r);if(!localStorage.getItem('gh-path'))localStorage.setItem('gh-path','data.json')}}
function promptToken(){if(GH.token)return true;const t=prompt('GitHub PAT (fine-grained, Contents read+write):');if(!t)return false;localStorage.setItem('gh-token',t.trim());return true}
function setSyncUI(state,msg){const s=el('syncStatus'),t=el('syncText');s.className='sync-status'+(state==='ok'?' synced':state==='err'?' error':'');t.textContent=msg}
let pushTimer=null;
function debouncedPush(){if(!GH.ok)return;clearTimeout(pushTimer);setSyncUI('','saving...');pushTimer=setTimeout(()=>ghPush(),2000)}
async function ghPull(){if(!GH.ok){detectGHPages();if(!promptToken())return}if(!GH.ok)return;setSyncUI('','pulling...');try{const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});if(r.status===404){setSyncUI('ok','no remote');return}if(r.status===401||r.status===403){localStorage.removeItem('gh-token');setSyncUI('err','bad token');return}if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();const raw=atob(j.content.replace(/\n/g,''));D=JSON.parse(raw);localStorage.setItem('gh-sha',j.sha);D.nodes.forEach(n=>{n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.notes=n.notes||''});save(true);render();updateSB();updateStats();buildPills();setSyncUI('ok','synced')}catch(e){setSyncUI('err',e.message)}}
async function ghPush(){if(!GH.ok)return;setSyncUI('','pushing...');try{let sha=localStorage.getItem('gh-sha')||'';if(!sha){try{const c=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});if(c.ok){const j=await c.json();sha=j.sha}}catch(e){}}const text=JSON.stringify(D,null,2);const bytes=new TextEncoder().encode(text);let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);const body={message:'Update '+new Date().toISOString().slice(0,16),content:btoa(bin)};if(sha)body.sha=sha;const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{method:'PUT',headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(r.status===409){setSyncUI('','conflict...');await ghPull();await ghPush();return}if(!r.ok){const e=await r.json();throw new Error(e.message||'HTTP '+r.status)}const result=await r.json();localStorage.setItem('gh-sha',result.content.sha);setSyncUI('ok','saved')}catch(e){setSyncUI('err',e.message)}}
function autoSync(){detectGHPages();if(GH.ok)ghPull()}
function onSyncClick(){if(!GH.ok){detectGHPages();if(promptToken())ghPull()}else ghPush()}

init();
window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(()=>{if(view==='graph'||view==='pgraph'||view==='home')render()},300)});
</script>
