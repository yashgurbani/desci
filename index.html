<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeSci Landscape</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
:root {
  --bg:#000;--surface:#0a0a0a;--card:#141414;--raised:#1e1e1e;
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.14);
  --text:#eaeaea;--text-2:#a0a0a0;--text-3:#606060;
  --gold:#d4a853;--gold-dim:#b8923e;--gold-glow:rgba(212,168,83,.08);
  --sage:#8ae8ba;--rose:#ff9abb;--teal:#74ddd7;
  --red:#e05c5c;--blue:#5c9ee0;
  --mono:'Fira Code',monospace;--display:'Playfair Display',Georgia,serif;
  --body:'Nunito Sans',system-ui,sans-serif;
  --radius:8px;--radius-sm:5px;
  --graph-label:#d6d6d6;
  --link:#7fcfff;--link-h:#b7e6ff;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;color-scheme:dark;scrollbar-color:#2a2a2a #050505}
body{font-family:var(--body);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--link);text-decoration:none}
a:hover{color:var(--link-h)}
.sidebar,.detail,.node-list,.table-wrap,.people-grid,.lit-panel,.modal{scrollbar-width:thin;scrollbar-color:#2a2a2a #050505}
.sidebar::-webkit-scrollbar,.detail::-webkit-scrollbar,.node-list::-webkit-scrollbar,.table-wrap::-webkit-scrollbar,.people-grid::-webkit-scrollbar,.lit-panel::-webkit-scrollbar,.modal::-webkit-scrollbar{width:12px;height:12px}
.sidebar::-webkit-scrollbar-track,.detail::-webkit-scrollbar-track,.node-list::-webkit-scrollbar-track,.table-wrap::-webkit-scrollbar-track,.people-grid::-webkit-scrollbar-track,.lit-panel::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track{background:#050505}
.sidebar::-webkit-scrollbar-thumb,.detail::-webkit-scrollbar-thumb,.node-list::-webkit-scrollbar-thumb,.table-wrap::-webkit-scrollbar-thumb,.people-grid::-webkit-scrollbar-thumb,.lit-panel::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb{background:#2a2a2a;border:2px solid #050505;border-radius:999px}
.sidebar::-webkit-scrollbar-thumb:hover,.detail::-webkit-scrollbar-thumb:hover,.node-list::-webkit-scrollbar-thumb:hover,.table-wrap::-webkit-scrollbar-thumb:hover,.people-grid::-webkit-scrollbar-thumb:hover,.lit-panel::-webkit-scrollbar-thumb:hover,.modal::-webkit-scrollbar-thumb:hover{background:#3a3a3a}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr 360px;grid-template-rows:52px 1fr;height:100vh}
.app.hide-left{grid-template-columns:0px 1fr 360px}
.app.hide-right{grid-template-columns:240px 1fr 0px}
.app.hide-left.hide-right{grid-template-columns:0px 1fr 0px}

/* HEADER */
.header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:14px;z-index:10}
.logo{font-family:var(--display);font-size:1rem;font-weight:700;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.stats{font-size:.72rem;color:var(--text-3);font-family:var(--mono);white-space:nowrap}
.tabs{display:flex;gap:2px;margin-left:12px}
.tab{font-size:.75rem;font-weight:600;padding:7px 14px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;color:var(--text-3);cursor:pointer;transition:all .15s;font-family:var(--body)}
.tab:hover{color:var(--text-2);border-color:var(--border)}
.tab.on{border-color:rgba(212,168,83,.3);color:var(--gold);background:var(--gold-glow)}
.actions{margin-left:auto;display:flex;gap:6px;align-items:center}
.btn{font-size:.72rem;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--body);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-fill{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-fill:hover{background:var(--gold-dim)}
.btn-x{border-color:var(--red);color:var(--red)}
.sync-status{font-size:.65rem;color:var(--text-3);cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:14px;transition:all .15s}
.sync-status.synced{border-color:rgba(92,184,122,.3);color:var(--sage)}
.sync-status.error{border-color:rgba(224,92,92,.3);color:var(--red)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* SIDEBAR */
.sidebar{grid-column:1;grid-row:2;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 14px;min-width:0;min-height:0}
.app.hide-left .sidebar{display:none}
.sb-section{margin-bottom:18px}
.sb-label{font-family:var(--mono);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin-bottom:8px}
.sb-search{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;font-family:var(--body);transition:border-color .2s}
.sb-search:focus{outline:none;border-color:rgba(212,168,83,.4)}
.sb-search::placeholder{color:var(--text-3)}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:.72rem;font-weight:500;padding:5px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;font-family:var(--body)}
.pill:hover{color:var(--text-2);border-color:var(--border-h)}
.pill.on{border-color:rgba(212,168,83,.35);color:var(--gold);background:var(--gold-glow)}
.node-list{list-style:none;margin-top:4px;max-height:40vh;overflow-y:auto}
.nli{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:.88rem;transition:background .12s}
.nli:hover{background:var(--card)}
.nli.sel{background:var(--gold-glow)}
.nli-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nli-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SLIDER FILTER */
.slider-filter{margin-bottom:14px}
.sf-label{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-3);font-family:var(--mono);margin-bottom:3px}
.sf-range{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--raised);outline:none}
.sf-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}

/* MAIN */
.main{grid-column:2;grid-row:2;position:relative;overflow:hidden;background:var(--bg);min-width:0;min-height:0}
.main svg{width:100%;height:100%}

/* TOGGLE */
.toggle-left,.toggle-right{position:absolute;z-index:5;width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .15s}
.toggle-left{top:12px;left:12px}
.toggle-right{top:12px;right:12px}
.toggle-left:hover,.toggle-right:hover{border-color:var(--gold);color:var(--gold)}

/* DETAIL */
.detail{grid-column:3;grid-row:2;background:var(--surface);border-left:1px solid var(--border);padding:24px 20px;overflow-y:auto;min-width:0;min-height:0}
.app.hide-right .detail{display:none}
.det-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.9rem;font-style:italic}
.det-name{font-family:var(--display);font-size:1.5rem;font-weight:600;line-height:1.2;margin-bottom:4px}
.det-sub{font-size:.88rem;color:var(--text-2);margin-bottom:20px}
.field{margin-bottom:16px}
.flabel{font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:5px}
.finput{width:100%;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.88rem;font-family:var(--body);transition:border-color .2s}
.finput:focus{outline:none;border-color:rgba(212,168,83,.4)}
textarea.finput{resize:vertical;min-height:80px;line-height:1.5}
select.finput{appearance:none;cursor:pointer}
.tag-row{display:flex;flex-wrap:wrap;gap:5px}
.tag-chip{font-size:.72rem;font-weight:500;padding:4px 10px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:var(--text-2);display:inline-flex;align-items:center;gap:5px}
.tag-chip .rm{cursor:pointer;opacity:.4}
.tag-chip .rm:hover{opacity:1;color:var(--red)}

.strata{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.stm{text-align:center;padding:8px 3px;border-radius:var(--radius-sm);font-family:var(--mono);font-size:.68rem;line-height:1.3;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.stm:hover{border-color:var(--gold)}
.stm[data-v="3"]{background:rgba(110,200,155,.15);border-color:rgba(110,200,155,.3);color:var(--sage)}
.stm[data-v="2"]{background:rgba(212,168,83,.1);border-color:rgba(212,168,83,.2);color:var(--gold)}
.stm[data-v="1"]{background:rgba(232,126,154,.1);border-color:rgba(232,126,154,.2);color:var(--rose)}
.rel-list{list-style:none}
.rel-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.rel-badge{font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.stack-chip{font-family:var(--mono);font-size:.6rem;font-weight:600;padding:3px 8px;border-radius:4px;display:inline-block}
/* Overlap box */
.overlap-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px}
.overlap-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.overlap-bar-bg{flex:1;height:8px;background:var(--raised);border-radius:4px;overflow:hidden}
.overlap-bar-fill{height:100%;border-radius:4px;transition:width .3s}

/* PEOPLE */
.people-grid{padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;overflow-y:auto;height:100%;align-content:start}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .2s}
.p-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.p-name{font-family:var(--display);font-size:1.05rem;font-weight:600;margin-bottom:3px}
.p-role{font-size:.8rem;color:var(--text-2);line-height:1.4;margin-bottom:8px}
.p-links{display:flex;gap:10px;font-size:.75rem}
.p-links a{color:var(--link);text-decoration:none}
.p-orgs{font-family:var(--mono);font-size:.65rem;color:var(--text-3);margin-top:8px}

/* TABLE */
.table-wrap{overflow:auto;height:100%;padding:12px}
table.dtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem}
.dtbl th{position:sticky;top:0;z-index:2;background:var(--surface);padding:10px 10px;text-align:left;font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--border-h)}
.dtbl th:hover{color:var(--gold)}
.dtbl td{padding:7px 10px;border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtbl tbody tr{transition:background .1s}
.dtbl tbody tr:hover{background:var(--card)}
.dtbl tbody tr.sel{background:var(--gold-glow)}
.ob{display:flex;align-items:center;gap:5px}
.ob-bar{width:40px;height:5px;background:var(--raised);border-radius:3px;overflow:hidden}
.ob-fill{height:100%;border-radius:3px}

/* LITERATURE */
.lit-panel{padding:24px;overflow-y:auto;height:100%}
.lit-title{font-family:var(--display);font-size:1.3rem;margin-bottom:18px}
.paper{padding:14px 0;border-bottom:1px solid var(--border)}
.paper-t{font-family:var(--display);font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.paper-a{font-size:.75rem;color:var(--text-2)}

/* GRAPH */
.legend{position:absolute;bottom:14px;left:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:.7rem;z-index:3;max-width:200px;transition:all .2s}
.legend.collapsed{padding:6px 12px}
.legend.collapsed .legend-body{display:none}
.legend-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.legend-title{font-family:var(--mono);font-weight:600;color:var(--text-2);font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.legend-toggle{font-size:.6rem;color:var(--text-3);cursor:pointer}
.legend-row{display:flex;align-items:center;gap:8px;margin-top:5px;color:var(--text-2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TOOLTIPS */
.tip{position:absolute;z-index:20;pointer-events:none;background:var(--card);border:1px solid var(--border-h);border-radius:var(--radius-sm);padding:10px 14px;max-width:360px;max-height:52vh;overflow:auto;font-size:.8rem;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:opacity .12s}
.tip.interactive{pointer-events:auto}
.tip.vis{opacity:1}
.tip h4{font-family:var(--display);font-size:.9rem;margin-bottom:3px}
.tip .tm{font-size:.72rem;color:var(--text-2);line-height:1.4}
.tip-src-title{margin-top:8px;font-family:var(--mono);font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-3)}
.tip-src-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tip-src-link{font-size:.66rem;padding:3px 8px;border-radius:12px;background:var(--raised);border:1px solid var(--border);color:var(--link);display:inline-flex;align-items:center;gap:5px}
.tip-src-link:hover{border-color:var(--gold);color:var(--link-h)}
/* Glossary tooltip */
.gloss-tip{position:fixed;z-index:99;background:var(--card);border:1px solid var(--gold);border-radius:var(--radius-sm);padding:8px 12px;max-width:260px;font-size:.78rem;color:var(--text-2);box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .15s}
.gloss-tip.vis{opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px;width:min(520px,90vw);max-height:80vh;overflow-y:auto}
.modal h2{font-family:var(--display);font-size:1.2rem;margin-bottom:16px}
.modal-foot{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

/* EDGE COLORS */
:root {
  --edge-funder:#78dca2;--edge-ecosystem:#76cee0;--edge-partner:#b29aff;
  --edge-overlap:#f0cb5a;--edge-collaborator:#ff9abb;
}

/* CREDIBILITY BADGE */
.cred-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:10px}
.profit-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:10px}
.fin-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.fin-box.commons{border-color:rgba(110,200,155,.25)}
.fin-box.hybrid{border-color:rgba(212,168,83,.25)}
.fin-box.profit{border-color:rgba(224,92,92,.25)}
.fin-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.fin-bar-bg{flex:1;height:8px;background:var(--raised);border-radius:4px;overflow:hidden}
.fin-bar-fill{height:100%;border-radius:4px;transition:width .3s}


.prov-box{background:var(--card);padding:14px;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.conf-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.68rem;padding:3px 8px;border-radius:10px;text-transform:uppercase}
.conf-high{background:rgba(110,200,155,.12);color:var(--sage)}
.conf-medium{background:rgba(212,168,83,.12);color:var(--gold)}
.conf-low{background:rgba(224,92,92,.12);color:var(--red)}
.src-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.src-chip{font-size:.68rem;padding:4px 9px;border-radius:14px;border:1px solid var(--border);background:var(--raised);color:var(--link);display:inline-flex;align-items:center;gap:5px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.score-cell{background:var(--raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 6px;text-align:center}
.score-cell .k{display:block;font-size:.58rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase}
.score-cell .v{display:block;font-size:.78rem;color:var(--text-2);font-weight:600}


/* BUSINESS MODEL VIEW */
.biz-wrap{height:100%;display:flex;flex-direction:column;padding:18px;gap:14px;overflow:auto}
.biz-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.biz-title{font-family:var(--display);font-size:1.2rem;color:var(--text)}
.biz-sub{font-size:.82rem;color:var(--text-2);max-width:860px;line-height:1.5}
.biz-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.biz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.biz-card .k{display:block;font-size:.62rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.biz-card .v{display:block;font-size:1rem;color:var(--text);font-weight:700}
.biz-card .s{display:block;font-size:.74rem;color:var(--text-2);margin-top:4px;line-height:1.4}
.biz-main{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:14px;min-height:0;flex:1}
.biz-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:0}
.biz-panel-chart{position:relative;overflow:hidden;min-height:clamp(560px,72vh,920px)}
.biz-panel-side{overflow-y:auto;padding-right:8px;max-height:clamp(560px,72vh,920px)}
.biz-svg{width:100%;height:100%;min-height:640px;display:block}
.biz-side-title{font-family:var(--mono);font-size:.66rem;color:var(--text-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:8px}
.biz-list{display:flex;flex-direction:column;gap:8px}
.biz-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:all .15s}
.biz-item:hover{border-color:var(--gold);transform:translateY(-1px)}
.biz-item-name{font-size:.84rem;font-weight:600;color:var(--text)}
.biz-item-meta{font-size:.72rem;color:var(--text-2);margin-top:3px;line-height:1.4}
.biz-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.biz-legend-chip{font-size:.68rem;padding:4px 9px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:var(--text-2)}
.axis-label{font-size:.72rem;fill:var(--text-2);font-family:var(--mono)}
.biz-note{font-size:.74rem;color:var(--text-3);line-height:1.45;margin-top:10px}
.biz-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-top:10px}
.biz-control-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.biz-control-label{font-size:.62rem;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-right:2px;padding-top:4px}
.biz-mini-btn{font-size:.68rem;padding:4px 9px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text-2);cursor:pointer;transition:all .15s}
.biz-mini-btn:hover{border-color:var(--gold);color:var(--gold)}
.biz-mini-btn.on{border-color:rgba(212,168,83,.35);color:var(--gold);background:var(--gold-glow)}
.biz-floating-actions{position:absolute;top:10px;right:10px;z-index:3;display:flex;align-items:center;gap:6px}
.biz-zoom-chip{font-family:var(--mono);font-size:.62rem;color:var(--text-3);padding:4px 8px;border-radius:999px;background:rgba(0,0,0,.35);border:1px solid var(--border)}
.biz-label-link{stroke:rgba(255,255,255,.2);stroke-width:.7;stroke-dasharray:3,3}
.biz-quad-hover{fill-opacity:.11}
@media(max-width:1050px){.biz-main{grid-template-columns:1fr}.biz-cards{grid-template-columns:repeat(2,minmax(0,1fr))}}

/* RESPONSIVE */
@media(max-width:768px){

function computeComponents(nodes, links){
  const ids = nodes.map(n => n.id);
  const adj = new Map(ids.map(id => [id, []]));
  links.forEach(e => {
    const a = typeof e.source === 'object' ? e.source.id : (e.source || e.s);
    const b = typeof e.target === 'object' ? e.target.id : (e.target || e.t);
    if (adj.has(a) && adj.has(b)) {
      adj.get(a).push(b);
      adj.get(b).push(a);
    }
  });
  const seen = new Set();
  const out = [];
  for (const id of ids) {
    if (seen.has(id)) continue;
    const stack = [id];
    seen.add(id);
    const comp = [];
    while (stack.length) {
      const cur = stack.pop();
      comp.push(cur);
      for (const nxt of adj.get(cur) || []) {
        if (!seen.has(nxt)) {
          seen.add(nxt);
          stack.push(nxt);
        }
      }
    }
    out.push(comp);
  }
  return out.sort((a,b) => b.length - a.length);
}

function estimateNodeRadius(d, mode='org'){
  if(mode==='people') return d._t==='person' ? 10 : 9;
  return Math.max(6,(d.decen||50)/8+3);
}

function estimateLabelPad(name, mode='org'){
  const mult = mode==='people' ? 1.9 : 2.1;
  return Math.max(10, Math.min(mode==='people' ? 32 : 36, (name || '').length * mult));
}

function componentRing(size, minDim, mode='org'){
  if (mode === 'people') {
    if (size >= 10) return minDim * 0.26;
    if (size >= 6) return minDim * 0.36;
    if (size >= 3) return minDim * 0.47;
    return minDim * 0.58;
  }
  if (size >= 12) return minDim * 0.24;
  if (size >= 7) return minDim * 0.35;
  if (size >= 4) return minDim * 0.47;
  return minDim * 0.60;
}

function componentRadius(compIds, byId, mode='org'){
  const size = compIds.length;
  const labelMass = compIds.reduce((sum, id) => sum + estimateLabelPad((byId.get(id) || {}).name || '', mode), 0);
  const base = mode==='people' ? 52 : 62;
  const sizeTerm = Math.sqrt(Math.max(1, size)) * (mode==='people' ? 24 : 28);
  const labelTerm = Math.min(mode==='people' ? 74 : 86, labelMass / Math.max(3, size));
  return base + sizeTerm + labelTerm;
}

function componentAnchors(w, h, comps, byId, mode='org'){
  const cx = w / 2, cy = h / 2;
  const minDim = Math.min(w, h);
  const compNodes = comps.map((ids, i) => {
    const ring = componentRing(ids.length, minDim, mode);
    const angle = -Math.PI / 2 + (i * 2 * Math.PI / Math.max(1, comps.length));
    return {
      id: i,
      ids,
      r: componentRadius(ids, byId, mode),
      ring,
      x: cx + Math.cos(angle) * ring,
      y: cy + Math.sin(angle) * ring
    };
  });

  const cSim = d3.forceSimulation(compNodes)
    .force('radial', d3.forceRadial(d => d.ring, cx, cy).strength(0.95))
    .force('charge', d3.forceManyBody().strength(-2200))
    .force('collision', d3.forceCollide(d => d.r + 48))
    .force('x', d3.forceX(cx).strength(0.015))
    .force('y', d3.forceY(cy).strength(0.015))
    .stop();

  for (let i = 0; i < 320; i++) cSim.tick();

  const out = new Map();
  compNodes.forEach(c => {
    const pad = c.r + 24;
    c.x = Math.max(pad, Math.min(w - pad, c.x));
    c.y = Math.max(pad, Math.min(h - pad, c.y));
    c.ids.forEach(id => out.set(id, {x:c.x, y:c.y, r:c.r}));
  });
  return out;
}

function seedNodesByComponent(nodes, comps, anchorById){
  comps.forEach(ids => {
    const count = ids.length;
    const base = anchorById.get(ids[0]) || {x:0, y:0, r:100};
    ids.forEach((id, j) => {
      const d = nodes.find(n => n.id === id);
      if (!d) return;
      const angle = (j / Math.max(1, count)) * Math.PI * 2;
      const localR = Math.min(base.r * 0.42, 20 + Math.sqrt(count) * 9 + (j % 3) * 8);
      d.x = base.x + Math.cos(angle) * localR;
      d.y = base.y + Math.sin(angle) * localR;
    });
  });
}

function labelPlacement(d, anchorById, mode='org'){
  const a = anchorById.get(d.id) || {x:d.x || 0, y:d.y || 0};
  const dx = (d.x || 0) - a.x;
  const dy = (d.y || 0) - a.y;
  const r = estimateNodeRadius(d, mode);
  const sidePad = mode==='people' ? 8 : 9;
  const vertPad = mode==='people' ? 10 : 11;
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx >= 0) return {anchor:'start', x:(d.x || 0) + r + sidePad, y:(d.y || 0) + 3};
    return {anchor:'end', x:(d.x || 0) - r - sidePad, y:(d.y || 0) + 3};
  }
  if (dy >= 0) return {anchor:'middle', x:(d.x || 0), y:(d.y || 0) + r + vertPad + 8};
  return {anchor:'middle', x:(d.x || 0), y:(d.y || 0) - r - vertPad};
}

// ===== RENDER =====
function render(){
  const m=el('main');m.querySelectorAll('svg,.table-wrap,.people-grid,.lit-panel,.legend,.biz-wrap').forEach(e=>e.remove());
  const tip=el('tip'); if(tip){tip.classList.remove('vis');tip.classList.toggle('interactive',view==='biz');}

  if(view==='graph')buildGraph();

// ===== GRAPH =====
function buildGraph(){
  const m=el('main'),w=m.clientWidth,h=m.clientHeight;
  if(!w||!h)return;

  const sn=D.nodes.filter(vis).map(n=>({...n}));
  const si=new Set(sn.map(n=>n.id));
  const se=D.edges
    .filter(e=>si.has(e.s)&&si.has(e.t))
    .map(e=>({source:e.s,target:e.t,type:e.type,l:e.l||e.label||''}));

  const svgEl=d3.select(m).append('svg').attr('width',w).attr('height',h);
  zoomBehavior=d3.zoom().scaleExtent([.12,4]).on('zoom',e=>svgG.attr('transform',e.transform));
  svgEl.call(zoomBehavior);
  svgG=svgEl.append('g');
  const lG=svgG.append('g'),nG=svgG.append('g'),tG=svgG.append('g');

  const s=d3.forceSimulation(sn)
    .force('link',d3.forceLink(se).id(d=>d.id).distance(106).strength(.19))
    .force('charge',d3.forceManyBody().strength(-235))
    .force('center',d3.forceCenter(w/2,h/2))
    .force('x',d3.forceX(w/2).strength(.022))
    .force('y',d3.forceY(h/2).strength(.022))
    .force('collision',d3.forceCollide().radius(d=>estimateNodeRadius(d,'org')+12))
    .alphaDecay(.032)
    .velocityDecay(.34);
  sim=s;

  const lines=lG.selectAll('line').data(se).enter().append('line')
    .attr('stroke',d=>EC[d.type]||'var(--border-h)')
    .attr('stroke-width',d=>d.type==='overlap'?0.95:1.3)
    .attr('stroke-dasharray',d=>d.type==='overlap'?'5,4':null)
    .attr('stroke-linecap','round')
    .attr('opacity',d=>d.type==='overlap'?.42:.34);

  const ns=nG.selectAll('g').data(sn).enter().append('g')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)s.alphaTarget(.25).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)s.alphaTarget(0);d.fx=null;d.fy=null}));

  ns.append('circle')
    .attr('r',d=>estimateNodeRadius(d,'org'))
    .attr('fill',d=>SC[d.stack]||'var(--text-3)')
    .attr('fill-opacity',.16)
    .attr('stroke',d=>SC[d.stack]||'var(--text-3)')
    .attr('stroke-width',d=>(d.overlapScore||0)>=40?2.2:1.45);

  ns.append('circle')
    .attr('r',2.3)
    .attr('fill',d=>SC[d.stack]||'var(--text-3)')
    .attr('fill-opacity',.95);

  tG.selectAll('text').data(sn).enter().append('text').text(d=>d.name)
    .attr('font-size',10)
    .attr('font-family','Nunito Sans,sans-serif')
    .attr('font-weight',500)
    .attr('fill','var(--graph-label)')
    .attr('stroke','rgba(0,0,0,.75)')
    .attr('stroke-width',1.4)
    .attr('paint-order','stroke')
    .attr('text-anchor','middle')
    .attr('dy',d=>-(estimateNodeRadius(d,'org')+12))
    .style('pointer-events','none');

  ns.on('click',(e,d)=>{selNode(d.id);el('app').classList.remove('hide-right')});

  const tip=el('tip');
  ns.on('mouseenter',(e,d)=>{
    tip.innerHTML=`<h4>${d.name}</h4><div class="tm">${d.type||''} Â· ${d.stack||''} Â· ${(d.tags||[]).slice(0,3).join(', ')}</div>`;
    tip.classList.add('vis');
  }).on('mousemove',e=>{
    const r=m.getBoundingClientRect();
    tip.style.left=(e.clientX-r.left+12)+'px';
    tip.style.top=(e.clientY-r.top-8)+'px';
  }).on('mouseleave',()=>tip.classList.remove('vis'));

  lines.on('mouseenter',(e,d)=>{
    const sName=typeof d.source==='object'?d.source.name:(D.nodes.find(n=>n.id===d.source)?.name||d.source);
    const tName=typeof d.target==='object'?d.target.name:(D.nodes.find(n=>n.id===d.target)?.name||d.target);
    tip.innerHTML=`<h4>${sName} â†’ ${tName}</h4><div class="tm">${d.type||'relation'}${d.l?` Â· ${d.l}`:''}</div>`;
    tip.classList.add('vis');
    d3.select(e.currentTarget).attr('opacity',.85).attr('stroke-width',d.type==='overlap'?1.4:1.9);
  }).on('mousemove',e=>{
    const r=m.getBoundingClientRect();
    tip.style.left=(e.clientX-r.left+12)+'px';
    tip.style.top=(e.clientY-r.top-8)+'px';
  }).on('mouseleave',e=>{
    tip.classList.remove('vis');
    d3.select(e.currentTarget).attr('opacity',d=>d.type==='overlap'?.42:.34).attr('stroke-width',d=>d.type==='overlap'?0.95:1.3);
  });

  s.on('tick',()=>{
    lines.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    ns.attr('transform',d=>`translate(${d.x},${d.y})`);
    tG.selectAll('text').attr('x',d=>d.x).attr('y',d=>d.y);
  });

  const lg=document.createElement('div');
  lg.className='legend';
  lg.innerHTML=`<div class="legend-title">Graph</div>
  <div class="legend-row"><div class="legend-dot" style="background:${SC.infrastructure}"></div>Infrastructure</div>
  <div class="legend-row"><div class="legend-dot" style="background:${SC.application}"></div>Application</div>
  <div class="legend-row"><div class="legend-dot" style="background:${SC.governance}"></div>Governance</div>
  <div style="margin-top:6px"><div class="legend-row"><div class="legend-line" style="background:${EC.partner};width:18px;height:2px"></div>Partner</div>
  <div class="legend-row"><div class="legend-line" style="background:${EC.overlap};width:18px;height:2px;border-top:2px dashed ${EC.overlap};background:none"></div>Overlap</div>
  <div class="legend-row"><div class="legend-line" style="background:${EC.funder};width:18px;height:2px"></div>Funder</div></div>`;
  m.appendChild(lg);
}

// ===== LITERATURE =====

function quadrantOf(n){
  const p=n.profitScore??50, o=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);
  if(p<50 && o>=50) return 'commons';
  if(p>=50 && o>=50) return 'hybrid-open';
  if(p<50 && o<50) return 'mission-fragile';
  return 'extractive-risk';
}
function escapeHtml(v){
  return String(v??'').replace(/[&<>"']/g,ch=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]));
}
function bizAuditRow(n){
  const k1=(n.id||'').toLowerCase();
  const k2=(n.name||'').toLowerCase();
  return auditRowsByKey.get(k1)||auditRowsByKey.get(k2)||null;
}
function bizSources(n,max=6){
  const seen=new Set(), out=[];
  const add=(src)=>{
    if(!src||!src.url)return;
    const u=String(src.url).trim();
    if(!u||seen.has(u))return;
    seen.add(u);
    let host=u;
    try{host=new URL(u).hostname.replace(/^www\./,'')}catch(e){}
    out.push({label:src.label||host,url:u,type:src.type||''});
  };
  const p=n.provenance||{};
  (p.sources||[]).forEach(add);
  Object.values(p.fieldSources||{}).forEach(arr=>(arr||[]).forEach(add));
  (p.materialClaims||[]).forEach(c=>(c.sources||[]).forEach(add));
  return out.slice(0,max);
}
function renderBiz(){
  const m=el('main');

  const counts=Object.fromEntries(Object.keys(qDefs).map(k=>[k,0]));
  nodes.forEach(n=>counts[quadrantOf(n)]++);
  const hiRisk=[...nodes].filter(n=>n.profitScore>=65&&n.openScienceScore<50).sort((a,b)=>(b.profitScore-b.openScienceScore)-(a.profitScore-a.openScienceScore)).slice(0,8);
  const bestAligned=[...nodes].filter(n=>n.openScienceScore>=70).sort((a,b)=>(b.openScienceScore-a.openScienceScore)||(a.profitScore-b.profitScore)).slice(0,8);

  const main=wrap.append('div').attr('class','biz-main');
  const chartPanel=main.append('div').attr('class','biz-panel biz-panel-chart');
  const side=main.append('div').attr('class','biz-panel biz-panel-side');

  const sideSection=(title,arr,fmt)=>{
    side.append('div').attr('class','biz-side-title').text(title);
    const list=side.append('div').attr('class','biz-list');
    if(!arr.length){list.append('div').attr('class','biz-note').text('No nodes in this bucket under the current filters.');return}
    arr.forEach(n=>{
      const item=list.append('div').attr('class','biz-item').on('click',()=>{selNode(n.id);el('app').classList.remove('hide-right')});
      item.append('div').attr('class','biz-item-name').text(n.name+(n.sourceAsterisk?' *':''));
      item.append('div').attr('class','biz-item-meta').html(fmt(n));
    });
  };
  sideSection('Likely pressure points', hiRisk, n=>`Profit ${n.profitScore} / OS fit ${n.openScienceScore} / Overlap ${n.overlapScore||0} / Decen ${n.decen||0}`);
  sideSection('Best aligned models', bestAligned, n=>`OS fit ${n.openScienceScore} / Profit ${n.profitScore} / ${(n.financials&&n.financials.openScienceCompatibilityBand)||osBand(n.openScienceScore)}`);
  sideSection('Highest overlap with us', topOverlap, n=>`Overlap ${n.overlapScore||0} / Profit ${n.profitScore} / OS fit ${n.openScienceScore} / Decen ${n.decen||0}`);
  sideSection('Most decentralized', mostDec, n=>`Decen ${n.decen||0} / Profit ${n.profitScore} / OS fit ${n.openScienceScore} / Overlap ${n.overlapScore||0}`);
  sideSection('Hybrid but still open', interesting, n=>`Profit ${n.profitScore} / OS fit ${n.openScienceScore} / ${(n.financials&&n.financials.openScienceAlignment)||'mixed'}`);
  side.append('div').attr('class','biz-note').html('Quadrant reading:<br>&bull; <b>Top-left</b>: commons/public-good infrastructure<br>&bull; <b>Top-right</b>: hybrid/open-core commercialization<br>&bull; <b>Bottom-right</b>: stronger extraction pressure<br>&bull; <b>Bottom-left</b>: weak or immature business-model fit');

  const bounds=chartPanel.node().getBoundingClientRect();
  const w=Math.max(920,Math.floor((bounds.width||940)-20));
  const h=Math.max(680,Math.floor((bounds.height||760)-18));
  const margin={top:34,right:44,bottom:64,left:74};
  const innerW=w-margin.left-margin.right, innerH=h-margin.top-margin.bottom;

  const svg=chartPanel.append('svg').attr('class','biz-svg').attr('viewBox',`0 0 ${w} ${h}`).attr('preserveAspectRatio','xMidYMid meet');
  const root=svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
  const plotLayer=root.append('g').attr('class','biz-zoom-layer');
  const axisLayer=root.append('g');
  const x=d3.scaleLinear().domain([0,100]).range([0,innerW]);
  const y=d3.scaleLinear().domain([0,100]).range([innerH,0]);

  const tip=el('tip');
  if(!tip.dataset.bizBound){
    tip.addEventListener('mouseenter',()=>{clearTimeout(window._bizTipHideTimer)});
    tip.addEventListener('mouseleave',()=>tip.classList.remove('vis'));
    tip.dataset.bizBound='1';
  }
  const hideTipSoon=()=>{
    clearTimeout(window._bizTipHideTimer);
    window._bizTipHideTimer=setTimeout(()=>tip.classList.remove('vis'),140);
  };
  const moveTip=(evt)=>{
    const r=m.getBoundingClientRect();
    const tw=tip.offsetWidth||320, th=tip.offsetHeight||120;
    let left=evt.clientX-r.left+14, top=evt.clientY-r.top+14;
    if(left+tw>r.width-8)left=evt.clientX-r.left-tw-14;
    if(top+th>r.height-8)top=evt.clientY-r.top-th-14;
    tip.style.left=Math.max(8,left)+'px';
    tip.style.top=Math.max(8,top)+'px';
  };
  const showNodeTip=(evt,d)=>{
    clearTimeout(window._bizTipHideTimer);
    const rev=((d.financials&&d.financials.revenueSources)||[]).slice(0,3).join(', ') || 'revenue model unclear';
    const srcs=bizSources(d,6);
    const srcHtml=srcs.length
      ? `<div class="tip-src-title">Citations</div><div class="tip-src-list">${srcs.map(s=>`<a class="tip-src-link" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.label)}${s.type?` · ${escapeHtml(s.type)}`:''}</a>`).join('')}</div>`
      : `<div class="tm" style="margin-top:8px">No source URLs attached on this node.</div>`;
    const audit=bizAuditRow(d);
    const auditHtml=audit
      ? `<div class="tm" style="margin-top:6px">Audit CSV: confidence ${escapeHtml(audit.confidence||'n/a')} · source count ${escapeHtml(audit.sourceCount||'0')} · <a href="data_researched_pass7_audit_report.csv" target="_blank" rel="noopener">CSV</a></div>`
      : '';
    tip.innerHTML=`<h4>${escapeHtml(d.name)}${d.sourceAsterisk?' *':''}</h4><div class="tm">Profit ${d.profitScore} · OS fit ${d.openScienceScore} · Overlap ${d.overlapScore||0} · Decen ${d.decen||0} · ${escapeHtml(d.legalStructure||'unknown')} · ${escapeHtml(rev)}</div>${auditHtml}${srcHtml}`;
    tip.classList.add('vis');
    moveTip(evt);
  };

  const quads=[
    {key:'commons',x0:0,x1:50,y0:50,y1:100,fill:'rgba(110,200,155,.06)',label:'Commons-aligned',sub:`${counts['commons']} nodes`,desc:qDefs['commons'].desc},
    {key:'hybrid-open',x0:50,x1:100,y0:50,y1:100,fill:'rgba(116,221,215,.06)',label:'Open-core hybrid',sub:`${counts['hybrid-open']} nodes`,desc:qDefs['hybrid-open'].desc},
    {key:'mission-fragile',x0:0,x1:50,y0:0,y1:50,fill:'rgba(212,168,83,.05)',label:'Low-profit / low-fit',sub:`${counts['mission-fragile']} nodes`,desc:qDefs['mission-fragile'].desc},
    {key:'extractive-risk',x0:50,x1:100,y0:0,y1:50,fill:'rgba(224,92,92,.06)',label:'Commercial pressure',sub:`${counts['extractive-risk']} nodes`,desc:qDefs['extractive-risk'].desc}
  ];
  const quadG=plotLayer.append('g').attr('class','biz-quads');
  const quadRects=quadG.selectAll('.biz-quad').data(quads).enter().append('rect')
    .attr('class','biz-quad')
    .attr('x',d=>x(d.x0)).attr('y',d=>y(d.y1)).attr('width',d=>x(d.x1)-x(d.x0)).attr('height',d=>y(d.y0)-y(d.y1))
    .attr('fill',d=>d.fill).attr('stroke','rgba(255,255,255,.05)');
  quadG.selectAll('.quad-label').data(quads).enter().append('text')
    .attr('x',d=>x((d.x0+d.x1)/2)).attr('y',d=>y(d.y1)-8)
    .attr('text-anchor','middle').attr('font-size',11).attr('font-family','Nunito Sans,sans-serif').attr('fill','var(--text-2)').text(d=>d.label);
  quadG.selectAll('.quad-sub').data(quads).enter().append('text')
    .attr('x',d=>x((d.x0+d.x1)/2)).attr('y',d=>y(d.y1)+8)
    .attr('text-anchor','middle').attr('font-size',10).attr('font-family','Fira Code,monospace').attr('fill','var(--text-3)').text(d=>d.sub);
  quadG.selectAll('.biz-quad-hit').data(quads).enter().append('rect')
    .attr('class','biz-quad-hit')
    .attr('x',d=>x(d.x0)).attr('y',d=>y(d.y1)).attr('width',d=>x(d.x1)-x(d.x0)).attr('height',d=>y(d.y0)-y(d.y1))
    .attr('fill','transparent')
    .style('cursor','help')
    .on('mouseenter',(evt,d)=>{
      quadRects.filter(q=>q.key===d.key).classed('biz-quad-hover',true);
      tip.innerHTML=`<h4>${escapeHtml(d.label)}</h4><div class="tm">${escapeHtml(d.desc)}</div><div class="tm" style="margin-top:5px">${escapeHtml(d.sub)}</div>`;
      tip.classList.add('vis');
      moveTip(evt);
    })
    .on('mousemove',moveTip)
    .on('mouseleave',(evt,d)=>{
      quadRects.filter(q=>q.key===d.key).classed('biz-quad-hover',false);
      hideTipSoon();
    });

  const gx=axisLayer.append('g').attr('transform',`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(10));
  const gy=axisLayer.append('g').call(d3.axisLeft(y).ticks(10));
  gx.selectAll('text').attr('fill','var(--text-2)');
  gy.selectAll('text').attr('fill','var(--text-2)');
  gx.selectAll('line,path').attr('stroke','var(--border-h)');
  gy.selectAll('line,path').attr('stroke','var(--border-h)');
  axisLayer.append('text').attr('class','axis-label').attr('x',innerW/2).attr('y',innerH+42).attr('text-anchor','middle').text('Commerciality / Profit Score ->');
  axisLayer.append('text').attr('class','axis-label').attr('transform',`translate(${-50},${innerH/2}) rotate(-90)`).attr('text-anchor','middle').text('Open-science compatibility ->');
  plotLayer.append('line').attr('x1',x(50)).attr('x2',x(50)).attr('y1',0).attr('y2',innerH).attr('stroke','rgba(212,168,83,.35)').attr('stroke-dasharray','6,5');
  plotLayer.append('line').attr('x1',0).attr('x2',innerW).attr('y1',y(50)).attr('y2',y(50)).attr('stroke','rgba(212,168,83,.35)').attr('stroke-dasharray','6,5');

  const floating=chartPanel.append('div').attr('class','biz-floating-actions');
  floating.append('span').attr('class','biz-zoom-chip').text('Scroll = zoom, drag = pan');

  const radius=n=>6 + Math.min(8,(n.overlapScore||0)/11);
  const decStroke=n=>1 + Math.min(3.8,(n.decen||0)/30);
  const plot=nodes.map((n,i)=>({...n,tx:x(n.profitScore),ty:y(n.openScienceScore),x:x(n.profitScore)+((i%7)-3)*0.6,y:y(n.openScienceScore)+((Math.floor(i/7)%7)-3)*0.6}));

  const pointLayer=plotLayer.append('g').attr('class','biz-points');
  const points=pointLayer.selectAll('.biz-point').data(plot,d=>d.id).enter().append('g').attr('class','biz-point').style('cursor','pointer')
    .on('click',(e,d)=>{selNode(d.id);el('app').classList.remove('hide-right')})
    .on('mouseenter',(e,d)=>{showNodeTip(e,d);d3.select(e.currentTarget).raise()})
    .on('mousemove',(e,d)=>moveTip(e))
    .on('mouseleave',hideTipSoon);

  points.append('circle')
    .attr('class','biz-ring')
    .attr('r',d=>radius(d)+1.8)
    .attr('fill','none')
    .attr('stroke',d=>confColor((d.provenance&&d.provenance.confidence)||'low'))
    .attr('stroke-width',1.25)
    .attr('stroke-opacity',.95);
  points.append('circle')
    .attr('class','biz-core')
    .attr('r',d=>radius(d))
    .attr('fill',d=>SC[d.stack]||'var(--text-3)')
    .attr('fill-opacity',.24)
    .attr('stroke',d=>SC[d.stack]||'var(--text-3)')
    .attr('stroke-width',d=>decStroke(d))
    .attr('stroke-opacity',.92);
  points.append('circle')
    .attr('class','biz-dot')
    .attr('r',2.6)
    .attr('fill',d=>SC[d.stack]||'var(--text-3)')
    .attr('fill-opacity',.95);

  const labelSetFns={
    notable:d=>d.id===selId || (d.overlapScore||0)>=55 || (d.decen||0)>=75 || Math.abs((d.profitScore||50)-(d.openScienceScore||50))>=38,
    overlap:d=>(d.overlapScore||0)>=45,
    decen:d=>(d.decen||0)>=70,
    decent:d=>(d.decen||0)>=70,
    competitors:d=>(d.overlapScore||0)>=55 || ((d.overlapTags||[]).includes('publishing') && (d.overlapTags||[]).includes('peer-review')),
    all:d=>true
  };
  const labelFmt=(d)=>{
    if(currentLabelDetail==='name') return d.name;
    if(currentLabelDetail==='overlap') return `${d.name} · Ov ${d.overlapScore||0}`;
    if(currentLabelDetail==='decen') return `${d.name} · Dc ${d.decen||0}`;
    return `${d.name} · Ov ${d.overlapScore||0} · Dc ${d.decen||0}`;
  };
  let labels=plot.filter(labelSetFns[currentLabelSet]||labelSetFns.notable)
    .sort((a,b)=>((b.overlapScore||0)+(b.decen||0)+Math.abs((b.profitScore||50)-(b.openScienceScore||50))*0.4)-((a.overlapScore||0)+(a.decen||0)+Math.abs((a.profitScore||50)-(a.openScienceScore||50))*0.4));
  labels=labels.slice(0,currentLabelSet==='all'?34:26);

  const labelLayer=plotLayer.append('g').attr('class','biz-labels');
  const labelNodes=labels.map(d=>({id:d.id,node:d,text:labelFmt(d),priority:(d.overlapScore||0)+(d.decen||0)}));
  const labelLinks=labelLayer.selectAll('line').data(labelNodes,d=>d.id).enter().append('line').attr('class','biz-label-link');
  const labelTexts=labelLayer.selectAll('text').data(labelNodes,d=>d.id).enter().append('text')
    .attr('font-size',10).attr('font-family','Nunito Sans,sans-serif').attr('fill','var(--graph-label)')
    .attr('stroke','rgba(0,0,0,.84)').attr('stroke-width',1.5).attr('paint-order','stroke');

  const placeLabels=()=>{
    const placed=[];
    labelNodes.sort((a,b)=>b.priority-a.priority);
    labelNodes.forEach(lbl=>{
      lbl.text=labelFmt(lbl.node);
      lbl.w=Math.min(300,Math.max(56,lbl.text.length*6.2+12));
      const r=radius(lbl.node);
      const choices=[
        {dx:r+8,dy:-8,anchor:'start'},
        {dx:-r-8,dy:-8,anchor:'end'},
        {dx:0,dy:r+14,anchor:'middle'},
        {dx:0,dy:-r-14,anchor:'middle'}
      ];
      let best=null,bestPenalty=Infinity;
      choices.forEach(c=>{
        const x1=lbl.node.x+c.dx, y1=lbl.node.y+c.dy;
        const x0=c.anchor==='start'?x1:(c.anchor==='end'?x1-lbl.w:x1-lbl.w/2);
        const xx1=x0+lbl.w, y0=y1-11, yy1=y1+2;
        let penalty=0;
        if(x0<2||xx1>innerW-2||y0<2||yy1>innerH-2)penalty+=500;
        for(const p of placed){if(!(xx1<p.x0||x0>p.x1||yy1<p.y0||y0>p.y1))penalty+=220;}
        penalty+=Math.abs(c.dx)*0.8+Math.abs(c.dy)*0.35;
        if(penalty<bestPenalty){bestPenalty=penalty;best={x:x1,y:y1,anchor:c.anchor,x0,x1:xx1,y0,y1:yy1};}
      });
      lbl.lx=best.x; lbl.ly=best.y; lbl.anchor=best.anchor;
      lbl.linkX=lbl.node.x + Math.sign((best.x-lbl.node.x)||1)*(r+1);
      lbl.linkY=lbl.node.y + (best.y>=lbl.node.y?2.8:-2.8);
      placed.push(best);
    });
    labelTexts.text(d=>d.text).attr('x',d=>d.lx).attr('y',d=>d.ly).attr('text-anchor',d=>d.anchor);
    labelLinks.attr('x1',d=>d.linkX).attr('y1',d=>d.linkY).attr('x2',d=>d.lx).attr('y2',d=>d.ly-4);
  };

  const clampNode=(d)=>{
    const r=radius(d)+2;
    d.x=Math.max(r,Math.min(innerW-r,d.x));
    d.y=Math.max(r,Math.min(innerH-r,d.y));
  };
  let tickN=0;
  const draw=()=>{
    points.attr('transform',d=>`translate(${d.x},${d.y})`);
    if(!tickN || tickN%2===0)placeLabels();
    tickN++;
  };
  sim=d3.forceSimulation(plot)
    .force('x',d3.forceX(d=>d.tx).strength(.22))
    .force('y',d3.forceY(d=>d.ty).strength(.22))
    .force('collide',d3.forceCollide(d=>radius(d)+2.8).iterations(3))
    .alpha(1)
    .alphaDecay(.048)
    .velocityDecay(.35)
    .on('tick',()=>{plot.forEach(clampNode);draw()})
    .on('end',placeLabels);

  const zoom=d3.zoom().scaleExtent([0.75,8]).translateExtent([[-innerW*.65,-innerH*.65],[innerW*1.65,innerH*1.65]]).on('zoom',evt=>plotLayer.attr('transform',evt.transform));
  svg.call(zoom).on('dblclick.zoom',null);
  floating.append('button').attr('class','biz-mini-btn').text('Reset zoom').on('click',()=>svg.transition().duration(260).call(zoom.transform,d3.zoomIdentity));
  floating.append('button').attr('class','biz-mini-btn').text('Fullscreen').on('click',()=>{
    const node=chartPanel.node();
    if(document.fullscreenElement===node){if(document.exitFullscreen)document.exitFullscreen();}
    else if(node.requestFullscreen)node.requestFullscreen().catch(()=>{});
  });
  svg.on('click',evt=>{if(evt.target===svg.node())tip.classList.remove('vis')});
}

function renderLit(){

  p.innerHTML=`<div class="lit-title">Literature & References</div><div id="zotC"><p style="color:var(--text-3)">Loading from Zotero...</p></div><p style="margin-top:16px"><a href="https://www.zotero.org/groups/6075364/descai/library" target="_blank" style="color:var(--link)">View full Zotero library â†—</a></p>`;
  m.appendChild(p);
  if(zoteroItems)displayZ();else fetchZotero();
}
async function fetchZotero(){
  try{const r=await fetch('https://api.zotero.org/groups/6075364/items?format=json&limit=50&sort=dateModified&direction=desc');if(!r.ok)throw new Error();zoteroItems=await r.json();displayZ()}catch(e){const c=document.getElementById('zotC');if(c)c.innerHTML='<p style="color:var(--text-3)">Could not load from Zotero. Check group visibility.</p>'}
}
function displayZ(){const c=document.getElementById('zotC');if(!c||!zoteroItems)return;c.innerHTML=zoteroItems.filter(i=>i.data.title).map(i=>{const d=i.data;return`<div class="paper"><div class="paper-t">${d.title}</div><div class="paper-a">${(d.creators||[]).map(c=>c.lastName).join(', ')} ${d.date||''} ${d.DOI?`<a href="https://doi.org/${d.DOI}" target="_blank" style="color:var(--link)">DOIâ†—</a>`:''}</div></div>`}).join('')}

// ===== DETAIL PANEL =====
function selNode(id){
  selId=id;const n=D.nodes.find(x=>x.id===id);if(!n)return;
  const prov=n.provenance||{}, fin=n.financials||{}, bdg=(fin.scoreBreakdown||{});
  const conf=prov.confidence||'low';
  const confCls=confClass(conf);
  el('detE').style.display='none';
  const p=el('detC'),rels=D.edges.filter(e=>e.s===id||e.t===id);
  const ppl=D.people.filter(pp=>pp.orgs.includes(id));
  const credC=n.credScore>=60?'var(--sage)':n.credScore>=30?'var(--gold)':'var(--text-3)';
  const ovC=(n.overlapScore||0)>=60?'var(--gold)':(n.overlapScore||0)>=30?'var(--text-2)':'var(--text-3)';
  const srcHtml=(prov.sources||[]).map(s=>`<a class="src-chip" href="${s.url}" target="_blank" rel="noopener">${s.label}${s.type?` Â· ${s.type}`:''}</a>`).join('');
  const osScore=n.openScienceScore??fin.openScienceCompatibilityScore??50;
  const audit=fin.scoreAudit||{};
  p.innerHTML=`<div class="det-name">${n.name}${n.sourceAsterisk?' *':''}</div><div class="det-sub">${n.type} Â· ${n.stage} Â· <span class="cred-badge" style="background:rgba(110,200,155,.08);color:${credC}">Cred ${n.credScore||0}</span> Â· <span class="profit-badge" style="background:${profitBg(n.profitScore)};color:${profitC(n.profitScore)}">Profit ${n.profitScore??50}</span> Â· <span class="profit-badge" style="background:${osBg(osScore)};color:${osC(osScore)}">OS Fit ${osScore}</span> Â· <span class="conf-badge ${confCls}">${conf}</span>${n.twitter?` Â· <a href="https://x.com/${n.twitter.replace('@','')}" target="_blank" style="color:var(--link)">${n.twitter}</a>`:''}</div>
  <div class="field"><div class="flabel">Description</div><textarea class="finput" onchange="upd('${id}','desc',this.value)">${n.desc||''}</textarea></div>
  ${(n.overlapScore||n.compNote)?`<div class="overlap-box" style="border:1px solid ${(n.overlapScore||0)>=50?'rgba(212,168,83,.25)':'var(--border)'}">
    <div class="flabel" style="color:var(--gold)">Overlap with our platform <span style="font-weight:700">${n.overlapScore||0}%</span></div>
    <div class="overlap-bar-wrap"><div class="overlap-bar-bg"><div class="overlap-bar-fill" style="width:${n.overlapScore||0}%;background:${ovC}"></div></div></div>
    <div style="font-size:.82rem;color:var(--text-2);line-height:1.5">${n.compNote||''}</div>
  </div>`:''}
  ${(n.finModel||n.finNote)?`<div class="fin-box ${finBoxClass(n.profitScore)}">
    <div class="flabel" style="color:${profitC(n.profitScore)}">Commerciality score <span style="font-weight:700">${n.profitScore??50}/100</span> ${n.legalStructure!=='unknown'?`Â· <span style="text-transform:capitalize">${n.legalStructure}</span>`:''} ${n.apc?'Â· <span style="color:var(--red)">Has fee/APC</span>':''}</div>
    <div class="fin-bar-wrap"><div class="fin-bar-bg"><div class="fin-bar-fill" style="width:${n.profitScore??50}%;background:${profitBarC(n.profitScore)}"></div></div></div>
    <div class="flabel" style="margin-top:10px;color:${osC(osScore)}">Open-science compatibility <span style="font-weight:700">${osScore}/100</span> ${fin.openScienceCompatibilityBand?`Â· <span style="text-transform:capitalize">${fin.openScienceCompatibilityBand}</span>`:''}</div>
    <div class="fin-bar-wrap"><div class="fin-bar-bg"><div class="fin-bar-fill" style="width:${osScore}%;background:${osC(osScore)}"></div></div></div>
    ${n.fundingRaised?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Funding / scale: ${n.fundingRaised}</div>`:''}
    ${fin.revenueSources&&fin.revenueSources.length?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Revenue sources: ${fin.revenueSources.join(', ')}</div>`:''}
    ${fin.researcherPays&&fin.researcherPays!=='unknown'?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Researcher pays: ${fin.researcherPays}</div>`:''}
    ${fin.institutionPays&&fin.institutionPays!=='unknown'?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Institution pays: ${fin.institutionPays}</div>`:''}
    ${fin.apcAmountText?`<div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">Fee detail: ${fin.apcAmountText}</div>`:''}
    ${fin.financialSummary?`<div style="font-size:.8rem;color:var(--text-2);line-height:1.45">${fin.financialSummary}</div>`:''}
    <div style="font-size:.82rem;color:var(--text-2);line-height:1.5">${n.finModel||''}</div>
    ${n.finNote?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:8px">${n.finNote}</div>`:''}

    <div style="font-size:.8rem;color:var(--text-2);line-height:1.45">Confidence: <span class="conf-badge ${confCls}">${conf}</span>${prov.lastVerified?` Â· Last verified: ${prov.lastVerified}`:''}</div>
    ${fin.openScienceAlignment&&fin.openScienceAlignment!=='unknown'?`<div style="font-size:.8rem;color:var(--text-2);line-height:1.45;margin-top:6px">Open-science alignment: <strong style="color:${osC(osScore)};text-transform:capitalize">${fin.openScienceAlignment}</strong></div>`:''}

    ${fin.openScienceAlignmentNote?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:6px">${fin.openScienceAlignmentNote}</div>`:''}
    ${prov.notes?`<div style="font-size:.8rem;color:var(--text-3);line-height:1.5;margin-top:8px">${prov.notes}</div>`:''}
    ${srcHtml?`<div class="src-list">${srcHtml}</div>`:'<div style="font-size:.78rem;color:var(--text-3);margin-top:8px">No external source links attached yet.</div>'}
  </div>
  <div class="field"><div class="flabel">Type</div><input class="finput" value="${n.type||''}" onchange="upd('${id}','type',this.value)"></div>

  <div class="field"><div class="flabel">Notes</div><textarea class="finput" onchange="upd('${id}','notes',this.value)">${n.notes||''}</textarea></div>
  ${ppl.length?`<div class="field"><div class="flabel">People</div><ul class="rel-list">${ppl.map(pp=>`<li class="rel-item"><span>${pp.name}</span></li>`).join('')}</ul></div>`:''}
  ${rels.length?`<div class="field"><div class="flabel">Relations</div><ul class="rel-list">${rels.map(r=>{const other=r.s===id?r.t:r.s;const on=D.nodes.find(x=>x.id===other)?.name||other;const c=RB[r.type]||{b:'var(--raised)',c:'var(--text-3)'};return`<li class="rel-item"><span class="rel-badge" style="background:${c.b};color:${c.c}">${r.type}</span><span>${on}</span>${r.l?`<span style="color:var(--text-3);font-size:.72rem">Â· ${r.l}</span>`:''}</li>`}).join('')}</ul></div>`:''}`;
  el('app').classList.remove('hide-right');
}

// ===== EXPORT / IMPORT =====
function expJSON(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='desci-landscape.json';a.click()}
function impFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    try{
      if(f.name.endsWith('.json')){D=JSON.parse(e.target.result);D.nodes.forEach(n=>{n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.finModel=n.finModel||'';n.legalStructure=n.legalStructure||'unknown';n.apc=n.apc||false;n.profitScore=n.profitScore??50;n.openScienceScore=n.openScienceScore??((n.financials&&n.financials.openScienceCompatibilityScore)??50);n.finNote=n.finNote||'';n.fundingRaised=n.fundingRaised||'';n.provenance=n.provenance||{confidence:'low',hasUnverifiedClaims:true,sources:[],lastVerified:'',notes:''};n.financials=n.financials||{revenueSources:[],researcherPays:'unknown',institutionPays:'unknown',openScienceAlignment:'unknown',openScienceAlignmentNote:'',scoreBreakdown:{},openScienceCompatibilityScore:50,openScienceCompatibilityBand:'moderate',scoreAudit:{}};if(n.financials&&n.financials.openScienceCompatibilityScore==null)n.financials.openScienceCompatibilityScore=n.openScienceScore??50;n.sourceAsterisk=!!n.sourceAsterisk})}
      else if(f.name.endsWith('.csv')){const p=Papa.parse(e.target.result,{header:true});p.data.forEach(row=>{if(!row.id)return;const ex=D.nodes.find(n=>n.id===row.id);if(ex)Object.assign(ex,row);else D.nodes.push({...row,tags:(row.tags||'').split(','),s1:+row.s1||0,s2:+row.s2||0,s3:+row.s3||0,s4:+row.s4||0,s5:+row.s5||0,decen:+row.decen||50,cf:{},overlapTags:[],credScore:0,profitScore:50})})}
      save();render();updateSB();updateStats();buildPills();
    }catch(err){alert('Import error: '+err.message)}
  };r.readAsText(f);inp.value='';
}

// ===== GITHUB SYNC =====
const GH={get owner(){return localStorage.getItem('gh-owner')||''},get repo(){return localStorage.getItem('gh-repo')||''},get token(){return localStorage.getItem('gh-token')||''},get path(){return localStorage.getItem('gh-path')||'data.json'},get ok(){return!!(this.owner&&this.repo&&this.token)}};
function detectGHPages(){const h=location.hostname;if(h.endsWith('.github.io')){const o=h.replace('.github.io','');const r=location.pathname.split('/').filter(Boolean)[0]||o+'.github.io';if(!localStorage.getItem('gh-owner'))localStorage.setItem('gh-owner',o);if(!localStorage.getItem('gh-repo'))localStorage.setItem('gh-repo',r);if(!localStorage.getItem('gh-path'))localStorage.setItem('gh-path','data.json')}}
function promptToken(){if(GH.token)return true;const t=prompt('GitHub PAT (fine-grained, Contents read+write):');if(!t)return false;localStorage.setItem('gh-token',t.trim());return true}
function setSyncUI(state,msg){const s=el('syncStatus'),t=el('syncText');s.className='sync-status'+(state==='ok'?' synced':state==='err'?' error':'');t.textContent=msg}
let pushTimer=null;
function debouncedPush(){if(!GH.ok)return;clearTimeout(pushTimer);setSyncUI('','saving...');pushTimer=setTimeout(()=>ghPush(),2000)}
async function ghPull(){if(!GH.ok){detectGHPages();if(!promptToken())return}if(!GH.ok)return;setSyncUI('','pulling...');try{const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});if(r.status===404){setSyncUI('ok','no remote');return}if(r.status===401||r.status===403){localStorage.removeItem('gh-token');setSyncUI('err','bad token');return}if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();const raw=atob(j.content.replace(/\n/g,''));D=JSON.parse(raw);localStorage.setItem('gh-sha',j.sha);D.nodes.forEach(n=>{n.overlapTags=n.overlapTags||[];n.credScore=n.credScore||0;n.notes=n.notes||''});save(true);render();updateSB();updateStats();buildPills();setSyncUI('ok','synced')}catch(e){setSyncUI('err',e.message)}}
async function ghPush(){if(!GH.ok)return;setSyncUI('','pushing...');try{let sha=localStorage.getItem('gh-sha')||'';if(!sha){try{const c=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json'}});if(c.ok){const j=await c.json();sha=j.sha}}catch(e){}}const text=JSON.stringify(D,null,2);const bytes=new TextEncoder().encode(text);let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);const body={message:'Update '+new Date().toISOString().slice(0,16),content:btoa(bin)};if(sha)body.sha=sha;const r=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{method:'PUT',headers:{'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(r.status===409){setSyncUI('','conflict...');await ghPull();await ghPush();return}if(!r.ok){const e=await r.json();throw new Error(e.message||'HTTP '+r.status)}const result=await r.json();localStorage.setItem('gh-sha',result.content.sha);setSyncUI('ok','saved')}catch(e){setSyncUI('err',e.message)}}
function autoSync(){detectGHPages();if(GH.ok)ghPull()}
function onSyncClick(){if(!GH.ok){detectGHPages();if(promptToken())ghPull()}else ghPush()}
